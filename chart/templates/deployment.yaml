apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "trackableappname" . }}
  creationTimestamp: null
  labels:
    app: {{ template "appname" . }}
    track: "{{ .Values.application.track }}"
    tier: "{{ .Values.application.tier }}"
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
  annotations:
    app.gitlab.com/app: "{{ .Values.application.path_slug }}"
    app.gitlab.com/env: "{{ .Values.application.env_slug }}"
spec:
  progressDeadlineSeconds: 2147483647
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 2147483647
  selector:
    matchLabels:
      app: {{ template "appname" . }}
      track: "{{ .Values.application.track }}"
      tier: "{{ .Values.application.tier }}"
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: {{ template "appname" . }}
        track: "{{ .Values.application.track }}"
        tier: "{{ .Values.application.tier }}"
      annotations:
        app.gitlab.com/app: "{{ .Values.application.path_slug }}"
        app.gitlab.com/env: "{{ .Values.application.env_slug }}"
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: BASE_URL
          value: {{ .Values.service.url | quote }}
        - name: BASE_MTLS_URL
          value: {{ .Values.service.mtls | quote }}
        - name: MONGODB_HOST
          value: {{ template "appname" . }}-mongodb
        - name: JAVA_EXTRA_ARGS
          value: {{ .Values.javaArgs | quote }}
        - name: SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: fintechlabs-signing-key
              key: jwk
              optional: true
        - name: DEPRECATED_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: fintechlabs-deprecated-signing-key
              key: jwk
              optional: true
        - name: PRIVATE_LINK_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              name: fintechlabs-private-link-signing-key
              key: jwk
              optional: true
        - name: OIDC_GOOGLE_CLIENTID
          valueFrom:
            secretKeyRef:
              name: oidc-google-credentials
              key: clientid
        - name: OIDC_GOOGLE_SECRET
          valueFrom:
            secretKeyRef:
              name: oidc-google-credentials
              key: secret
        - name: OIDC_GITLAB_CLIENTID
          valueFrom:
            secretKeyRef:
              name: oidc-gitlab-credentials
              key: clientid
        - name: OIDC_GITLAB_SECRET
          valueFrom:
            secretKeyRef:
              name: oidc-gitlab-credentials
              key: secret
        {{- if .Values.profile }}
        # CI profiling (opt-in, review branches only). See profile-out/2026-05-24-ci-profiling-design.md
        # delay=20s gives the harvest job time to mv the dumponexit file
        # aside after a restart, before the replacement JVM's JFR initialises
        # and truncates /dump/cipipe-${id}.jfr. Cost: ~20s of recording lost
        # at each JVM start (Spring Boot init; not a window we need to profile).
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:FlightRecorderOptions=repository=/dump/jfr-repo-{{ .Values.profilePipelineId }} -XX:StartFlightRecording=delay=20s,name=cipipe-{{ .Values.profilePipelineId }},settings=profile,filename=/dump/cipipe-{{ .Values.profilePipelineId }}.jfr,disk=true,dumponexit=true,maxsize=2g,jdk.InitialEnvironmentVariable#enabled=false,jdk.InitialSystemProperty#enabled=false,jdk.JVMInformation#enabled=false,jdk.SystemProcess#enabled=false,jdk.ProcessStart#enabled=false"
        {{- end }}
        volumeMounts:
            - name: dump-volume
              mountPath:
                /dump
        ports:
        - name: "{{ .Values.service.name }}"
          containerPort: {{ .Values.service.internalPort }}
          protocol: TCP
        livenessProbe:
          failureThreshold: 3
          successThreshold: 1
          httpGet:
            path: "/api/ui/spec_links?public=true"
            port: {{ .Values.service.internalPort }}
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 15
        readinessProbe:
          failureThreshold: 3
          successThreshold: 1
          httpGet:
            path: "/api/ui/spec_links?public=true"
            port: {{ .Values.service.internalPort }}
            httpHeaders:
            - name: X-Forwarded-Proto
              value: https
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        resources:
{{ toYaml .Values.resources | indent 12 }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      {{- if .Values.profile }}
      # Profiled runs need extra grace so JFR dumponexit can flush the on-disk
      # repository to /dump/cipipe-${CI_PIPELINE_ID}.jfr before SIGKILL hits.
      terminationGracePeriodSeconds: 90
      {{- else }}
      terminationGracePeriodSeconds: 30
      {{- end }}
      volumes:
          - name: dump-volume
            persistentVolumeClaim:
                claimName: {{ template "trackableappnamepvc" . }}
status: {}
