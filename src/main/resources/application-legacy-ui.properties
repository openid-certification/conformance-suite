# Frozen pre-redesign UI snapshot (vendored from tag release-v5.1.45). Activate with the
# `legacy-ui` Spring profile, e.g.:
#   java -jar target/fapi-test-suite.jar --spring.profiles.active=legacy-ui
#
# Repoints static serving at classpath:/static-legacy/. The property is list-replacement (not
# additive), so the rest of Spring Boot's default chain is re-listed after it — keeping
# swagger-ui (classpath:/META-INF/resources/) and the welcome-page resolver working.
# classpath:/static/ (the new UI) is DELIBERATELY omitted: legacy mode is a clean,
# self-contained snapshot, so a path absent from static-legacy/ 404s loudly instead of
# silently borrowing a current-UI asset. (Exception: the /fonts/** handler in ApplicationConfig
# is hard-coded to classpath:/static/fonts/, but the old UI uses CDN fonts and never requests
# /fonts/**, so it is never hit under this profile.)
spring.web.resources.static-locations=classpath:/static-legacy/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/public/
