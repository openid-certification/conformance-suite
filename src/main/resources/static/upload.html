<style>
    /* Page-level layout for upload.html. Mirrors the cts-image-upload
       component's class names so the per-item templates (existingImage.html,
       pendingImageUploader.html) and the static "additional uploader" block
       all share one visual language. The cts-image-upload component injects
       its own copy of these rules when it mounts; we duplicate the small
       subset we need here so the templates work even though no
       <cts-image-upload> instance is present on the page. */
    .upload-page {
        max-width: var(--maxw-page);
        margin: 0 auto;
        padding: var(--space-5);
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
    }
    .upload-test-info {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: var(--radius-2);
        padding: var(--space-4);
        font-family: var(--font-sans);
        font-size: var(--fs-13);
        color: var(--fg);
    }
    .upload-list {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
    }
    .upload-item {
        display: grid;
        grid-template-columns: var(--space-6) auto 1fr;
        gap: var(--space-4);
        align-items: start;
        padding: var(--space-4);
        border: 1px solid var(--border);
        border-radius: var(--radius-2);
        background: var(--bg-elev);
    }
    .upload-item__status {
        width: var(--space-6);
        height: var(--space-6);
        border-radius: var(--radius-pill);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--fg-on-ink);
        font-size: var(--fs-14);
    }
    .upload-item__status--pending {
        background: var(--orange-400);
    }
    .upload-item__status--uploaded {
        background: var(--status-pass);
    }
    .upload-item__thumb {
        width: 96px;
        height: 96px;
        object-fit: cover;
        border: 1px dashed var(--ink-300);
        border-radius: var(--radius-2);
        background: var(--bg-muted);
        padding: var(--space-1);
    }
    .upload-item__body {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        min-width: 0;
    }
    .upload-item__hint {
        margin: 0;
        font-family: var(--font-sans);
        font-size: var(--fs-13);
        line-height: var(--lh-snug);
        color: var(--fg-soft);
        word-break: break-word;
    }
    .upload-item__source {
        font-family: var(--font-mono);
        font-size: var(--fs-12);
        color: var(--fg-muted);
    }
    .upload-item__source a {
        color: var(--fg-link);
    }
    .upload-item__actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        align-items: center;
    }
    /* Token-styled file-picker label. The wrapping <label> + hidden <input
       type="file"> pattern stays — it is the only standards-compliant way to
       trigger the file picker from a styled affordance and is a deliberate
       choice (see U13 + the existing upload.spec.js note). */
    .upload-filepicker {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
        height: 34px;
        padding: 0 var(--space-4);
        border: 1px solid var(--ink-300);
        border-radius: var(--radius-2);
        background: var(--bg-elev);
        color: var(--fg);
        font-family: var(--font-sans);
        font-size: var(--fs-13);
        font-weight: var(--fw-bold);
        cursor: pointer;
        transition: background var(--dur-1) var(--ease-standard),
            border-color var(--dur-1) var(--ease-standard);
    }
    .upload-filepicker:hover {
        border-color: var(--ink-500);
    }
    .upload-filepicker:focus-within {
        outline: none;
        box-shadow: var(--focus-ring);
        border-color: var(--orange-400);
    }
    .upload-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-3);
    }
</style>

<script src="/vendor/lodash/js/lodash.min.js"></script>

<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", () => {

        var urlParams = new URLSearchParams(window.location.search);
        var testId = urlParams.get('log');

        FAPI_UI.showBusy();

        FAPI_UI.loadImageUploadTemplates() // load the templates
        .then(function() {
            return FAPI_UI.getUserInfo(); // then get the current user
        }).then(function() {
            return loadImagesForLog(testId); // load the existing and placeholder images and render the page
        }).then(function() {
            return getHeader(testId); // render the header, which includes test info
        }).finally(function() {
            FAPI_UI.hideBusy();
        });

    });

    function getUploadedImageCount() {
        /*
         * Attempt to determine the number of uploaded images by counting the
         * number of log items currently shown.
         */
        return document.querySelectorAll('#imageBlocks .logItem').length;
    }

    function validateSelectedImageFile(file) {
        // Impose as 550KB file size limit.
        const UPLOAD_SIZE_LIMIT = 500 * 1024;

        if (file.size > UPLOAD_SIZE_LIMIT) {
            FAPI_UI.showError({"error":"Invalid File Size", "message":"File size exceeds the 500KB limit"});
            return false;
        }

        // Limit the accepted file types.
        let typeMatched = ["image/jpeg", "image/png"].includes(file.type);

        if (! typeMatched) {
            FAPI_UI.showError({"error":"Invalid File Type", "message":"Only jpeg/png files accepted"});
            return false;
        }

        return true;
    }

    function getDescriptionField() {
        // The description input lives inside a <cts-form-field>. The Lit
        // element renders an <input class="oidf-input"> in light DOM, so we
        // can reach the underlying input via querySelector.
        return document.querySelector('#additionalUploader cts-form-field input');
    }

    function formReset() {
        // reset the form
        document.querySelector('#additionalUploader .uploadBtn').disabled = true;
        document.querySelector('#additionalUploader .uploadBtn').variant = 'light';

        document.querySelector('#additionalUploader .imagePreview').src = '/images/placeholder.jpg';

        document.querySelector('#additionalUploader [type="file"]').value = '';

        // Clear the description input. cts-form-field is uncontrolled here —
        // we manipulate the inner <input> directly because the page has no
        // outer state holding the field's value.
        const desc = getDescriptionField();
        if (desc) {
            desc.value = '';
        }
    }

    function loadImagesForLog(testId) {
        return fetch('/api/log/' + encodeURIComponent(testId) + '/images')
        .then((response) => {
            if (!response.ok) {
                return Promise.reject(response);
            }

            return response.json();
        })
        .then((data) => {
            _.each(data, function(item) {
                // check to see if it's an "upload required" or an existing image
                if (item.upload) {
                    //console.log('Upload required: ' + item._id);
                    document.getElementById('imageBlocks').insertAdjacentHTML('beforeend', FAPI_UI.logTemplates.PENDING({item: item}));
                } else if (item.img) {
                    //console.log('Existing image: ' + item._id);
                    document.getElementById('imageBlocks').insertAdjacentHTML('beforeend', FAPI_UI.logTemplates.EXISTING({item: item}));
                } else {
                    FAPI_UI.showError({
                        error: 'Unhandled image entry from logs: ' + item._id
                    });
                }
            });

            // wire up the buttons on all the image uploaders
            document.querySelectorAll('[data-upload-id]')?.forEach(function(el) {
                el.querySelector('[type="file"]').addEventListener("change", function(evt){
                    // Validate the selected file before upload.
                    if (validateSelectedImageFile(this.files[0])) {
                        var reader = new FileReader();

                        reader.onload = function(evt) {
                            // once it's loaded from the file, preview it and enable the upload button

                            var content = evt.target.result;
                            el.querySelector('.imagePreview').src = content;

                            el.querySelector('.uploadBtn').disabled = false;
                            el.querySelector('.uploadBtn').variant = 'success';
                        };

                        // this reads the file data and triggers the 'onload' function above
                        reader.readAsDataURL(this.files[0]);
                    }
                });

                el.querySelector('.uploadBtn').onclick = function(evt) {
                    evt.preventDefault();

                    var url = "/api/log/" + encodeURIComponent(testId) + '/images/' + encodeURIComponent(el.dataset.uploadId);

                    fetch(url, {
                        method: "POST",
                        body: el.querySelector('.imagePreview').src,
                    })
                    .then((response) => {
                        if (!response.ok) {
                            return Promise.reject(response);
                        }

                        return response.json();
                    })
                    .then((data) => {
                        // on a successful upload, replace the old element with a new one
                        el.innerHTML = FAPI_UI.logTemplates.EXISTING({item: data});
                    })
                    .catch((error) => {
                        // reset the form
                        if (error instanceof Response) {
                            // We have a 'Respose' object.
                            var message = error.statusText;
                            var responseClone = error.clone();

                            error.text()
                            .then(textError => {
                                // Text error thrown by the app
                                messageParsed = true;

                                try {
                                    const errorObj = JSON.parse(textError);

                                    if (errorObj.error.length != 0) {
                                        message = errorObj.error;
                                    }
                                }
                                catch (e) {
                                }

                                FAPI_UI.showError({code: error.status.toString(), error: message});
                            })
                            .catch(error1 => {
                                // JSON error thrown by the app
                                responseClone.json()
                                .then(jsonError => {
                                    if (typeof (jsonError) === 'string' && jsonError.length != 0) {
                                        message = jsonError;
                                    }

                                    FAPI_UI.showError({code: error.status.toString(), error: message});
                                })
                                .catch(genericError => {
                                    // Error thrown by the server
                                    FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                                });
                            });
                        } else {
                            // Network error automatically detected by fetch.
                            FAPI_UI.showError({code: "", error: error});
                        }

                        // reset the form
                        el.querySelector('.uploadBtn').disabled = true;
                        el.querySelector('.uploadBtn').variant = 'light';

                        el.querySelector('.imagePreview').src = '/images/placeholder.jpg';

                        el.querySelector('[type="file"]').value = '';
                    });
                };
            });

            // wire up the buttons on the "add a new image" panel
            document.querySelector('#additionalUploader [type="file"]').addEventListener("change", function(evt){
                // Validate the selected file before upload.
                if (! validateSelectedImageFile(this.files[0])) {
                    // reset the form
                    formReset();

                    return;
                }

                var reader = new FileReader();

                reader.onload = function(evt) {
                    // once it's loaded from the file, preview it and enable the upload button

                    var content = evt.target.result;
                    document.querySelector('#additionalUploader .imagePreview').src = content;

                    document.querySelector('#additionalUploader .uploadBtn').disabled = false;
                    document.querySelector('#additionalUploader .uploadBtn').variant = 'success';
                };

                // this reads the file data and triggers the 'onload' function above
                reader.readAsDataURL(this.files[0]);
            });

            document.querySelector('#additionalUploader .uploadBtn').onclick = function(evt) {
                evt.preventDefault();

                // The description input is required by the spec — without
                // a description the upload entry has no context. Surface the
                // error through the same FAPI_UI.showError() modal the rest
                // of the page uses; the cts-form-field's `error` property is
                // not bound here because the page has no outer state holding
                // the field's value.
                var descField = getDescriptionField();
                var desc = descField ? descField.value.trim() : '';
                if (!desc) {
                    FAPI_UI.showError({error: "Description required", message: "Please enter a description for this screenshot"});
                    return;
                }

                var url = "/api/log/" + encodeURIComponent(testId) + '/images?description=' + encodeURIComponent(desc);

                fetch(url, {
                    method: "POST",
                    body: document.querySelector('#additionalUploader .imagePreview').src
                })
                .then((response) => {
                    if (!response.ok) {
                        return Promise.reject(response);
                    }

                    return response.json();
                })
                .then((data) => {
                    // on a successful upload, append the new log entry to the display
                    document.getElementById('imageBlocks').insertAdjacentHTML('beforeend', FAPI_UI.logTemplates.EXISTING({item: data}));

                    // impose an upload limit of 2
                    if (getUploadedImageCount() >= 2) {
                        // hide the uploader when the limit is reached
                        document.getElementById('additionalUploader').style.display = 'none';
                    }

                    // reset the form
                    formReset();
                })
                .catch((error) => {
                    formReset();

                    if (error instanceof Response) {
                        // We have a 'Respose' object.
                        var message = error.statusText;
                        var responseClone = error.clone();

                        error.text()
                        .then(textError => {
                            // Text error thrown by the app
                            messageParsed = true;

                            try {
                                const errorObj = JSON.parse(textError);

                                if (errorObj.error.length != 0) {
                                    message = errorObj.error;
                                }
                            }
                            catch (e) {
                            }

                            FAPI_UI.showError({code: error.status.toString(), error: message});
                        })
                        .catch(error1 => {
                            // JSON error thrown by the app
                            responseClone.json()
                            .then(jsonError => {
                                if (typeof (jsonError) === 'string' && jsonError.length != 0) {
                                    message = jsonError;
                                }

                                FAPI_UI.showError({code: error.status.toString(), error: message});
                            })
                            .catch(genericError => {
                                // Error thrown by the server
                                FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                            });
                        });
                    } else {
                        // Network error automatically detected by fetch.
                        FAPI_UI.showError({code: "", error: error});
                    }
                });
            };

            // wire up paste support
            document.body.addEventListener("paste", function(e){

                var reader = new FileReader();

                reader.onload = function(evt) {
                    var content = evt.target.result;

                    // find the first image preview in the document -- this will either be the top placeholder or the "add an additional image" block if there are no placeholders
                    // note that "existing image" viewers don't have the "imagePasteTarget" class on them and therefore don't show up in this query

                    var target = document.querySelector('.imagePasteTarget');

                    target.src  = content;

                    var parent = target.parentNode;
                    while (parent != null) {
                        parent.querySelectorAll('.logItem')?.forEach(function(element) {
                            element.querySelectorAll('.uploadBtn')?.forEach(function(element1) {
                                element1.disabled = false;
                                element1.variant = 'success';
                            });
                        });

                        parent = parent.parentNode;
                    }
                };

                // loop through the clipboard to see if there's an image; when found, send to the reader which triggers the 'onload' function above
                _.each(e.clipboardData.items, function(item) {
                    if (item.type.startsWith('image/')) {
                        // Validate the paste buffer file before upload.
                        if (! validateSelectedImageFile(item.getAsFile())) {
                            // reset the form
                            var target = document.querySelector('.imagePasteTarget');

                            var parent = target.parentNode;
                            while (parent != null) {
                                parent.querySelector('.logItem')?.forEach(function(element) {
                                    element.querySelectorAll('.uploadBtn')?.forEach(function(element1) {
                                        element1.disabled = true;
                                        element1.variant = 'light';
                                    });
                                });

                                parent = parent.parentNode;
                            }

                            target.src = '/images/placeholder.jpg';
                            target.querySelector('[type="file"]').value = '';

                            return;
                        }

                        reader.readAsDataURL(item.getAsFile());
                    }
                });

            });
        })
        .catch((error) => {
            if (error instanceof Response) {
                // We have a 'Respose' object.
                var message = error.statusText;
                var responseClone = error.clone();

                error.text()
                .then(textError => {
                    // Text error thrown by the app
                    messageParsed = true;

                    try {
                        const errorObj = JSON.parse(textError);

                        if (errorObj.error.length != 0) {
                            message = errorObj.error;
                        }
                    }
                    catch (e) {
                    }

                    FAPI_UI.showError({code: error.status.toString(), error: message});
                })
                .catch(error1 => {
                    // JSON error thrown by the app
                    responseClone.json()
                    .then(jsonError => {
                        if (typeof (jsonError) === 'string' && jsonError.length != 0) {
                            message = jsonError;
                        }

                        FAPI_UI.showError({code: error.status.toString(), error: message});
                    })
                    .catch(genericError => {
                        // Error thrown by the server
                        FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                    });
                });
            } else {
                // Network error automatically detected by fetch.
                FAPI_UI.showError({code: "", error: error});
            }
        });
    }

    function getHeader(testId) {
        return fetch('/api/info/' + encodeURIComponent(testId))
        .then((response) => {
            if (!response.ok) {
                return Promise.reject(response);
            }

            return response.json();
        })
        .then((data) => {
            document.getElementById('testInfo').innerHTML = FAPI_UI.logTemplates.UPLOAD_HEADER({test: data});
        })
        .catch((error) => {
            if (error instanceof Response) {
                // We have a 'Respose' object.
                var message = error.statusText;
                var responseClone = error.clone();

                error.text()
                .then(textError => {
                    // Text error thrown by the app
                    messageParsed = true;

                    try {
                        const errorObj = JSON.parse(textError);

                        if (errorObj.error.length != 0) {
                            message = errorObj.error;
                        }
                    }
                    catch (e) {
                    }

                    FAPI_UI.showError({code: error.status.toString(), error: message});
                })
                .catch(error1 => {
                    // JSON error thrown by the app
                    responseClone.json()
                    .then(jsonError => {
                        if (typeof (jsonError) === 'string' && jsonError.length != 0) {
                            message = jsonError;
                        }

                        FAPI_UI.showError({code: error.status.toString(), error: message});
                    })
                    .catch(genericError => {
                        // Error thrown by the server
                        FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                    });
                });
            } else {
                // Network error automatically detected by fetch.
                FAPI_UI.showError({code: "", error: error});
            }
        });
    }
</script>
</head>
<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page=""></cts-navbar>

    <cts-modal id="errorModal" heading="Error">
        Error: <span id="errorMessage"></span>
    </cts-modal>

    <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
        <div class="upload-loading">
            <img src="/images/spinner.gif" width="100px" height="30px" alt="Loading" />
            <span id="loadingMessage"></span>
        </div>
    </cts-modal>

    <main id="main-content" class="upload-page">
        <cts-page-head title="Image Uploader" sub="Upload screenshots required by this test run."></cts-page-head>

        <div id="testInfo" class="upload-test-info">
        </div>

        <div class="upload-list">
            <div id="imageBlocks">

            </div>

            <div class="upload-item logItem" id="additionalUploader">
                <span class="upload-item__status upload-item__status--pending" aria-hidden="true">
                    <cts-icon name="cloud-upload"></cts-icon>
                </span>
                <img src="images/placeholder.jpg" alt="" class="upload-item__thumb imagePreview imagePasteTarget" />
                <div class="upload-item__body">
                    <p class="upload-item__hint">Use this form to upload additional images to the test log.</p>

                    <cts-form-field name="uploadDescription" id="uploadDescription"></cts-form-field>

                    <div class="upload-item__actions">
                        <label class="upload-filepicker">
                            <cts-icon name="camera" aria-hidden="true"></cts-icon>
                            <span>Select File</span>
                            <input type="file" accept=".jpg,.jpeg,.png,image/png,image/jpeg" hidden>
                        </label>
                        <cts-button class="uploadBtn" label="Upload" disabled></cts-button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

    <script>
        // cts-form-field is property-driven (Lit). Hand it a JSON-schema
        // fragment imperatively from the page so the field renders a
        // labelled "Description" text input via cts-form-field's standard
        // render path. The custom-element upgrade may run before or after
        // DOMContentLoaded depending on script order; assigning .schema is
        // safe in both orderings because Lit picks up the property on its
        // first render.
        document.addEventListener("DOMContentLoaded", () => {
            const field = document.querySelector('#additionalUploader cts-form-field');
            if (field) {
                field.schema = { type: 'string', title: 'Description' };
            }
        });
    </script>

</body>

</html>
