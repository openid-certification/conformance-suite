<style>
    .upload-page {
        /* Same --maxw-page column as `.schedule-test-page` / `.narrow-page`
           (oidf-app.css) so the form-shaped pages share one width. */
        max-width: var(--maxw-page);
        margin: 0 auto;
        padding: var(--space-5);
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
    }
    .upload-test-info {
        background: var(--bg-elev);
        border: 1px solid var(--border);
        border-radius: var(--radius-2);
        padding: var(--space-4);
        font-family: var(--font-sans);
        font-size: var(--fs-13);
        color: var(--fg);
    }
    /* Mirrors cts-plan-header's .planMeta dl grid. The minmax(0, 1fr)
       value track lets grid items shrink below their content size so
       overflow-wrap can break long unbroken tokens (test IDs, base64
       payload values) instead of widening the page. */
    .upload-test-info__meta {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        column-gap: var(--space-4);
        row-gap: var(--space-2);
        align-items: baseline;
        margin: 0;
    }
    .upload-test-info__label {
        font-size: var(--fs-12);
        font-weight: var(--fw-bold);
        color: var(--fg-soft);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0;
    }
    /* overflow-wrap: anywhere (not cts-plan-header's word-break:
       break-word) — breaks only when a token cannot otherwise fit,
       per the rationale in cts-log-entry.js. */
    .upload-test-info__value {
        overflow-wrap: anywhere;
        margin: 0;
    }
    /* cts-plan-header's .planSummary recipe; spans the full card width
       so the info-box matches the model at desktop instead of sitting
       in the value column. */
    .upload-test-info__summary {
        grid-column: 1 / -1;
        margin: 0;
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-2);
        background: var(--status-info-bg);
        color: var(--ink-900);
        border-left: 3px solid var(--status-info);
        overflow-wrap: anywhere;
    }
    @media (max-width: 640px) {
        /* Stack labels above values on phones: tight gap within a
           label/value pair, wider gap between pairs. */
        .upload-test-info__meta {
            grid-template-columns: 1fr;
            row-gap: var(--space-1);
        }
        .upload-test-info__label:not(:first-child) {
            margin-top: var(--space-2);
        }
    }
    .upload-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-3);
    }
    /* Reserve the control's height before the cts-link-button module
       upgrades the element — the pre-upgrade host is a zero-height
       inline box (visibility:hidden reserves no height; the label is
       an attribute, not light-DOM content), so without this the card
       below shifts down ~30px on cold loads. Mirrors layout.css's
       [full-width]:not(:defined) reservation. */
    .upload-return-link {
        min-height: var(--control-height);
    }
</style>

<script type="text/javascript">
    // Cap on ad-hoc additional uploads. The synthetic editable-description
    // slot is suppressed once the total number of image entries (pending +
    // existing) reaches this limit, mirroring the legacy behavior.
    var ADDITIONAL_UPLOAD_LIMIT = 2;
    var additionalSlotSeq = 0;
    var testId = null;
    var uploader = null;

    document.addEventListener("DOMContentLoaded", () => {
        var urlParams = new URLSearchParams(window.location.search);
        testId = urlParams.get('log');
        uploader = document.querySelector('cts-image-upload');
        uploader.testId = testId || '';

        // The return link renders immediately from the URL param rather
        // than waiting on /api/info/ — it stays usable even if that call
        // fails. With no usable test id there is nothing to return to,
        // so disable the link (cts-link-button drops the href when
        // disabled) instead of pointing at log-detail.html?log=.
        var returnLink = document.getElementById('returnToLog');
        if (testId) {
            returnLink.setAttribute('href', 'log-detail.html?log=' + encodeURIComponent(testId));
        } else {
            returnLink.setAttribute('disabled', '');
        }

        // The component fires cts-image-uploaded after every successful POST
        // (per-slot or ad-hoc). Re-fetch the server's image list so the
        // component renders the new uploaded image and re-evaluates whether
        // to keep offering the additional uploader slot. The toast is the
        // visible success confirmation — the legacy page surfaced nothing
        // beyond the table refresh, which left the user wondering whether
        // the request had actually landed.
        uploader.addEventListener('cts-image-uploaded', function() {
            if (typeof window.ctsToast === 'function') {
                window.ctsToast({ title: 'Image uploaded', kind: 'ok' });
            } else {
                // The fallback should be unreachable under normal page load
                // — cts-toast-api.js is a deferred module imported in <head>
                // and DOMContentLoaded runs after deferred modules evaluate.
                // Log so a regression (module fetch failure, import path
                // broken on a future page restructure) is observable
                // instead of silently swallowing the upload feedback.
                console.warn('[upload.html] window.ctsToast not available — toast skipped');
            }
            refreshImages();
        });

        FAPI_UI.showBusy();
        FAPI_UI.getUserInfo()
            .then(function() { return refreshImages(); })
            .then(function() { return getHeader(testId); })
            .finally(function() { FAPI_UI.hideBusy(); });
    });

    function refreshImages() {
        return fetch('/api/log/' + encodeURIComponent(testId) + '/images')
            .then(function(response) {
                if (!response.ok) return Promise.reject(response);
                return response.json();
            })
            .then(function(data) {
                var pending = [];
                var existing = [];
                _.each(data, function(item) {
                    if (item.upload) {
                        pending.push({
                            name: item.upload,
                            description: item.msg || '',
                        });
                    } else if (item.img) {
                        existing.push({
                            name: item._id,
                            url: item.img,
                        });
                    } else {
                        FAPI_UI.showError({
                            error: 'Unhandled image entry from logs: ' + item._id,
                        });
                    }
                });

                // Offer an ad-hoc upload slot until the total image count
                // reaches the limit. Each refresh mints a new client-side
                // name so the component re-keys after a successful upload.
                if (pending.length + existing.length < ADDITIONAL_UPLOAD_LIMIT) {
                    additionalSlotSeq += 1;
                    pending.push({
                        name: 'additional-' + additionalSlotSeq,
                        editableDescription: true,
                    });
                }

                uploader.pendingImages = pending;
                uploader.existingImages = existing;
            })
            .catch(handleApiError);
    }

    function getHeader(testId) {
        return fetch('/api/info/' + encodeURIComponent(testId))
            .then(function(response) {
                if (!response.ok) return Promise.reject(response);
                return response.json();
            })
            .then(function(data) {
                renderTestInfo(data);
            })
            .catch(handleApiError);
    }

    function renderTestInfo(test) {
        var container = document.getElementById('testInfo');
        container.replaceChildren();

        var meta = document.createElement('dl');
        meta.className = 'upload-test-info__meta';
        appendMetaRow(meta, 'Test Name', test.testName || '');
        appendMetaRow(meta, 'Test ID', test.testId || '');
        if (test.summary) {
            var summaryLabel = document.createElement('dt');
            summaryLabel.className = 'upload-test-info__label';
            summaryLabel.textContent = 'Summary';
            meta.appendChild(summaryLabel);
            var summaryValue = document.createElement('dd');
            summaryValue.className = 'upload-test-info__summary';
            summaryValue.textContent = test.summary;
            meta.appendChild(summaryValue);
        }
        container.appendChild(meta);
    }

    function appendMetaRow(parent, label, value) {
        var labelEl = document.createElement('dt');
        labelEl.className = 'upload-test-info__label';
        labelEl.textContent = label;
        parent.appendChild(labelEl);
        var valueEl = document.createElement('dd');
        valueEl.className = 'upload-test-info__value';
        valueEl.textContent = value;
        parent.appendChild(valueEl);
    }

    function handleApiError(error) {
        if (error instanceof Response) {
            var message = error.statusText;
            var responseClone = error.clone();
            error.text()
                .then(function(textError) {
                    try {
                        var errorObj = JSON.parse(textError);
                        if (errorObj.error && errorObj.error.length !== 0) {
                            message = errorObj.error;
                        }
                    } catch (e) {
                        // fall through to statusText
                    }
                    FAPI_UI.showError({code: error.status.toString(), error: message});
                })
                .catch(function() {
                    responseClone.json()
                        .then(function(jsonError) {
                            if (typeof jsonError === 'string' && jsonError.length !== 0) {
                                message = jsonError;
                            }
                            FAPI_UI.showError({code: error.status.toString(), error: message});
                        })
                        .catch(function() {
                            FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                        });
                });
        } else {
            FAPI_UI.showError({code: "", error: error});
        }
    }
</script>
