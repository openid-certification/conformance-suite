<script type="text/javascript">
    // Cap on ad-hoc additional uploads. The synthetic editable-description
    // slot is suppressed once the total number of image entries (pending +
    // existing) reaches this limit, mirroring the legacy behavior.
    var ADDITIONAL_UPLOAD_LIMIT = 2;
    var additionalSlotSeq = 0;
    var testId = null;
    var uploader = null;

    document.addEventListener("DOMContentLoaded", () => {
        var urlParams = new URLSearchParams(window.location.search);
        testId = urlParams.get('log');
        uploader = document.querySelector('cts-image-upload');
        uploader.testId = testId || '';

        // The component fires cts-image-uploaded after every successful POST
        // (per-slot or ad-hoc). Re-fetch the server's image list so the
        // component renders the new uploaded image and re-evaluates whether
        // to keep offering the additional uploader slot.
        uploader.addEventListener('cts-image-uploaded', function() {
            refreshImages();
        });

        FAPI_UI.showBusy();
        FAPI_UI.getUserInfo()
            .then(function() { return refreshImages(); })
            .then(function() { return getHeader(testId); })
            .finally(function() { FAPI_UI.hideBusy(); });
    });

    function refreshImages() {
        return fetch('/api/log/' + encodeURIComponent(testId) + '/images')
            .then(function(response) {
                if (!response.ok) return Promise.reject(response);
                return response.json();
            })
            .then(function(data) {
                var pending = [];
                var existing = [];
                _.each(data, function(item) {
                    if (item.upload) {
                        pending.push({
                            name: item.upload,
                            description: item.msg || '',
                        });
                    } else if (item.img) {
                        existing.push({
                            name: item._id,
                            url: item.img,
                        });
                    } else {
                        FAPI_UI.showError({
                            error: 'Unhandled image entry from logs: ' + item._id,
                        });
                    }
                });

                // Offer an ad-hoc upload slot until the total image count
                // reaches the limit. Each refresh mints a new client-side
                // name so the component re-keys after a successful upload.
                if (pending.length + existing.length < ADDITIONAL_UPLOAD_LIMIT) {
                    additionalSlotSeq += 1;
                    pending.push({
                        name: 'additional-' + additionalSlotSeq,
                        editableDescription: true,
                    });
                }

                uploader.pendingImages = pending;
                uploader.existingImages = existing;
            })
            .catch(handleApiError);
    }

    function getHeader(testId) {
        return fetch('/api/info/' + encodeURIComponent(testId))
            .then(function(response) {
                if (!response.ok) return Promise.reject(response);
                return response.json();
            })
            .then(function(data) {
                renderTestInfo(data);
            })
            .catch(handleApiError);
    }

    function renderTestInfo(test) {
        var container = document.getElementById('testInfo');
        container.replaceChildren();

        var meta = document.createElement('div');
        meta.className = 'upload-test-info__meta';
        appendMetaRow(meta, 'Test Name:', test.testName || '');
        appendMetaRow(meta, 'Test ID:', test.testId || '');
        if (test.summary) {
            var summaryLabel = document.createElement('span');
            summaryLabel.className = 'upload-test-info__label';
            summaryLabel.textContent = 'Summary:';
            meta.appendChild(summaryLabel);
            var summaryValue = document.createElement('p');
            summaryValue.className = 'upload-test-info__summary';
            summaryValue.textContent = test.summary;
            meta.appendChild(summaryValue);
        }
        container.appendChild(meta);

        var actionWrapper = document.createElement('div');
        var returnLink = document.createElement('cts-link-button');
        returnLink.setAttribute('full-width', '');
        returnLink.setAttribute('href', 'log-detail.html?log=' + encodeURIComponent(test.testId || ''));
        returnLink.setAttribute('icon', 'bookmark');
        returnLink.setAttribute('label', 'Return to test log');
        actionWrapper.appendChild(returnLink);
        container.appendChild(actionWrapper);
    }

    function appendMetaRow(parent, label, value) {
        var labelEl = document.createElement('span');
        labelEl.className = 'upload-test-info__label';
        labelEl.textContent = label;
        parent.appendChild(labelEl);
        var valueEl = document.createElement('span');
        valueEl.className = 'upload-test-info__value';
        valueEl.textContent = value;
        parent.appendChild(valueEl);
    }

    function handleApiError(error) {
        if (error instanceof Response) {
            var message = error.statusText;
            var responseClone = error.clone();
            error.text()
                .then(function(textError) {
                    try {
                        var errorObj = JSON.parse(textError);
                        if (errorObj.error && errorObj.error.length !== 0) {
                            message = errorObj.error;
                        }
                    } catch (e) {
                        // fall through to statusText
                    }
                    FAPI_UI.showError({code: error.status.toString(), error: message});
                })
                .catch(function() {
                    responseClone.json()
                        .then(function(jsonError) {
                            if (typeof jsonError === 'string' && jsonError.length !== 0) {
                                message = jsonError;
                            }
                            FAPI_UI.showError({code: error.status.toString(), error: message});
                        })
                        .catch(function() {
                            FAPI_UI.showError({code: error.status.toString(), error: error.statusText});
                        });
                });
        } else {
            FAPI_UI.showError({code: "", error: error});
        }
    }
</script>
