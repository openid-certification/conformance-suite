<!DOCTYPE html>
<html>
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <title>OIDF Conformance: Available logs</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">

    <!-- Boostrap Icons -->
    <link rel="stylesheet" href="/vendor/bootstrap-icons/css/bootstrap-icons.css">

    <!-- Optional theme -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Sans">
    <link rel="stylesheet" type="text/css" href="css/layout.css">

    <link rel="stylesheet" href="/vendor/datatables/css/dataTables.bootstrap5.min.css">

    <!-- Popper (necessary for Bootstrap's tooltips) -->
    <script src="/vendor/popper/js/popper.min.js"></script>
    <!-- Latest compiled and minified JavaScript -->
    <script src="/vendor/bootstrap/js/bootstrap.min.js"></script>

    <script src="/vendor/lodash/js/lodash.min.js"></script>
    <script src="/vendor/clipboard/js/clipboard.min.js"></script>

    <!-- jQuery (necessary for DataTables -->
    <script src="/vendor/jquery/js/jquery.min.js"></script>
    <!-- DataTables -->
    <script src="/vendor/datatables/js/jquery.dataTables.min.js"></script>
    <script src="/vendor/datatables/js/dataTables.bootstrap5.min.js"></script>

    <script type="text/javascript" src="js/fapi.ui.js"></script>
    <script type="importmap">{"imports":{"lit":"/vendor/lit/lit.js","lit/":"/vendor/lit/","@lit/reactive-element":"/vendor/lit/lit.js","@lit/reactive-element/":"/vendor/lit/","lit-html":"/vendor/lit/lit.js","lit-html/":"/vendor/lit/","lit-element/":"/vendor/lit/"}}</script>
    <script type="module" src="/components/cts-navbar.js"></script>
    <script type="module" src="/components/cts-modal.js"></script>
</head>

<body>

    <cts-navbar current-page="logs"></cts-navbar>

    <!-- resident DOM -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">

                <table id="logsListing" class="table table-striped table-bordered table-hover">
                    <thead>
                    </thead>

                    <tbody>
                    </tbody>
                </table>

            </div>
        </div>
    </div>


    <cts-modal id="errorModal" heading="Error">
        Error: <span id="errorMessage"></span>
    </cts-modal>

    <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
        <div class="text-center">
            <img src="/images/spinner.gif" width="100px" height="30px" alt="Loading" />
        </div>
        <div>
            <span id="loadingMessage"></span>
        </div>
    </cts-modal>

    <cts-modal id="configModal" heading="Configuration">
        <div>
            <button class="btn-clipboard btn btn-sm" data-clipboard-target="#config" title="Copy config to clipboard">
                <span class="bi bi-box-arrow-in-right"></span>
            </button>
            Configuration for <code id="configTestId" class="text-muted"></code>
        </div>
        <div class="wrapLongStrings">
            <pre id="config" class="row-bg-light p-1"></pre>
        </div>
    </cts-modal>


    <script>
        /**
         *
         */
        document.addEventListener("DOMContentLoaded", () => {
            var urlParams = new URLSearchParams(window.location.search);
            var public = Boolean(urlParams.get('public'));

            FAPI_UI.showBusy();
            FAPI_UI.loadLogListTemplates()
            .then(function() {
                return FAPI_UI.getUserInfo();
            }).then(function() {
                return loadAvailableLogs(public);
            }).finally(function() {
                FAPI_UI.hideBusy();
            });

            var clipboard = new ClipboardJS('.btn-clipboard');
            clipboard.on('success', function(e) {
                console.log(e);
            });
            clipboard.on('error', function(e) {
                console.log(e);
            });
        });

        /**
         *
         */

        /**
         *
         */
        function loadAvailableLogs(public) {
            return new Promise((resolve, reject) => {
                const dataTable = $('#logsListing').DataTable({
                    serverSide: true,
                    ajax: {
                        url: '/api/log' + (public ? '?public=true' : ''),
                        cache: true,
                        data: function(data) {
                            // Translate query parameters into a simpler schema
                            return {
                                draw: data.draw,
                                start: data.start,
                                length: data.length,
                                search: data.search.value,
                                order: _.map(data.order, function(x) {
                                    return data.columns[x.column].data + ',' + x.dir;
                                }).join(',')
                            };
                        },
                        error: function(jqxhr, status, error) {
                            FAPI_UI.showError(jqxhr.responseJSON ? jqxhr.responseJSON : {
                                code: jqxhr.status,
                                error: error
                            });
                        }
                    },
                    columns: [
                        {
                            title: 'Instance ID',
                            data: 'testId',
                            render: {
                                display: function(data) { return FAPI_UI.logTemplates.LOG_DETAIL({ id: data, public: public }); }
                            }
                        },
                        {
                            title: 'Config',
                            data: null,
                            render: {
                                display: function() { return FAPI_UI.logTemplates.CONFIG(); }
                            },
                            createdCell: function(cell) { $(cell).addClass('configColumn'); },
                            orderable: false,
                            visible: !public
                        },
                        {
                            title: 'Name',
                            data: 'testName',
                            render: $('#logsListing').DataTable.render.text()
                        },
                        {
                            title: 'Variant',
                            data: 'variant',
                            defaultContent: '',
                            render: {
                                display: function(v) { return FAPI_UI.formatVariant(v); }
                            }
                        },
                        {
                            title: 'Description',
                            data: 'description',
                            render: $('#logsListing').DataTable.render.text(),
                            defaultContent: ''
                        },
                        {
                            title: 'Started',
                            data: 'started',
                            render: {
                                display: function(data) { return FAPI_UI.logTemplates.DATE({ date: data }); }
                            }
                        },
                        {
                            title: 'Plan ID',
                            data: 'planId',
                            defaultContent: '',
                            render: {
                                display: function(data) {
                                    if (data)
                                        return FAPI_UI.logTemplates.PLAN_DETAIL({ id: data, public: public });
                                    else
                                        return '';
                                }
                            }
                        },
                        {
                            title: 'Status',
                            data: 'status',
                            defaultContent: ''
                        },
                        {
                            title: 'Result',
                            data: 'result',
                            defaultContent: ''
                        },
                        {
                            title: 'Owner',
                            data: function(row) { return { owner: row.owner ? row.owner : {} }; },
                            render: {
                                display: function(data) { return FAPI_UI.logTemplates.OWNER(data); }
                            },
                            visible: !public && FAPI_UI.currentUser && FAPI_UI.currentUser.isAdmin
                        }
                    ],
                    createdRow: function(row, data) {
                        // wire up configuration button
                        $('.showConfigBtn', row).click(function(evt) {
                            evt.preventDefault();

                            fetch('/api/plan/' + encodeURIComponent(data.planId) + (public ? '?public=true' : ''))
                                .then((response) => {
                                    if (!response.ok) {
                                        return Promise.reject(response);
                                    }

                                    return response.json();
                                }).then(jsonData => {


                                $('#config').html(_.escape(JSON.stringify(jsonData.config, null, 4)));
                                $('#configTestId').html(_.escape(data.testId));

                                var myModalEl = document.getElementById('configModal');
                                var modal     = bootstrap.Modal.getOrCreateInstance(myModalEl);
                                modal.show();
                            });
                        });
                    },
                    pagingType: "simple",
                    language: {
                        info: "Showing _START_ to _END_",
                        infoEmpty: "No entries to show",
                        infoFiltered: ""
                    },
                    initComplete: function() {
                        var api = this.api();
                        var container = api.table().container();
                        var searchInput = $('div.dataTables_filter input', container);

                        // Disable default live-search behaviour
                        searchInput.off();

                        // Add a search button after the input
                        var searchBtn = $('<button type="button" class="btn btn-sm btn-primary ms-2"><i class="bi bi-search"></i> Search</button>');
                        searchInput.after(searchBtn);

                        function doSearch() {
                            FAPI_UI.showBusy('Searching...');
                            api.search(searchInput.val()).draw();
                        }

                        searchBtn.on('click', doSearch);

                        searchInput.on('keydown', function(e) {
                            if (e.key === 'Enter' || e.keyCode === 13) {
                                e.preventDefault();
                                doSearch();
                            }
                        });

                        // Hide busy indicator when AJAX completes
                        api.on('xhr.dt', function() {
                            FAPI_UI.hideBusy();
                        });
                    },
                    order: [[5, "desc"]] // sort by the "date" column, descending, by default
                });

                dataTable.on('xhr.dt', function() {
                    resolve(dataTable); // Resolve with the DataTable instance if needed
                });

                // Handle potential errors (optional)
                dataTable.on('error.dt', function(e, settings, techNote, message) {
                    reject(new Error(message));
                });
            });
        }
    </script>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

</body>

</html>
