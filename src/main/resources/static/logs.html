<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <title>OIDF Conformance: Available logs</title>

    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter/Inter-Variable.woff2" crossorigin>
    <link rel="stylesheet" href="/css/oidf-tokens.css">
    <link rel="stylesheet" type="text/css" href="css/layout.css">
    <link rel="stylesheet" href="/css/oidf-app.css">

    <script src="/vendor/lodash/js/lodash.min.js"></script>

    <script type="text/javascript" src="js/fapi.ui.js"></script>
    <script>window.litDisableBundleWarning = true;</script>
    <script type="importmap">{"imports":{"lit":"/vendor/lit/lit.js","lit/":"/vendor/lit/","lit/directives/async-append.js":"/vendor/lit/lit.js","lit/directives/async-replace.js":"/vendor/lit/lit.js","lit/directives/cache.js":"/vendor/lit/lit.js","lit/directives/choose.js":"/vendor/lit/lit.js","lit/directives/class-map.js":"/vendor/lit/lit.js","lit/directives/guard.js":"/vendor/lit/lit.js","lit/directives/if-defined.js":"/vendor/lit/lit.js","lit/directives/join.js":"/vendor/lit/lit.js","lit/directives/keyed.js":"/vendor/lit/lit.js","lit/directives/live.js":"/vendor/lit/lit.js","lit/directives/map.js":"/vendor/lit/lit.js","lit/directives/range.js":"/vendor/lit/lit.js","lit/directives/ref.js":"/vendor/lit/lit.js","lit/directives/repeat.js":"/vendor/lit/lit.js","lit/directives/style-map.js":"/vendor/lit/lit.js","lit/directives/template-content.js":"/vendor/lit/lit.js","lit/directives/unsafe-html.js":"/vendor/lit/lit.js","lit/directives/unsafe-svg.js":"/vendor/lit/lit.js","lit/directives/until.js":"/vendor/lit/lit.js","lit/directives/when.js":"/vendor/lit/lit.js","@lit/reactive-element":"/vendor/lit/lit.js","@lit/reactive-element/":"/vendor/lit/","lit-html":"/vendor/lit/lit.js","lit-html/":"/vendor/lit/","lit-element/":"/vendor/lit/","marked":"/vendor/marked/marked.esm.js","dompurify":"/vendor/dompurify/purify.es.mjs"}}</script>
    <script type="module" src="/components/cts-navbar.js"></script>
    <script type="module" src="/components/cts-modal.js"></script>
    <script type="module" src="/components/cts-spinner.js"></script>
    <script type="module" src="/components/cts-log-list.js"></script>
    <script type="module" src="/js/cts-toast-api.js"></script>
    <script type="module" src="/components/cts-footer.js"></script>
</head>

<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="logs"></cts-navbar>

    <main id="main-content" class="listing-page">
        <!-- The cts-log-list component owns its own search input, filter
             chip groups, sort selector, list-of-cards rendering, active-
             filter summary, pagination ("Show more"), and config-viewer
             modal. The element is created imperatively in the boot script
             below so `is-public` / `is-admin` are set BEFORE the element's
             connectedCallback() fires its initial `/api/log` fetch — the
             component reads both attrs once at connect time. -->
        <div id="logsListingMount"></div>
    </main>


    <cts-modal id="errorModal" heading="Error">
        Error: <span id="errorMessage"></span>
    </cts-modal>

    <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
        <cts-spinner size="lg" label="Loading"></cts-spinner>
        <div aria-live="polite">
            <span id="loadingMessage"></span>
        </div>
    </cts-modal>


    <script type="module">
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isPublic = Boolean(urlParams.get("public"));

            FAPI_UI.showBusy();
            try {
                await FAPI_UI.getUserInfo();
                // Wait for the registration so attributes set below take
                // effect synchronously before connectedCallback runs.
                await customElements.whenDefined("cts-log-list");
                const list = document.createElement("cts-log-list");
                list.id = "logsListing";
                if (isPublic) list.setAttribute("is-public", "");
                if (!isPublic && FAPI_UI.currentUser && FAPI_UI.currentUser.isAdmin) {
                    list.setAttribute("is-admin", "");
                }
                document.getElementById("logsListingMount").replaceChildren(list);
            } finally {
                FAPI_UI.hideBusy();
            }
        });
    </script>

    <cts-footer></cts-footer>

    <cts-toast-host></cts-toast-host>
</body>

</html>
