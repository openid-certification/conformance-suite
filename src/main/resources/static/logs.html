    <title>OIDF Conformance: Test Logs</title>

    <link rel="stylesheet" href="/css/oidf-tokens.css">
    <link rel="stylesheet" type="text/css" href="css/layout.css">
    <link rel="stylesheet" href="/css/oidf-app.css">

    <script type="module" src="/components/cts-navbar.js"></script>
    <script type="module" src="/components/cts-modal.js"></script>
    <script type="module" src="/components/cts-spinner.js"></script>
    <script type="module" src="/components/cts-view-tabs.js"></script>
    <script type="module" src="/components/cts-run-status-strip.js"></script>
    <script type="module" src="/components/cts-log-list.js"></script>

</head>

<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="logs"></cts-navbar>

    <main id="main-content" class="listing-page">
        <!-- The Published-view descriptor (R22) lives as a help tooltip on the
             Published tab inside cts-view-tabs (published-help), not as a page
             heading or persistent paragraph. -->
        <cts-view-tabs id="viewTabs" dataset-noun="Test Logs" published-help="Published test logs are conformance results that implementers have chosen to make public. Browse them to review how products performed against the OpenID specifications."></cts-view-tabs>
        <!-- The in-progress / failing runs strip is user-scoped run telemetry,
             shown on the authenticated My tab only. It is page-driven (KTD5):
             the boot script below calls fetchRuns() on the authed My view and
             hide() for anon / Published; the component never self-fetches. The
             host is resident so css/layout.css can reserve its height before the
             module upgrades (no first-paint shift). -->
        <cts-run-status-strip id="runStatusStrip"></cts-run-status-strip>
        <script>
            // Cache-first auth guess: set `authenticated` on the tabs
            // synchronously so a returning authed user does not see the My tab
            // pop in after /api/currentuser resolves. The authoritative value
            // is set by the async probe in the boot script below. Reuses
            // cts-navbar's sessionStorage cache key (shared contract).
            (function () {
                var tabs = document.getElementById('viewTabs');
                var strip = document.getElementById('runStatusStrip');
                var cachedUser = null;
                try { cachedUser = sessionStorage.getItem('cts-navbar:user'); } catch (e) {}
                if (cachedUser) { tabs.setAttribute('authenticated', ''); }
                // ?public=true is the public results browser; the personal-home
                // strip is out of place there, so start it hidden to skip the
                // first-paint skeleton before auth resolves (mirrors plans.html).
                var params = new URLSearchParams(window.location.search);
                if (strip && params.get('public') === 'true') {
                    strip.setAttribute('start-hidden', '');
                }
            })();
        </script>
        <!-- The cts-log-list component owns its own search input, filter
             chip groups, sort selector, list-of-cards rendering, active-
             filter summary, pagination ("Show more"), and config-viewer
             modal. The element is created imperatively in the boot script
             below so `is-public` / `is-admin` are set BEFORE the element's
             connectedCallback() fires its initial `/api/log` fetch — the
             component reads both attrs once at connect time. -->
        <div id="logsListingMount"></div>
    </main>


    <cts-modal id="errorModal" heading="Error">
        Error: <span id="errorMessage"></span>
    </cts-modal>

    <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
        <cts-spinner size="lg" label="Loading"></cts-spinner>
        <div aria-live="polite">
            <span id="loadingMessage"></span>
        </div>
    </cts-modal>


    <script type="module">
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            // Canonical Published signal: ?public=true exactly, matching
            // cts-view-tabs and plans.html. NOT Boolean(get("public")), which
            // is truthy for any value (so ?public=false would wrongly render
            // Published).
            const explicitPublic = urlParams.get("public") === "true";
            const viewTabs = document.getElementById("viewTabs");
            const runStatusStrip = document.getElementById("runStatusStrip");

            FAPI_UI.showBusy();
            try {
                await FAPI_UI.getUserInfo();
                // Authoritative auth state on the tabs (the synchronous
                // cached-user guess above may have been stale/absent). A
                // successful /api/currentuser means authenticated; a 401 is
                // swallowed by getUserInfo, leaving currentUser unset (R23).
                const authenticated = !!FAPI_UI.currentUser;
                if (authenticated) {
                    viewTabs.setAttribute("authenticated", "");
                } else {
                    viewTabs.removeAttribute("authenticated");
                }
                // Effective view: ?public=true → Published unconditionally
                // (the dataset decision does not depend on auth); otherwise
                // authed → My (is-public absent), anon → Published (R6/AE3).
                const isPublic = explicitPublic || !authenticated;

                // Wait for the registration so attributes set below take
                // effect synchronously before connectedCallback runs.
                await customElements.whenDefined("cts-log-list");
                const list = document.createElement("cts-log-list");
                list.id = "logsListing";
                if (isPublic) list.setAttribute("is-public", "");
                // Set is-admin whenever the user is admin; cts-log-list ignores
                // it in public mode, so this stays correct across a Published→My
                // switch without needing to re-set it on tab change.
                if (FAPI_UI.currentUser && FAPI_UI.currentUser.isAdmin) {
                    list.setAttribute("is-admin", "");
                }
                document.getElementById("logsListingMount").replaceChildren(list);

                // Drive the runs strip off the same single auth probe (no second
                // /api/currentuser round-trip). It shows only on the authenticated
                // My view and fetches its OWN unfiltered /api/log window; anon and
                // the Published view hide it. On the ?public=true path it was
                // already started hidden synchronously, so this hide() is a no-op.
                if (runStatusStrip) {
                    if (authenticated && !isPublic) {
                        runStatusStrip.fetchRuns();
                    } else {
                        runStatusStrip.hide();
                    }
                }

                // A single handler serves BOTH the tab click and the
                // back/forward popstate — cts-view-tabs emits cts-view-tab-change
                // for both. On a view change, switch the dataset and reset the
                // status/result chip filters (R16) via reloadForViewChange().
                viewTabs.addEventListener("cts-view-tab-change", (evt) => {
                    const isPublicView = !!(evt.detail && evt.detail.isPublic);
                    if (isPublicView) {
                        list.setAttribute("is-public", "");
                    } else {
                        list.removeAttribute("is-public");
                    }
                    list.reloadForViewChange();
                    // The strip is a personal-home signal: refresh it on a return
                    // to My, hide it on Published. Only authed users have a My tab
                    // to switch to, so fetchRuns() here is always on an authed view.
                    if (runStatusStrip) {
                        if (isPublicView) {
                            runStatusStrip.hide();
                        } else {
                            runStatusStrip.fetchRuns();
                        }
                    }
                });
            } finally {
                FAPI_UI.hideBusy();
            }
        });
    </script>

    <cts-footer></cts-footer>

    <cts-toast-host></cts-toast-host>
</body>

</html>
