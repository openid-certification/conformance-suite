    <script type="module" src="/components/cts-view-tabs.js"></script>

<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="plans"></cts-navbar>

    <main id="main-content" class="listing-page">
        <header class="listing-page-header">
            <h1 class="listing-page-title">Test Plans</h1>
            <!-- Persistent Published-view descriptor (R22). Ships `hidden`; the
                 first-paint boot below reveals it only when the Published view is
                 the active dataset, and the cts-view-tab-change handler toggles it
                 thereafter. Orients first-time and anonymous visitors without
                 intruding on the authenticated My view. -->
            <p class="listing-page-desc" id="publishedDesc" hidden>Published test plans are conformance test configurations that implementers have chosen to make public. Browse them to see how others set up certification tests, or schedule your own.</p>
        </header>
        <cts-view-tabs id="viewTabs" create-test-href="schedule-test.html"></cts-view-tabs>
        <cts-run-status-strip id="runStatusStrip"></cts-run-status-strip>
        <cts-plan-list id="plansListing"></cts-plan-list>
        <script>
            // First-paint gating (KTD3). This runs SYNCHRONOUSLY, before the
            // deferred component modules evaluate — i.e. before cts-plan-list's
            // connectedCallback fires its initial /api/plan fetch.
            //
            // - ?public=true present → Published is anonymous-permitted and
            //   unambiguous, so fetch it now at connect (no auth gate). This
            //   keeps the no-flash contract: exactly one /api/plan request and
            //   it carries public=true (AE4). The runs strip is a personal-home
            //   signal, out of place on the public browser, so start it hidden
            //   on this path (no skeleton flash before auth resolves).
            // - No public param → the default (My for authed, Published for
            //   anon) depends on auth, which resolves async. Suppress the
            //   connect-time fetch (defer-initial-fetch) and show the list
            //   loading state; the auth probe below resolves the dataset and
            //   triggers the fetch (AE5: no premature Published fetch; R17).
            (function () {
                var params = new URLSearchParams(window.location.search);
                var listing = document.getElementById('plansListing');
                var tabs = document.getElementById('viewTabs');
                var strip = document.getElementById('runStatusStrip');
                var desc = document.getElementById('publishedDesc');
                // Cache-first auth guess avoids a My-tab flash for returning
                // authed users; the authoritative value is set by the async
                // /api/currentuser probe below. Reuses cts-navbar's
                // sessionStorage cache key (shared contract).
                var cachedUser = null;
                try { cachedUser = sessionStorage.getItem('cts-navbar:user'); } catch (e) {}
                // Seed the My tab from the cache so a returning authed user does
                // not see it flash in after the async probe; the probe below is
                // authoritative. (The Schedule-test CTA is unconditional, so it
                // needs no auth seeding.)
                if (cachedUser) {
                    tabs.setAttribute('authenticated', '');
                }
                if (params.get('public') === 'true') {
                    listing.setAttribute('is-public', '');
                    if (strip) { strip.setAttribute('start-hidden', ''); }
                    // Published is unambiguous on this path → show the descriptor now.
                    if (desc) { desc.hidden = false; }
                } else {
                    listing.setAttribute('defer-initial-fetch', '');
                    // Mirror the My-tab cache guess for the descriptor: a returning
                    // authed user defaults to My (descriptor stays hidden); an
                    // anon/unknown visitor defaults to Published (descriptor shown).
                    // The async probe below corrects this authoritatively.
                    if (desc && !cachedUser) { desc.hidden = false; }
                }
            })();
        </script>
    </main>

    <script type="text/javascript">
        // cts-plan-list owns fetch/render/modal/copy wiring. The page resolves
        // session-derived state (auth + isAdmin via /api/currentuser), drives
        // the My/Published tabs, and routes the component's cts-plan-navigate
        // event into a real page navigation. The is-public / defer-initial-fetch
        // attributes are set synchronously in the inline block above because
        // they must land before the component's connectedCallback fires (KTD3).
        document.addEventListener('DOMContentLoaded', () => {
            const planList = document.querySelector('cts-plan-list');
            const viewTabs = document.getElementById('viewTabs');
            const runStatusStrip = document.getElementById('runStatusStrip');
            const publishedDesc = document.getElementById('publishedDesc');
            if (!planList) return;

            // A single handler serves BOTH the tab click and the back/forward
            // popstate — cts-view-tabs emits the same event for both.
            if (viewTabs) {
                viewTabs.addEventListener('cts-view-tab-change', (evt) => {
                    const isPublic = !!(evt.detail && evt.detail.isPublic);
                    if (isPublic) {
                        planList.setAttribute('is-public', '');
                    } else {
                        planList.removeAttribute('is-public');
                    }
                    planList.fetchPlans();
                    // Descriptor follows the active view (descriptor ⟺ Published).
                    if (publishedDesc) { publishedDesc.hidden = !isPublic; }
                    // The runs strip is a personal-home signal: refresh it on a
                    // return to My, hide it on Published (the public browser).
                    // Only authed users have a My tab to switch to, so a
                    // fetchRuns() here is always on an authenticated view.
                    if (runStatusStrip) {
                        if (isPublic) {
                            runStatusStrip.hide();
                        } else {
                            runStatusStrip.fetchRuns();
                        }
                    }
                });
            }

            fetch('/api/currentuser')
                .then((response) => {
                    // A successful /api/currentuser means authenticated; a 401
                    // means anonymous (R23). Resolve to the user object or null.
                    if (!response.ok) return null;
                    return response.json();
                })
                .then((user) => {
                    const authenticated = !!user;
                    if (viewTabs) {
                        if (authenticated) {
                            viewTabs.setAttribute('authenticated', '');
                        } else {
                            viewTabs.removeAttribute('authenticated');
                        }
                    }
                    if (user && user.isAdmin) {
                        planList.setAttribute('is-admin', '');
                    }
                    // Resolve the deferred (no-public-param) first-paint fetch:
                    // authed → My (is-public absent); anon → Published (AE3).
                    if (planList.hasAttribute('defer-initial-fetch')) {
                        if (!authenticated) {
                            planList.setAttribute('is-public', '');
                        }
                        planList.removeAttribute('defer-initial-fetch');
                        planList.fetchPlans();
                        // Resolve the descriptor against the authoritative view:
                        // anon → Published (show), authed → My (hide). Corrects
                        // the cache-based guess from the synchronous boot.
                        if (publishedDesc) { publishedDesc.hidden = authenticated; }
                    }
                    // Drive the runs strip off the same single auth probe (no
                    // second /api/currentuser round-trip). It shows only on the
                    // authenticated My view; anon (R9) and the Published view
                    // hide it — the latter was already started hidden in the
                    // synchronous block, so this hide() is a no-op there.
                    if (runStatusStrip) {
                        const isPublicView =
                            new URLSearchParams(window.location.search).get('public') === 'true';
                        if (authenticated && !isPublicView) {
                            runStatusStrip.fetchRuns();
                        } else {
                            runStatusStrip.hide();
                        }
                    }
                })
                .catch(() => {
                    // Network failure: fall back to a fetch so the user still
                    // sees a plan list rather than a stuck loading state. Leave
                    // the default (non-admin, My) view. Mirrors the
                    // tokens.html auth-probe fallback.
                    if (planList.hasAttribute('defer-initial-fetch')) {
                        planList.removeAttribute('defer-initial-fetch');
                        planList.fetchPlans();
                        // Fallback renders the default My view → keep the
                        // descriptor⟺Published invariant by hiding it.
                        if (publishedDesc) { publishedDesc.hidden = true; }
                    }
                    // Auth is unknown on a probe failure — hide the strip rather
                    // than fetch /api/log for a possibly-anonymous visitor (R9).
                    if (runStatusStrip) {
                        runStatusStrip.hide();
                    }
                });

            planList.addEventListener('cts-plan-navigate', (evt) => {
                const planId = evt.detail && evt.detail.planId;
                if (!planId) return;
                window.location.href = 'plan-detail.html?plan=' + encodeURIComponent(planId);
            });
        });
    </script>

    <cts-footer></cts-footer>

    <cts-toast-host></cts-toast-host>
</body>

</html>
