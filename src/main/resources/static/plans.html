<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="plans"></cts-navbar>

    <main id="main-content" class="listing-page">
        <!-- The Published-view descriptor (R22) lives as a help tooltip on the
             Published tab inside cts-view-tabs (published-help), not as a page
             heading or persistent paragraph. -->
        <cts-view-tabs id="viewTabs" dataset-noun="Test Plans" create-test-href="schedule-test.html" published-help="Published test plans are conformance test configurations that implementers have chosen to make public. Browse them to see how others set up certification tests, or schedule your own."></cts-view-tabs>
        <!-- Theming spike: partner certification programs (pre-baked test
             configurations from the active theme). Hidden until the theme
             fetch resolves with presets — anonymous visitors never receive
             presets, so the strip stays absent for them. -->
        <section id="partnerPrograms" hidden aria-labelledby="partnerProgramsHeading">
            <style>
                #partnerPrograms { margin: var(--space-5) 0; }
                #partnerPrograms h2 {
                    font-size: var(--fs-14); font-weight: var(--fw-bold);
                    color: var(--fg-muted); margin: 0 0 var(--space-3);
                    text-transform: uppercase; letter-spacing: 0.04em;
                }
                #partnerPrograms .preset-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--space-4); }
                #partnerPrograms a.preset-card {
                    display: flex; flex-direction: column; gap: var(--space-2);
                    padding: var(--space-4); text-decoration: none;
                    border: 1px solid var(--border); border-left: 3px solid var(--orange-400);
                    border-radius: var(--radius-2); background: var(--bg-elev); color: var(--fg);
                }
                #partnerPrograms a.preset-card:hover { border-color: var(--orange-400); }
                #partnerPrograms a.preset-card:focus-visible { outline: none; box-shadow: var(--focus-ring); }
                #partnerPrograms .preset-card .title { font-weight: var(--fw-bold); }
                #partnerPrograms .preset-card .desc { font-size: var(--fs-13); color: var(--fg-muted); }
                #partnerPrograms .preset-card .cta { font-size: var(--fs-13); color: var(--fg-link); font-weight: var(--fw-bold); }
            </style>
            <h2 id="partnerProgramsHeading"></h2>
            <div class="preset-cards"></div>
        </section>
        <script type="module">
            // Theming spike: render the partner's pre-baked configurations as
            // entry cards. Each links to schedule-test.html?preset=<id>, which
            // pre-selects the plan, variants and configuration.
            import { getTheme } from "/js/theme-client.js";
            getTheme().then((theme) => {
                const presets = (theme && theme.presets) || [];
                if (presets.length === 0) return;
                const section = document.getElementById("partnerPrograms");
                const heading = document.getElementById("partnerProgramsHeading");
                const partner = (theme.partner && theme.partner.name) || "Partner";
                heading.textContent = `Certification programs from ${partner}`;
                const cards = section.querySelector(".preset-cards");
                for (const preset of presets) {
                    if (!preset || !preset.id || !preset.label) continue;
                    const card = document.createElement("a");
                    card.className = "preset-card";
                    card.href = "schedule-test.html?preset=" + encodeURIComponent(preset.id);
                    const title = document.createElement("span");
                    title.className = "title";
                    title.textContent = preset.label;
                    const desc = document.createElement("span");
                    desc.className = "desc";
                    desc.textContent = preset.description || "";
                    const cta = document.createElement("span");
                    cta.className = "cta";
                    cta.textContent = "Start pre-configured test →";
                    card.append(title, desc, cta);
                    cards.appendChild(card);
                }
                section.hidden = false;
            });
        </script>
        <cts-plan-list id="plansListing"></cts-plan-list>
        <script>
            // First-paint gating (KTD3). This runs SYNCHRONOUSLY, before the
            // deferred component modules evaluate — i.e. before cts-plan-list's
            // connectedCallback fires its initial /api/plan fetch.
            //
            // - ?public=true present → Published is anonymous-permitted and
            //   unambiguous, so fetch it now at connect (no auth gate). This
            //   keeps the no-flash contract: exactly one /api/plan request and
            //   it carries public=true (AE4).
            // - No public param → the default (My for authed, Published for
            //   anon) depends on auth, which resolves async. Suppress the
            //   connect-time fetch (defer-initial-fetch) and show the list
            //   loading state; the auth probe below resolves the dataset and
            //   triggers the fetch (AE5: no premature Published fetch; R17).
            (function () {
                var params = new URLSearchParams(window.location.search);
                var listing = document.getElementById('plansListing');
                var tabs = document.getElementById('viewTabs');
                // Cache-first auth guess avoids a My-tab flash for returning
                // authed users; the authoritative value is set by the async
                // /api/currentuser probe below. Reuses cts-navbar's
                // sessionStorage cache key (shared contract).
                var cachedUser = null;
                try { cachedUser = sessionStorage.getItem('cts-navbar:user'); } catch (e) {}
                // Seed the My tab from the cache so a returning authed user does
                // not see it flash in after the async probe; the probe below is
                // authoritative. (The Schedule-test CTA is unconditional, so it
                // needs no auth seeding.)
                if (cachedUser) {
                    tabs.setAttribute('authenticated', '');
                }
                if (params.get('public') === 'true') {
                    listing.setAttribute('is-public', '');
                } else {
                    listing.setAttribute('defer-initial-fetch', '');
                }
            })();
        </script>
    </main>

    <script type="text/javascript">
        // cts-plan-list owns fetch/render/modal/copy wiring. The page resolves
        // session-derived state (auth + isAdmin via /api/currentuser), drives
        // the My/Published tabs, and routes the component's cts-plan-navigate
        // event into a real page navigation. The is-public / defer-initial-fetch
        // attributes are set synchronously in the inline block above because
        // they must land before the component's connectedCallback fires (KTD3).
        document.addEventListener('DOMContentLoaded', () => {
            const planList = document.querySelector('cts-plan-list');
            const viewTabs = document.getElementById('viewTabs');
            if (!planList) return;

            // A single handler serves BOTH the tab click and the back/forward
            // popstate — cts-view-tabs emits the same event for both.
            if (viewTabs) {
                viewTabs.addEventListener('cts-view-tab-change', (evt) => {
                    const isPublic = !!(evt.detail && evt.detail.isPublic);
                    if (isPublic) {
                        planList.setAttribute('is-public', '');
                    } else {
                        planList.removeAttribute('is-public');
                    }
                    planList.fetchPlans();
                });
            }

            fetch('/api/currentuser')
                .then((response) => {
                    // A successful /api/currentuser means authenticated; a 401
                    // means anonymous (R23). Resolve to the user object or null.
                    if (!response.ok) return null;
                    return response.json();
                })
                .then((user) => {
                    const authenticated = !!user;
                    if (viewTabs) {
                        if (authenticated) {
                            viewTabs.setAttribute('authenticated', '');
                        } else {
                            viewTabs.removeAttribute('authenticated');
                        }
                    }
                    if (user && user.isAdmin) {
                        planList.setAttribute('is-admin', '');
                    }
                    // Resolve the deferred (no-public-param) first-paint fetch:
                    // authed → My (is-public absent); anon → Published (AE3).
                    if (planList.hasAttribute('defer-initial-fetch')) {
                        if (!authenticated) {
                            planList.setAttribute('is-public', '');
                            // Canonicalise the anonymous bare URL to
                            // ?public=true: the URL then reflects public mode
                            // (shareable) and the plan-detail link built below
                            // carries the param so anon click-through does not
                            // 401. This branch only runs when the URL had no
                            // public param (defer-initial-fetch); replaceState
                            // (no reload) keeps the single-fetch no-flash
                            // contract (KTD3). Authed users never reach here.
                            const url = new URL(window.location.href);
                            url.searchParams.set('public', 'true');
                            window.history.replaceState(window.history.state, '', url);
                        }
                        planList.removeAttribute('defer-initial-fetch');
                        planList.fetchPlans();
                    }
                })
                .catch(() => {
                    // Network failure: fall back to a fetch so the user still
                    // sees a plan list rather than a stuck loading state. Leave
                    // the default (non-admin, My) view. Mirrors the
                    // tokens.html auth-probe fallback.
                    if (planList.hasAttribute('defer-initial-fetch')) {
                        planList.removeAttribute('defer-initial-fetch');
                        planList.fetchPlans();
                    }
                });

            planList.addEventListener('cts-plan-navigate', (evt) => {
                const planId = evt.detail && evt.detail.planId;
                if (!planId) return;
                // In public mode (anonymous, or the Published tab), thread
                // public=true so plan-detail.html resolves for anonymous
                // visitors — it is public ONLY with the param, otherwise the
                // navigation 401-redirects to login. Mirrors cts-log-list's
                // detail-link handling for logs.
                const publicSuffix = planList.hasAttribute('is-public') ? '&public=true' : '';
                window.location.href = 'plan-detail.html?plan=' + encodeURIComponent(planId) + publicSuffix;
            });
        });
    </script>

    <cts-footer></cts-footer>

    <cts-toast-host></cts-toast-host>
</body>

</html>
