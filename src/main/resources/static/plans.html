    <title>OIDF Conformance: Available plans</title>

    <!-- Boostrap Icons -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter/Inter-Variable.woff2" crossorigin>
    <link rel="stylesheet" href="/css/oidf-tokens.css">
    <link rel="stylesheet" type="text/css" href="css/layout.css">
    <link rel="stylesheet" href="/css/oidf-app.css">

    <script src="/vendor/lodash/js/lodash.min.js"></script>

    <script src="/js/cts-clipboard-resolver.js"></script>

    <script type="text/javascript" src="js/fapi.ui.js"></script>
    <script>window.litDisableBundleWarning = true;</script>

    <script type="module" src="/components/cts-modal.js"></script>
    <script type="module" src="/components/cts-button.js"></script>
    <script type="module" src="/components/cts-link-button.js"></script>
    <script type="module" src="/components/cts-badge.js"></script>
    <script type="module" src="/components/cts-icon.js"></script>

    <script type="module" src="/components/cts-json-editor.js"></script>
</head>

<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="plans"></cts-navbar>

    <!-- resident DOM -->
    <main id="main-content" class="container-fluid">
        <div class="row">
            <div class="col-md-12">

                <cts-data-table
                    id="plansListing"
                    ajax-url="/api/plan"
                    page-size="25"
                    server-side
                    request-shape="datatables-comma-order"
                    search-mode="explicit"
                    search-placeholder="Search plans"
                    empty-state="No plans yet"
                ></cts-data-table>

            </div>
        </div>
    </main>


    <cts-modal id="errorModal" heading="Error">
        Error: <span id="errorMessage"></span>
    </cts-modal>

    <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
        <div class="text-center">
            <img src="/images/spinner.gif" width="100px" height="30px" alt="Loading" />
        </div>
        <div>
            <span id="loadingMessage"></span>
        </div>
    </cts-modal>

    <cts-modal id="configModal" heading="Configuration">
        <div>
            <cts-button class="btn-clipboard" icon="log-out" data-clipboard-target="#config" title="Copy config to clipboard"></cts-button>
            Configuration for <code id="configTestId" class="text-muted"></code>
        </div>
        <div class="wrapLongStrings">
            <cts-json-editor id="config" readonly aria-label="Plan configuration JSON" style="display: block; min-height: calc(var(--space-6) * 20);"></cts-json-editor>
        </div>
    </cts-modal>


    <script>
        /**
         * Parse an HTML string produced by a lodash template into a
         * DocumentFragment so cts-data-table's `cellRenderer` can return it
         * and Lit will mount it as DOM (rather than escape it as text).
         *
         * SAFETY: the HTML strings passed in come from `FAPI_UI.logTemplates`,
         * which compile static templates (templates/configButton.html,
         * planDetailButton.html, planModules.html, owner.html, date.html)
         * with lodash. Every place a row value flows into the template uses
         * the `<%- %>` (HTML-escaping) interpolation form, not `<%= %>`. So
         * the resulting HTML string is built from a trusted template plus
         * server data that has been escaped at template-render time.
         *
         * `<template>.innerHTML = …` here is functionally the same as the
         * jQuery `$(rendered)` calls the legacy DataTables code used; the
         * trust boundary is unchanged.
         */
        function htmlToFragment(htmlString) {
            var template = document.createElement('template');
            template.innerHTML = htmlString;
            return template.content;
        }

        document.addEventListener("DOMContentLoaded", () => {
            var urlParams = new URLSearchParams(window.location.search);
            var public = Boolean(urlParams.get('public'));

            FAPI_UI.showBusy();

            FAPI_UI.loadPlanListTemplates()
            .then(function() {
                return FAPI_UI.getUserInfo();
            }).then(function() {
                return loadAvailablePlans(public);
            }).finally(function() {
                FAPI_UI.hideBusy();
            });

            // Target the inner <button> rendered by cts-button. This fails loudly
            // if cts-button ever switches to shadow DOM (the selector stops
            // matching) instead of silently breaking copy. See
            // components/cts-button.js JSDoc for the light-DOM dependency note.
            // Shared resolver lives in /js/cts-clipboard-resolver.js so the
            // "prefer .value over textContent" rule (needed because Monaco
            // virtualises long content) is defined in one place across
            // log-detail.html, logs.html, and plans.html.
            var clipboard = new ClipboardJS('.btn-clipboard > button', {
                text: window.ctsResolveClipboardJsonText
            });
            clipboard.on('success', function(e) {
                console.log(e);
            });
            clipboard.on('error', function(e) {
                console.log(e);
            });

        });

        /**
         * Configure the cts-data-table imperatively. The columns array uses
         * `cellRenderer` to delegate to the existing lodash/Mustache templates
         * (PLAN_DETAIL, CONFIG, DATE, PLAN_MODULES, OWNER) so the per-cell
         * markup stays unchanged after the migration off jQuery DataTables.
         *
         * Sort by `started` desc by default — the legacy code sorted by
         * column index 5, which silently meant "Started" in the admin view
         * and "Modules" in the public view. Sorting by key is unambiguous.
         */
        function loadAvailablePlans(public) {
            return customElements.whenDefined('cts-data-table').then(function() {
                var table = document.getElementById('plansListing');

                var columns = [
                    {
                        key: '_id',
                        label: 'Instance ID',
                    },
                    {
                        key: 'config',
                        label: 'Config',
                        visible: !public,
                    },
                    {
                        key: 'planName',
                        label: 'Name',
                        sortable: true,
                    },
                    {
                        key: 'variant',
                        label: 'Variant',
                    },
                    {
                        key: 'description',
                        label: 'Description',
                        sortable: true,
                    },
                    {
                        key: 'started',
                        label: 'Started',
                        sortable: true,
                    },
                    {
                        key: 'modules',
                        label: 'Modules',
                    },
                    {
                        key: 'owner',
                        label: 'Owner',
                        visible: !public && FAPI_UI.currentUser && FAPI_UI.currentUser.isAdmin,
                    },
                ];

                table.columns = columns;
                table.cellRenderer = function(row, columnKey) {
                    switch (columnKey) {
                        case '_id':
                            return htmlToFragment(
                                FAPI_UI.logTemplates.PLAN_DETAIL({ id: row._id, public: public })
                            );
                        case 'config':
                            return htmlToFragment(FAPI_UI.logTemplates.CONFIG());
                        case 'planName':
                            // Plain text — escape to mirror the legacy
                            // DataTables.render.text() default for this column.
                            return row.planName == null ? '' : String(row.planName);
                        case 'variant':
                            return FAPI_UI.formatVariant(row.variant);
                        case 'description':
                            return row.description == null ? '' : String(row.description);
                        case 'started':
                            if (row.started == null || row.started === '') return '';
                            return FAPI_UI.logTemplates.DATE({ date: row.started });
                        case 'modules':
                            return htmlToFragment(
                                FAPI_UI.logTemplates.PLAN_MODULES({ modules: row.modules || [] })
                            );
                        case 'owner':
                            return htmlToFragment(
                                FAPI_UI.logTemplates.OWNER({ owner: row.owner ? row.owner : {} })
                            );
                        default:
                            return '';
                    }
                };
                table.initialSort = { column: 'started', direction: 'desc' };

                // Wire per-row imperative behaviour that DataTables previously
                // owned via createdRow / drawCallback:
                //   - bind .showConfigBtn click to the configModal,
                //   - kick off the test-status fetch cascade,
                //   - re-run the legacy tooltip wiring (no-op once
                //     bootstrap.Tooltip is dropped, kept for symmetry).
                table.addEventListener('cts-row-rendered', function(evt) {
                    var rowEl = evt.detail.rowEl;
                    var data = evt.detail.row;
                    var btn = rowEl.querySelector('.showConfigBtn');
                    if (btn) {
                        btn.addEventListener('cts-click', function(clickEvt) {
                            clickEvt.preventDefault();
                            // cts-json-editor exposes `.value` (string) instead of
                            // textContent — Monaco virtualises rendered content,
                            // so the textContent path would only show the visible
                            // portion of long configs.
                            document.getElementById('config').value =
                                JSON.stringify(data.config, null, 4);
                            document.getElementById('configTestId').textContent = data._id;
                            document.getElementById('configModal').show();
                        });
                    }
                });

                table.addEventListener('cts-draw-complete', function() {
                    fetchTestResults(table, public);
                });

                table.addEventListener('cts-data-loaded', function() {
                    FAPI_UI.hideBusy();
                });
                table.addEventListener('cts-data-error', function(evt) {
                    var err = evt.detail && evt.detail.error;
                    FAPI_UI.showError({
                        code: '',
                        error: err && err.message ? err.message : String(err)
                    });
                });

                // Re-trigger the first fetch now that columns / cellRenderer
                // are wired up. The component's initial connectedCallback
                // already issued one with empty columns; this paints the real
                // table.
                table.reload();
            });
        }

        /**
         * For every visible row, look up any test instances that haven't been
         * loaded yet and fetch their status so the colour-coded boxes from
         * planModules.html can resolve from .testResult-unknown to the actual
         * pass/fail/warning state.
         */
        function fetchTestResults(table, public) {
            var rowEls = table.querySelectorAll('.oidf-dt-table tbody tr[data-row-index]');
            rowEls.forEach(function(rowEl) {
                rowEl.querySelectorAll('[data-instance]').forEach(function(el) {
                    var testId = el.getAttribute('data-instance');
                    if (!testId) return;

                    fetch('/api/info/' + encodeURIComponent(testId)
                            + (public ? '?public=true' : ''))
                        .then(function(response) {
                            if (!response.ok) return null;
                            return response.json();
                        })
                        .then(function(data) {
                            // clear the data attribute so we don't re-fetch
                            el.setAttribute('data-instance', '');
                            if (data && data.result) {
                                el.classList.remove('testResult-unknown');
                                el.classList.add('testResult-' + data.result.toLowerCase());
                            }
                        })
                        .catch(function() {
                            /* swallow — same behaviour as the legacy
                             * jQuery error: function() {} branch */
                        });
                });
            });
        }

    </script>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

</body>

</html>
