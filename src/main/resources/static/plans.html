<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="plans"></cts-navbar>

    <main id="main-content" class="listing-page">
        <cts-plan-list id="plansListing"></cts-plan-list>
        <script>
            // Set is-public SYNCHRONOUSLY before the deferred
            // /components/cts-plan-list.js module runs. The component
            // fires its initial /api/plan fetch from connectedCallback,
            // which executes the moment customElements.define is
            // called — i.e., when the module evaluates, which happens
            // BEFORE DOMContentLoaded. Setting is-public from a
            // DOMContentLoaded handler would land too late: the fetch
            // would already have hit /api/plan (no query) instead of
            // /api/plan?public=true. is-admin only toggles column
            // visibility (Lit re-renders on attribute change), so it
            // is safe to set later from the async auth probe below.
            (function () {
                var params = new URLSearchParams(window.location.search);
                if (params.get('public') === 'true') {
                    document.getElementById('plansListing').setAttribute('is-public', '');
                }
            })();
        </script>
    </main>

    <script type="text/javascript">
        // cts-plan-list owns fetch/render/modal/copy wiring. The page only
        // resolves session-derived state (isAdmin via /api/currentuser) and
        // routes the component's cts-plan-navigate event into a real page
        // navigation. The ?public=true attribute is set synchronously above
        // because it must land before the component's connectedCallback fires.
        document.addEventListener('DOMContentLoaded', () => {
            const planList = document.querySelector('cts-plan-list');
            if (!planList) return;

            fetch('/api/currentuser')
                .then((response) => {
                    if (!response.ok) return null;
                    return response.json();
                })
                .then((user) => {
                    if (user && user.isAdmin) {
                        planList.setAttribute('is-admin', '');
                    }
                })
                .catch(() => {
                    // Network failure: leave the default (non-admin) view
                    // so the user still sees the plan list. Mirrors the
                    // tokens.html / index.html auth-probe fallback.
                });

            planList.addEventListener('cts-plan-navigate', (evt) => {
                const planId = evt.detail && evt.detail.planId;
                if (!planId) return;
                window.location.href = 'plan-detail.html?plan=' + encodeURIComponent(planId);
            });
        });
    </script>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

    <cts-toast-host></cts-toast-host>
</body>

</html>
