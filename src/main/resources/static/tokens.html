<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="tokens"></cts-navbar>

    <main id="main-content">
        <cts-token-manager></cts-token-manager>
    </main>

    <script type="text/javascript">
        // Probe /api/currentuser so cts-token-manager renders the read-only
        // admin view for admin sessions. cts-navbar performs its own auth
        // probe; mirroring it here keeps cts-token-manager independent of
        // navbar internals. cts-token-manager defaults `isAdmin=false` and
        // re-renders when the attribute toggles, so the network roundtrip
        // does not block the initial table fetch — the admin path simply
        // swaps in its read-only message once the response lands.
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/currentuser')
                .then((response) => {
                    if (!response.ok) return null;
                    return response.json();
                })
                .then((user) => {
                    const manager = document.querySelector('cts-token-manager');
                    if (!manager) return;
                    if (user && user.isAdmin) {
                        manager.setAttribute('is-admin', '');
                    }
                })
                .catch(() => {
                    // Network failure: leave the default (non-admin) view so
                    // the user still sees the create/list UI. The CRUD calls
                    // themselves surface server errors via the component's
                    // own error modal.
                });
        });
    </script>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

</body>
