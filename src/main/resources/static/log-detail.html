<!-- ────────────────────────────────────────────────────────────────────
     Sticky-bar host-overflow audit (per U1 plan §"Open spec gaps for
     this unit", item P1). U2 will introduce a `position: sticky` status
     bar; sticky positioning fails silently when ANY ancestor of the
     sticky element has `overflow: hidden | auto | clip` or `transform:`.
     The ancestor chain on log-detail is:
         <body>             — no overflow, no transform
         <main.log-page> — no overflow, no transform (page-grid below)
         <cts-log-detail-header> — light DOM, scoped CSS sets
                                    `display: block` only
     None of these break sticky. U2 may therefore mount the status bar
     anywhere inside <main.log-page> without DOM reparenting.
     ──────────────────────────────────────────────────────────────────── -->

<!-- Pre-paint Test-structure-rail collapse state (feat/log-toc-collapsible,
     R6). This non-deferred classic script runs synchronously during head
     parsing, BEFORE first paint, so a collapsed-by-preference load never
     paints the expanded rail and then animates it shut. bootstrap() runs on
     DOMContentLoaded — too late to beat the first composite — so the
     pre-paint state cannot be deferred to it. A classic script cannot import
     guided-wizard.js, so it carries the same minimal private-browsing-safe
     storage probe as the inline twin in schedule-test.html (the one
     intentional duplication of tryGetStorage). -->
<script>
  (function () {
    function tryGetStorage(type) {
      try {
        var storage = window[type];
        var x = "__storage_test__";
        storage.setItem(x, x);
        storage.removeItem(x);
        return storage;
      } catch (e) {
        return null;
      }
    }
    try {
      var ls = tryGetStorage("localStorage");
      if (ls && ls.getItem("oidf-log-toc-collapsed") === "true") {
        document.documentElement.classList.add("toc-collapsed");
      }
    } catch (e) {
      /* never block first paint on a storage error */
    }
  })();
</script>

<!-- Component modules. cts-log-detail-header transitively pulls in
     cts-test-nav-controls, cts-button, cts-link-button, cts-badge,
     cts-alert, cts-icon, cts-json-editor, cts-test-summary,
     cts-action-overflow, and the test-summary-split helper, so we
     don't have to declare them individually. cts-log-toc carries its

<script type="module" src="/components/cts-navbar.js"></script>
<script type="module" src="/components/cts-modal.js"></script>
<script type="module" src="/components/cts-spinner.js"></script>

<!-- New-page bootstrap. Loads after components — module ordering is
     stable because each script type="module" defers until the document
     is parsed. -->
<script type="module" src="/js/log-detail.js"></script>

<style>
  /* FOUC reservation for the nav row's plan-status progress bar
     (cts-plan-status, log mode). A custom element is display:inline until
     upgraded, so it reserves no height before its definition loads —
     and log-detail is the slowest-upgrading page (cts-log-detail-header
     transitively pulls in a long component chain). Reserve the bar's
     measured height (track ~14px + the "Module N of M" label line ~24px
     incl. its margin-top) so the nav row does not jump when the
     component upgrades. Matches plan-detail.html's 38px reservation for
     the same bar. */
  cts-plan-status:not(:defined) {
    display: block;
    min-height: 38px;
  }

  /* Page-local layout for log-detail.html. Single-column at narrow
     widths; widens to a two-column grid (main + rail) at ≥ 1440 px for
     U8's cts-log-toc. The `.log-page--with-toc` modifier is added by
     js/log-detail.js on bootstrap. */
  .log-page {
    max-width: var(--maxw-wide);
    margin: 0 auto;
    padding: var(--space-4) var(--space-5);
    font-family: var(--font-sans);
  }
  /* U8 — wide-viewport rail. The 320px right column matches the rail's
     intrinsic width budget; the rest of the row flexes for the entries
     stream. Below 1440px the grid collapses back to a single column,
     and the rail host hides via `display: none` so it doesn't reserve
     vertical space.

     The column is reserved unconditionally when `.log-page--with-toc`
     is set on <main> — independent of whether the rail has data yet.
     This eliminates the page-load reflow that previously happened when
     the first `cts-blocks-updated` event flipped the grid from a
     single column to `1fr 320px` (see
     docs/plans/2026-05-21-002-fix-log-detail-layout-reflows-plan.md
     U1). The rail itself still hides via its scoped
     `cts-log-toc[hidden] { display: none }` rule when empty (no blocks
     AND no failures); the hidden rail simply leaves its 320px grid
     track as whitespace, which is the explicit trade-off — a stable
     always-reserved column is
     preferred to the page-wide horizontal shift on every normal log
     load. Reverses U2 of
     docs/plans/2026-05-20-002-fix-cts-log-toc-empty-rail-visible-plan.md. */
  /* Collapsible rail (feat/log-toc-collapsible, U1). Register the animatable
     rail-width custom property. A registered `<length>` interpolates reliably
     across engines AND recomputes the grid track, which raw
     `grid-template-columns` track-list interpolation does not do consistently
     in Safari/Firefox. The 320px initial value is what `getComputedStyle`
     resolves `1fr var(--log-toc-width)` to in the expanded state, so the rail
     keeps its intrinsic width budget and the existing grid-track assertion in
     log-detail.spec.js stays green. `@property` is Baseline (Chrome 85,
     Safari 16.4, Firefox 128). */
  @property --log-toc-width {
    syntax: "<length>";
    inherits: false;
    initial-value: 320px;
  }

  @media (min-width: 1440px) {
    .log-page--with-toc {
      display: grid;
      grid-template-columns: 1fr var(--log-toc-width);
      column-gap: var(--space-10);
      align-items: start;
    }
    /* Collapsed state — set pre-paint on <html> by the inline <head> script,
       so a collapsed-by-preference load never paints the expanded frame and
       then animates it closed (R6). */
    html.toc-collapsed .log-page--with-toc {
      --log-toc-width: 0px;
      column-gap: 0;
    }
    /* The transition lives ONLY on the animate-enabled class, which the
       bootstrap adds one frame after first paint — so the pre-paint
       collapsed/expanded state applies instantly and only later user toggles
       animate (R4, R6). Animating the registered custom property repaints the
       1fr track in lockstep; column-gap closes alongside it. */
    .log-page--with-toc.log-page--toc-animate {
      transition:
        --log-toc-width var(--dur-3) var(--ease-standard),
        column-gap var(--dur-3) var(--ease-standard);
    }
    /* Clip the 320px rail content as the track shrinks to 0 rather than
       letting it spill or reflow the page. `overflow-x: hidden` MUST stay on
       the host (never an ancestor wrapper) or it would establish a scroll
       container and break the rail's `position: sticky`; pairing it with the
       rail's own `overflow-y: auto` (here as the `hidden auto` shorthand)
       preserves both the vertical scroll and sticky behaviour. */
    #ctsLogToc {
      overflow: hidden auto;
    }
    /* The rail fades out AND gives up its box entirely as it collapses. The
       grid track alone can't shrink the host past its own padding + border
       (~34px of non-compressible box), which would leave a sliver of width
       when "hidden"; zeroing the inline padding + border collapses it to a
       true 0 width so the entries stream reclaims the full column. */
    html.toc-collapsed #ctsLogToc {
      opacity: 0;
      padding-inline: 0;
      border-inline-width: 0;
    }
    .log-page--toc-animate #ctsLogToc {
      transition:
        opacity var(--dur-3) var(--ease-standard),
        padding-inline var(--dur-3) var(--ease-standard),
        border-inline-width var(--dur-3) var(--ease-standard);
    }
  }
  @media (max-width: 1439px) {
    #ctsLogToc {
      display: none;
    }
  }

  /* R5 — honor reduced motion: the collapse/expand applies instantly with no
     transition. The oidf-tokens.css global reduced-motion block only resets
     `a { transition }`, so this page-local override is required (mirrors the
     reduced-motion zeroing pattern in cts-modal.js). */
  @media (prefers-reduced-motion: reduce) {
    .log-page--with-toc.log-page--toc-animate,
    .log-page--toc-animate #ctsLogToc {
      transition: none;
    }
  }

  /* Breadcrumb row + collapse toggle (feat/log-toc-collapsible, U3). The crumb
     flows normally; the toggle is positioned ABSOLUTELY at the far right so it
     never contributes to the row's box model — otherwise the taller toggle
     would inflate the row height and the breadcrumb would jump vertically when
     navigating between a toggle page and a no-toggle page. The slot is hidden
     by default and shown only at ≥ 1440px where the rail exists (R3 — nothing
     changes below the breakpoint). */
  .log-crumb-row {
    position: relative;
  }
  .log-toc-toggle-slot {
    display: none;
  }
  @media (min-width: 1440px) {
    .log-toc-toggle-slot {
      display: block;
      position: absolute;
      right: 0;
      /* Nudge up to vertically align the square toggle with the breadcrumb. */
      top: -5px;
    }
    /* Square icon-only button: the base .oidf-btn is already
       `height: var(--control-height)` + inline-flex centered, so matching the
       width and zeroing the horizontal padding yields a square that centers
       the 20px icon (cts-button size="md"). */
    #ctsLogTocToggle button {
      width: var(--control-height);
      height: var(--control-height);
      padding: 0;
    }
    /* R10 — when the rail is empty (interrupted test with no blocks AND no
       failures, cts-log-toc sets its own [hidden]) there is nothing to
       collapse, so suppress the toggle. Declarative `:has()` tracks the rail's
       hidden state — which cts-log-toc flips inside its async Lit update — with
       no JS timing race. */
    #main-content:has(#ctsLogToc[hidden]) .log-toc-toggle-slot {
      display: none;
    }
  }

  /* U4 — failure-summary breakpoint swap. Two `<cts-failure-summary>`
     instances render simultaneously: one inside the header card
     (desktop position) and one directly below the sticky status bar
     (mobile / tablet position). CSS hides whichever doesn't apply at
     the current breakpoint. The render-twice-hide-one pattern avoids a
     JS-driven appendChild that would re-mount the component and reset
     its `_expanded` state. */
  @media (min-width: 1024px) {
    #ctsTopFailureSummary { display: none; }
  }
  @media (max-width: 1023px) {
    cts-log-detail-header cts-failure-summary { display: none; }
  }
  /* Tighten the page-level instance's spacing — at narrow widths it
     sits right below the sticky bar and benefits from a slim margin
     instead of the in-card border-top + padding-top the embedded
     instance carries. */
  #ctsTopFailureSummary .failureSummary {
    margin-top: var(--space-3);
    border-top: 0;
    padding-top: 0;
  }

  /* U7 — test-summary breakpoint swap. Same render-twice-hide-one
     pattern as the failure summary above. The header card's instance
     carries the description (B4) at desktop; the page-level instance
     hosts the WAITING-state instructions banner (B1) at narrow widths,
     where it must sit below the sticky bar and above the failure
     summary. */
  @media (min-width: 1024px) {
    #ctsTopTestSummary { display: none; }
  }
  @media (max-width: 1023px) {
    cts-log-detail-header cts-test-summary { display: none; }
  }
  /* Visual rhythm at narrow widths: the page-level instance sits
     immediately below the sticky bar, so add the same outer spacing
     the in-card instance picks up from the metadata table's gap. */
  #ctsTopTestSummary {
    display: block;
    margin-top: var(--space-3);
  }
  @media (min-width: 1024px) {
    #ctsTopTestSummary { margin-top: 0; }
  }

  /* Footer. Unlike its sibling pages, log-detail.html intentionally does
     NOT load the legacy layout.css (where the shared .pageFooter rule
     lives), so the footer is styled page-locally with design tokens.
     Mirrors layout.css's .pageFooter — 64px top margin + vertical
     padding, muted surface, centered small text — but routes
     colours/sizes through oidf-tokens.css. Styling .muted via --fg-muted
     also dims the span, which the dead Bootstrap-era .muted class never
     did on the layout.css pages. */
  .pageFooter {
    margin-top: var(--space-16);
    padding: var(--space-16) 0;
    font-size: var(--fs-13);
    text-align: center;
    background-color: var(--bg-muted);
  }
  .pageFooter .muted {
    color: var(--fg-muted);
  }

  /* Scroll runway for the TOC scroll-spy (cts-log-toc). The rail marks a
     block "active" only when its start-marker rises into the top band of
     the IntersectionObserver's rootMargin ("-80px 0px -50% 0px") — i.e.
     above the viewport midpoint. Without extra space below the last
     block, the page bottom is reached before the final sections can
     scroll high enough to enter that band, so they never light up. This
     500px tail (sitting just above .pageFooter) gives those bottom
     sections the runway to reach the active band.

     Scoped to the same ≥1440px + .log-page--with-toc condition as the
     rail's grid layout above, because the rail — the only visible
     consumer of the scroll-spy's active highlight — exists only there.
     Narrower / rail-off layouts gain nothing from the runway, and
     keeping it off them avoids extending max-scroll on the single-column
     layout, where it would let the deep-link hash-scroll over-scroll a
     near-bottom entry under the still-settling sticky bar. */
  @media (min-width: 1440px) {
    .log-page--with-toc {
      padding-bottom: 500px;
    }
  }
</style>
</head>

<body>
  <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

  <cts-navbar current-page=""></cts-navbar>

  <!-- Page-level modals. Show/hide is imperative via cts-modal.show()
       and .hide(); the new-page bootstrap owns those calls (no FAPI_UI
       wrapper). -->
  <cts-modal id="errorModal" heading="Error">
    Error: <span id="errorMessage"></span>
  </cts-modal>

  <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
    <cts-spinner size="lg" label="Loading"></cts-spinner>
    <div aria-live="polite"><span id="loadingMessage"></span></div>
  </cts-modal>

  <!-- Private-link flow modals. The bootstrap wires their show/hide
       around the cts-share-link event. The expiration modal collects
       the day count; the result modal renders the returned URL. -->
  <cts-modal
    id="privateLinkExpirationModal"
    heading="Create private link"
    footer-buttons='[{"label": "Create link", "id": "privateLinkCreateBtn", "data": {"action": "create"}}, {"label": "Cancel"}]'
  >
    <p>How many days should this link remain active?</p>
    <label for="privateLinkExpirationDays" style="display: block; margin-top: var(--space-2);">
      Expiration in days (1–3650)
      <input
        id="privateLinkExpirationDays"
        type="number"
        min="1"
        max="3650"
        value="30"
        style="display: block; width: 6em; height: var(--control-height); box-sizing: border-box; margin-top: var(--space-1);"
      />
    </label>
  </cts-modal>

  <cts-modal id="privateLinkResultModal" heading="Private link">
    <p id="privateLinkMessage"></p>
    <textarea
      id="privateLinkUrl"
      readonly
      rows="3"
      aria-label="Private link URL"
      style="width: 100%; font-family: var(--font-mono); font-size: var(--fs-13);"
    ></textarea>
  </cts-modal>

  <!-- Resident DOM — the Lit triad mounts here. Bootstrap fetches
       /api/info, populates header.testInfo, sets viewer.testId, and
       wires the action events. The .log-page-main wrapper holds the
       single-column content; cts-log-toc is the second grid column at
       ≥ 1440 px when the user preference is enabled. -->
  <main id="main-content" class="log-page">
    <div class="log-page-main">
      <!-- Breadcrumb row. At ≥ 1440px it also hosts the Test-structure-rail
           collapse toggle, pushed to the far right; below that breakpoint (and
           when the rail is empty) the toggle slot is hidden and the crumb owns
           the row alone. -->
      <div class="log-crumb-row">
        <cts-crumb id="logDetailCrumb"></cts-crumb>
        <!-- Collapse toggle (feat/log-toc-collapsible). MUST live outside
             #ctsLogToc (the collapsing column) so it stays visible as the
             single re-open affordance once the rail is fully hidden. Icon-only;
             the action is exposed via aria-label, which setupTocCollapse() keeps
             in sync with the persisted state on bootstrap. -->
        <div class="log-toc-toggle-slot">
          <!-- Tooltip surfaces the icon-only toggle's purpose on hover/focus.
               Its `content` is kept in sync with the action by
               setupTocCollapse() (cts-tooltip re-reads it on each show). -->
          <cts-tooltip content="Hide test structure" placement="bottom">
            <cts-button
              id="ctsLogTocToggle"
              variant="ghost"
              size="md"
              icon="window-sidebar"
              aria-label="Hide test structure"
              aria-controls="ctsLogToc"
              aria-expanded="true"
            ></cts-button>
          </cts-tooltip>
        </div>
      </div>
      <cts-log-detail-header id="logDetailHeader"></cts-log-detail-header>
      <!-- Page-level cts-test-summary instance (Region B1, U7). Carries
           the WAITING-state instructions banner above the failure summary,
           hoisted out of the header card so it can sit between the sticky
           status bar and the viewer at narrow widths. CSS in <head> hides
           this at desktop where the header card's instance shows. The
           element is registered via the transitive import from
           cts-log-detail-header.js. -->
      <cts-test-summary id="ctsTopTestSummary"></cts-test-summary>
      <!-- Page-level cts-failure-summary instance (mobile / tablet
           position, U4). The desktop instance is rendered inside the
           header card; CSS in <head> hides whichever doesn't apply at
           the current breakpoint. Custom element is registered via the
           transitive import from cts-log-detail-header.js. -->
      <cts-failure-summary id="ctsTopFailureSummary"></cts-failure-summary>
      <cts-log-viewer id="logViewer"></cts-log-viewer>
    </div>
    <!-- Wide-viewport TOC rail (U8). Hidden below 1440 px and when the
         rail has no blocks and no failures. The page bootstrap adds
         `.log-page--with-toc` on <main> to reserve the grid column. -->
    <cts-log-toc id="ctsLogToc"></cts-log-toc>
  </main>

  <cts-footer></cts-footer>

  <cts-toast-host></cts-toast-host>
</body>

</html>
