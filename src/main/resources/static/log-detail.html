<!-- ────────────────────────────────────────────────────────────────────
     Sticky-bar host-overflow audit (per U1 plan §"Open spec gaps for
     this unit", item P1). U2 will introduce a `position: sticky` status
     bar; sticky positioning fails silently when ANY ancestor of the
     sticky element has `overflow: hidden | auto | clip` or `transform:`.
     The ancestor chain on log-detail is:
         <body>             — no overflow, no transform
         <main.log-page> — no overflow, no transform (page-grid below)
         <cts-log-detail-header> — light DOM, scoped CSS sets
                                    `display: block` only
     None of these break sticky. U2 may therefore mount the status bar
     anywhere inside <main.log-page> without DOM reparenting.
     ──────────────────────────────────────────────────────────────────── -->

<!-- Component modules. cts-log-detail-header transitively pulls in

<!-- New-page bootstrap. Loads after components — module ordering is
     stable because each script type="module" defers until the document
     is parsed. -->
<script type="module" src="/js/log-detail.js"></script>

<style>
  /* Page-local layout for log-detail.html. Single-column at narrow
     widths; widens to a two-column grid (main + rail) at ≥ 1440 px when
     the user preference allows U8's cts-log-toc. The
     `.log-page--with-toc` modifier is added by js/log-detail.js
     on bootstrap when the preference is enabled. */
  .log-page {
    max-width: var(--maxw-wide);
    margin: 0 auto;
    padding: var(--space-4) var(--space-5);
    font-family: var(--font-sans);
  }
  /* U8 — wide-viewport rail. The 320px right column matches the rail's
     intrinsic width budget; the rest of the row flexes for the entries
     stream. Below 1440px the grid collapses back to a single column,
     and the rail host hides via `display: none` so it doesn't reserve
     vertical space.

     The column is reserved unconditionally when `.log-page--with-toc`
     is set on <main> — independent of whether the rail has data yet.
     This eliminates the page-load reflow that previously happened when
     the first `cts-blocks-updated` event flipped the grid from a
     single column to `1fr 320px` (see
     docs/plans/2026-05-21-002-fix-log-detail-layout-reflows-plan.md
     U1). The rail itself still hides via its scoped
     `cts-log-toc[hidden] { display: none }` rule when empty (no blocks
     AND no failures) or when the user preference is off; the hidden
     rail simply leaves its 320px grid track as whitespace, which is
     the explicit trade-off — a stable always-reserved column is
     preferred to the page-wide horizontal shift on every normal log
     load. Reverses U2 of
     docs/plans/2026-05-20-002-fix-cts-log-toc-empty-rail-visible-plan.md. */
  @media (min-width: 1440px) {
    .log-page--with-toc {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: var(--space-10);
      align-items: start;
    }
  }
  @media (max-width: 1439px) {
    #ctsLogToc {
      display: none;
    }
  }

  /* U4 — failure-summary breakpoint swap. Two `<cts-failure-summary>`
     instances render simultaneously: one inside the header card
     (desktop position) and one directly below the sticky status bar
     (mobile / tablet position). CSS hides whichever doesn't apply at
     the current breakpoint. The render-twice-hide-one pattern avoids a
     JS-driven appendChild that would re-mount the component and reset
     its `_expanded` state. */
  @media (min-width: 1024px) {
    #ctsTopFailureSummary { display: none; }
  }
  @media (max-width: 1023px) {
    cts-log-detail-header cts-failure-summary { display: none; }
  }
  /* Tighten the page-level instance's spacing — at narrow widths it
     sits right below the sticky bar and benefits from a slim margin
     instead of the in-card border-top + padding-top the embedded
     instance carries. */
  #ctsTopFailureSummary .failureSummary {
    margin-top: var(--space-3);
    border-top: 0;
    padding-top: 0;
  }

  /* U7 — test-summary breakpoint swap. Same render-twice-hide-one
     pattern as the failure summary above. The header card's instance
     carries the description (B4) at desktop; the page-level instance
     hosts the WAITING-state instructions banner (B1) at narrow widths,
     where it must sit below the sticky bar and above the failure
     summary. */
  @media (min-width: 1024px) {
    #ctsTopTestSummary { display: none; }
  }
  @media (max-width: 1023px) {
    cts-log-detail-header cts-test-summary { display: none; }
  }
  /* Visual rhythm at narrow widths: the page-level instance sits
     immediately below the sticky bar, so add the same outer spacing
     the in-card instance picks up from the metadata table's gap. */
  #ctsTopTestSummary {
    display: block;
    margin-top: var(--space-3);
  }
  @media (min-width: 1024px) {
    #ctsTopTestSummary { margin-top: 0; }
  }

  /* Footer. Unlike its sibling pages, log-detail.html intentionally does
     NOT load the legacy layout.css (where the shared .pageFooter rule
     lives), so the footer is styled page-locally with design tokens.
     Mirrors layout.css's .pageFooter — 64px top margin + vertical
     padding, muted surface, centered small text — but routes
     colours/sizes through oidf-tokens.css. Styling .muted via --fg-muted
     also dims the span, which the dead Bootstrap-era .muted class never
     did on the layout.css pages. */
  .pageFooter {
    margin-top: var(--space-16);
    padding: var(--space-16) 0;
    font-size: var(--fs-13);
    text-align: center;
    background-color: var(--bg-muted);
  }
  .pageFooter .muted {
    color: var(--fg-muted);
  }

  /* Scroll runway for the TOC scroll-spy (cts-log-toc). The rail marks a
     block "active" only when its start-marker rises into the top band of
     the IntersectionObserver's rootMargin ("-80px 0px -50% 0px") — i.e.
     above the viewport midpoint. Without extra space below the last
     block, the page bottom is reached before the final sections can
     scroll high enough to enter that band, so they never light up. This
     500px tail (sitting just above .pageFooter) gives those bottom
     sections the runway to reach the active band.

     Scoped to the same ≥1440px + .log-page--with-toc condition as the
     rail's grid layout above, because the rail — the only visible
     consumer of the scroll-spy's active highlight — exists only there.
     Narrower / rail-off layouts gain nothing from the runway, and
     keeping it off them avoids extending max-scroll on the single-column
     layout, where it would let the deep-link hash-scroll over-scroll a
     near-bottom entry under the still-settling sticky bar. */
  @media (min-width: 1440px) {
    .log-page--with-toc {
      padding-bottom: 500px;
    }
  }
</style>
</head>

<body>
  <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

  <cts-navbar current-page=""></cts-navbar>

  <!-- Page-level modals. Show/hide is imperative via cts-modal.show()
       and .hide(); the new-page bootstrap owns those calls (no FAPI_UI
       wrapper). -->
  <cts-modal id="errorModal" heading="Error">
    Error: <span id="errorMessage"></span>
  </cts-modal>

  <cts-modal id="loadingModal" heading="Loading..." static-backdrop no-keyboard>
    <cts-spinner size="lg" label="Loading"></cts-spinner>
    <div aria-live="polite"><span id="loadingMessage"></span></div>
  </cts-modal>

  <!-- Private-link flow modals. The bootstrap wires their show/hide
       around the cts-share-link event. The expiration modal collects
       the day count; the result modal renders the returned URL. -->
  <cts-modal
    id="privateLinkExpirationModal"
    heading="Create private link"
    footer-buttons='[{"label": "Create link", "id": "privateLinkCreateBtn", "data": {"action": "create"}}, {"label": "Cancel"}]'
  >
    <p>How many days should this link remain active?</p>
    <label for="privateLinkExpirationDays" style="display: block; margin-top: var(--space-2);">
      Expiration in days (1–3650)
      <input
        id="privateLinkExpirationDays"
        type="number"
        min="1"
        max="3650"
        value="30"
        style="display: block; width: 6em; margin-top: var(--space-1);"
      />
    </label>
  </cts-modal>

  <cts-modal id="privateLinkResultModal" heading="Private link">
    <p id="privateLinkMessage"></p>
    <textarea
      id="privateLinkUrl"
      readonly
      rows="3"
      aria-label="Private link URL"
      style="width: 100%; font-family: var(--font-mono); font-size: var(--fs-13);"
    ></textarea>
  </cts-modal>

  <!-- Resident DOM — the Lit triad mounts here. Bootstrap fetches
       /api/info, populates header.testInfo, sets viewer.testId, and
       wires the action events. The .log-page-main wrapper holds the
       single-column content; cts-log-toc is the second grid column at
       ≥ 1440 px when the user preference is enabled. -->
  <main id="main-content" class="log-page">
    <div class="log-page-main">
      <cts-crumb id="logDetailCrumb"></cts-crumb>
      <cts-log-detail-header id="logDetailHeader"></cts-log-detail-header>
      <!-- Page-level cts-test-summary instance (Region B1, U7). Carries
           the WAITING-state instructions banner above the failure summary,
           hoisted out of the header card so it can sit between the sticky
           status bar and the viewer at narrow widths. CSS in <head> hides
           this at desktop where the header card's instance shows. The
           element is registered via the transitive import from
           cts-log-detail-header.js. -->
      <cts-test-summary id="ctsTopTestSummary"></cts-test-summary>
      <!-- Page-level cts-failure-summary instance (mobile / tablet
           position, U4). The desktop instance is rendered inside the
           header card; CSS in <head> hides whichever doesn't apply at
           the current breakpoint. Custom element is registered via the
           transitive import from cts-log-detail-header.js. -->
      <cts-failure-summary id="ctsTopFailureSummary"></cts-failure-summary>
      <cts-log-viewer id="logViewer"></cts-log-viewer>
    </div>
    <!-- Wide-viewport TOC rail (U8). Hidden below 1440 px and when the
         user preference (`cts-log-toc-rail-enabled`) is "false". The
         page bootstrap toggles `.log-page--with-toc` on <main> to
         flip the grid layout when the rail is enabled. -->
    <cts-log-toc id="ctsLogToc"></cts-log-toc>
  </main>

  <cts-footer></cts-footer>

  <cts-toast-host></cts-toast-host>
</body>

</html>
