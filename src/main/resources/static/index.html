    <link rel="stylesheet" href="/css/oidf-app.css">

    <script type="text/javascript" src="js/fapi.ui.js"></script>

</head>
<body>
    <a class="oidf-skip-link" href="#main-content">Skip to main content</a>

    <cts-navbar current-page="home"></cts-navbar>
    <main id="main-content">
        <cts-dashboard></cts-dashboard>
    </main>

    <script type="text/javascript">
        // Wire the dashboard's auth-gated tiles to /api/currentuser. cts-navbar
        // performs its own auth probe; mirroring it here keeps the dashboard
        // independent of navbar internals (and matches the cts-dashboard
        // contract: the host sets `is-authenticated`).
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/currentuser')
                .then((response) => {
                    const dashboard = document.querySelector('cts-dashboard');
                    if (!dashboard) return;
                    if (response.ok) {
                        dashboard.setAttribute('is-authenticated', '');
                    } else {
                        dashboard.removeAttribute('is-authenticated');
                    }
                })
                .catch(() => {
                    // Network failure: leave the default (authenticated) state
                    // so the tiles render. cts-dashboard tolerates a missing
                    // server-info fetch the same way.
                });
        });
    </script>

</body>
</html>
