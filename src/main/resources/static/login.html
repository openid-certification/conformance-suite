<body>
    <cts-navbar current-page=""></cts-navbar>

    <div id="loginContent" class="container-fluid">
        <div class="row">
            <div class="col-xs-12 col-md-6 col-md-offset-3 mx-auto center-text">
                <h1 class="text-center">Login to or Register with the OpenID Foundation Conformance Suite</h1>
                <p id="error" class="bg-danger collapse">There was an error logging you in: <span id="error-details"></span></p>
                <p id="logout" class="bg-info collapse">You have been logged out.</p>
                <p class="text-center">
                    <cts-link-button variant="danger" size="lg" href="/oauth2/authorization/google" label="Proceed with Google"></cts-link-button>
                    <cts-link-button variant="primary" size="lg" href="/oauth2/authorization/gitlab" label="Proceed with GitLab"></cts-link-button>
                </p>
            </div>
        </div>
        <div class="row">
            <div class="mx-auto col-md-2">
                <div class="d-grid gap-2">
                    <cts-link-button href="logs.html?public=true" variant="info" icon="files" label="View published logs" full-width></cts-link-button>
                    <cts-link-button href="plans.html?public=true" variant="info" icon="bookmarks" label="View published plans" full-width></cts-link-button>
                </div>
            </div>
        </div>
    </div>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="/vendor/bootstrap/js/bootstrap.min.js"></script>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", () => {
            var urlParams = new URLSearchParams(window.location.search);

            var error = urlParams.get('error');
            var logout = urlParams.get('logout');

            if (error) {
                   document.getElementById('error').classList.add('show');
                   document.getElementById('error-details').textContent = error;
            }

            if (logout) {
                   document.getElementById('logout').classList.add('show');
            }

            let token = urlParams.get("token");
            if (token) {
                // Hide the normal login UI while the private link is being processed
                document.getElementById('loginContent').style.display = 'none';

                const iframe = document.createElement("iframe");
                iframe.style.display = "none";

                let submitted = false;

                iframe.addEventListener("load", () => {
                    const win = iframe.contentWindow;
                    const doc = win.document;

                    if (!submitted) {
                        const form = doc.querySelector("form");
                        if (!form) {
                            // no form, already at redirect target
                            window.location = win.location.href;
                            return;
                        }

                        submitted = true;
                        form.submit(); // trigger auto login action
                        return;
                    }

                    // second load, after submit finished navigation
                    window.location = win.location.href;
                });

                iframe.src = "/login/ott?token=" + encodeURIComponent(token);
                document.body.appendChild(iframe);
            }
        });
    </script>


</body>
</html>
