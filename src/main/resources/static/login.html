<body>
    <a class="oidf-skip-link" href="#loginContent">Skip to main content</a>

    <cts-navbar current-page=""></cts-navbar>

    <cts-login-page id="loginPage"></cts-login-page>

    <footer class="pageFooter">
        <span class="muted">OpenID Foundation conformance suite</span>
    </footer>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const loginPage = document.getElementById("loginPage");

            const error = urlParams.get("error");
            if (error) {
                loginPage.setAttribute("error", error);
            }

            const logout = urlParams.get("logout");
            if (logout) {
                loginPage.setAttribute("logout-message", "");
            }

            const token = urlParams.get("token");
            if (token) {
                // Hide the normal login UI while the private link is being processed.
                // The cts-login-page renders a hidden iframe pointing at token-auth-url;
                // we still need to drive the form submit / navigation lifecycle here
                // because it depends on cross-frame access to the contentWindow.
                loginPage.style.display = "none";

                const iframe = document.createElement("iframe");
                iframe.style.display = "none";

                let submitted = false;

                iframe.addEventListener("load", () => {
                    const win = iframe.contentWindow;
                    const doc = win.document;

                    if (!submitted) {
                        const form = doc.querySelector("form");
                        if (!form) {
                            // no form, already at redirect target
                            window.location = win.location.href;
                            return;
                        }

                        submitted = true;
                        form.submit(); // trigger auto login action
                        return;
                    }

                    // second load, after submit finished navigation
                    window.location = win.location.href;
                });

                iframe.src = "/login/ott?token=" + encodeURIComponent(token);
                document.body.appendChild(iframe);
            }
        });
    </script>


</body>
</html>
