image: alpine:latest

workflow:
  auto_cancel:
    on_new_commit: interruptible

variables:
  LM_JAVA_VERSION: 17

stages:
  - build
  - upload
  - deploy
  - test
  - compare
  - cleanup

# These are disabled because they fail with warnings, stopping pipelines being green, and we don't get a huge
# amount of value from them (the security license scanning is done by github on the mirror of the project, so
# we don't lose anything - and in fact it works better on github).
# https://gitlab.com/gitlab-org/gitlab/-/issues/220275 is one of the issues causing warnings, but it seems like
# another similar issue has been added to license scanning since
#include:
#  - template: Security/Dependency-Scanning.gitlab-ci.yml
#  - template: Security/License-Scanning.gitlab-ci.yml

.maven: &maven
  image: maven:3-eclipse-temurin-17
  interruptible: true
  variables:
    MAVEN_CONFIG: $CI_PROJECT_DIR/.m2
    MAVEN_OPTS: "-Duser.home=$CI_PROJECT_DIR"
  cache:
    key: maven
    paths:
      - .m2/

build:
  <<: *maven
  stage: build
  script:
    # Don't compile the tests yet
    - mvn -B -Dmaven.test.skip -Dpmd.skip clean package
  artifacts:
    access: developer
    paths:
      - target/

upload:
  stage: upload
  interruptible: true
  needs: ["build"]
  image: docker:25.0.5-git
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - setup_docker
    - install_build_dependencies
    - docker build -t conformance-suite .
    - upload
  allow_failure:
    exit_codes:
      - 137

publish-image:
  stage: upload
  needs: ["build"]
  image: docker:25.0.5-git
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    # Override when triggering manually to publish a release tag (e.g. "5.1.0")
    IMAGE_TAG: "latest"
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        IMAGE_TAG: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH == "master"
      when: on_success
  script:
    - setup_docker
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    # When publishing from a git tag, also update :latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$IMAGE_TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi

publish-nginx-image:
  stage: upload
  needs: []
  image: docker:25.0.5-git
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    IMAGE_TAG: "latest"
  rules:
    - if: $CI_COMMIT_TAG
      variables:
        IMAGE_TAG: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH == "master"
      when: on_success
  script:
    - setup_docker
    - docker build -t "$CI_REGISTRY_IMAGE/nginx:$IMAGE_TAG" nginx/
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker push "$CI_REGISTRY_IMAGE/nginx:$IMAGE_TAG"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE/nginx:$IMAGE_TAG" "$CI_REGISTRY_IMAGE/nginx:latest"
        docker push "$CI_REGISTRY_IMAGE/nginx:latest"
      fi

test:
  <<: *maven
  stage: test
  needs: ["build"]
  coverage: '/Unit test coverage (\d+\%)/'
  script:
    # Don't recompile the main app
    - mvn -B -Dmaven.main.skip test
    - |
      perl -ne '/Total.*?(\d+%)/ && print "Unit test coverage $1\n"' target/site/jacoco/index.html
  only:
    - branches

frontend_e2e_test:
  stage: test
  interruptible: true
  needs: []
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  script:
    - cd frontend
    - npm ci --ignore-scripts
    - ./node_modules/.bin/playwright test --config playwright.config.js
  artifacts:
    when: on_failure
    paths:
      - frontend/test-results/
    expire_in: 7 days
  only:
    - branches

# frontend_lint: runs the same `npm run test:ci` chain contributors run locally
# (format:check + lint + type-check + lint:jsdoc). Parallel to `build` (needs: []);
# conceptually a peer of `check-trailing-whitespace` in the build stage.
#
# Promotion criterion (R22):
# - Job has been green on `main` for 2 consecutive weeks
#   (Joseph or Thomas sign-off in the MR that flips allow_failure)
# - AND all open entries in the named legacy-override tier in eslint.config.js
#   have been either deleted (rule error on all files) or have their cleanup
#   GitLab issue closed. Current count: 0 entries.
# - AND the a11y CI gate follow-up (see
#   docs/brainstorms/2026-04-17-a11y-ci-gate-requirements.md) has landed.
# Sunset (R23): `allow_failure: true` is a temporary concession. Owner
# (Joseph or Thomas) sets a calendar reminder for 2026-06-12 to flip it to
# `false`. The R22 criteria above are the hard preconditions for the flip;
# if they aren't met by that date, the flip slips — but the slip requires
# a written rationale in a new MR, not silence.
#
# --ignore-scripts justification: safe here because test:ci launches no
# browser and doesn't need MSW's postinstall hook — the MSW worker is
# pre-checked-in at frontend/public/mockServiceWorker.js. This is documented
# in frontend/README.md so no one copies the flag into test:e2e (where it
# would break browser provisioning).
#
# corepack enable npm justification: node:22-alpine ships npm 10.9.7 but
# package.json pins `packageManager: npm@11.12.1`, and the two majors encode
# optional peer deps differently in the lockfile. `corepack enable npm` shims
# npm to the pinned version so CI and contributors use the same tool.
frontend_lint:
  stage: build
  interruptible: true
  needs: []
  image: node:22-alpine
  cache:
    key: frontend-npm
    paths:
      - frontend/.npm    # npm's package cache (populated via NPM_CONFIG_CACHE below)
      # Do NOT cache frontend/node_modules: a cached copy can drift from
      # package.json / package-lock.json and mask install-time errors.
  variables:
    # npm's default cache is $HOME/.npm, which GitLab's cache directive can't reach.
    # Override to a path inside $CI_PROJECT_DIR so the cache block above is effective.
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/frontend/.npm"
  before_script:
    - apk add --no-cache bash   # lint-jsdoc-properties.sh uses #!/usr/bin/env bash; Alpine ships ash only
    - corepack enable npm       # activate packageManager pin (npm 11.12.1 instead of Alpine's bundled 10.9.7)
  script:
    - cd frontend
    - npm ci --ignore-scripts
    - npm run test:ci
  allow_failure: true     # R22: sunset in 6 weeks — see Unit 9's sunset doc
  only:
    - branches

.compare: &compare
  stage: compare
  interruptible: true
  # show a 'warning' (not a failure) if we successfully find differences
  allow_failure:
    exit_codes:
      - 16
  image: python:3.13-alpine3.20
  only:
    refs:
      - branches

compare_oidcc:
  <<: *compare
  needs: ["oidcc_test"]
  script:
    - run_compare oidcc_test

compare_fapi:
  <<: *compare
  needs: ["fapi_test"]
  script:
    - run_compare fapi_test

compare_ciba:
  <<: *compare
  needs: ["ciba_test"]
  script:
    - run_compare ciba_test

compare_ekyc:
  <<: *compare
  needs: ["ekyc_test"]
  script:
    - run_compare ekyc_test

compare_authzen:
  <<: *compare
  needs: ["authzen_test"]
  script:
    - run_compare authzen_test

compare_brazil:
  <<: *compare
  needs: ["brazil_test"]
  script:
    - run_compare brazil_test

compare_panva:
  <<: *compare
  needs: ["panva_test"]
  script:
    - run_compare panva_test

compare_local:
  <<: *compare
  needs: ["local_test"]
  script:
    - run_compare local_test

compare_client:
  <<: *compare
  needs: ["client_test"]
  script:
    - run_compare client_test

compare_federation:
  <<: *compare
  needs: ["federation_test"]
  script:
    - run_compare federation_test

compare_vc:
  <<: *compare
  needs: ["vc_test"]
  script:
    - run_compare vc_test

compare_ssf:
  <<: *compare
  needs: ["ssf_test"]
  script:
    - run_compare ssf_test

check-trailing-whitespace:
  interruptible: true
  stage: build
  image: python:3.13-alpine3.20
  script:
    - apk add -U git
    - ./scripts/checkwhitespace.py
  only:
    - branches

