            - "openid"
            - "accounts"
  /parties:
    get:
      tags:
        - "Parties"
      summary: "Get current PSU Information"
      description: |
        For entities seeking to onboard their customers (consumers) smartly with a seamless CX (UC03 Extended Customer Attributes).
        This endpoint allows them to retrieve KYC information of their customers stored by the bank after a successful customer onboarding and account opening process.

        **The list below outlines the Consent Permissions that are applicable to this resource:**

        * ReadPartyPSU: Returns high-level information on the successfully authorized user linked to the account at the PASP.
        * ReadPartyPSUIdentity: Returns full KYC information on the successfully authorized user linked to the account at the PASP.

        Refer to *Customer Experience Guidelines*, *Account Information*, *Data Groups* for further information.
      operationId: "GetParties"
      parameters:
        - $ref: "#/components/parameters/authorization"
        - $ref: "#/components/parameters/x-fapi-auth-date"
        - $ref: "#/components/parameters/x-fapi-customer-ip-address"
        - $ref: "#/components/parameters/x-fapi-interaction-id"
        - $ref: "#/components/parameters/x-customer-user-agent"
      responses:
        '200':
          $ref: "#/components/responses/200PartiesRead"
        '400':
          $ref: "#/components/responses/400Error"
        '401':
          $ref: "#/components/responses/401Error"
        '403':
          $ref: "#/components/responses/403Error"
        '404':
          $ref: "#/components/responses/404Error"
        '405':
          $ref: "#/components/responses/405Error"
        '406':
