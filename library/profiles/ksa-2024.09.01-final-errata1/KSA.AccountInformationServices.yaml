      additionalProperties: false

    OBCreateConsentResponse:
        title: "OBCreateConsentResponse"
        description: "Create Account Access Consent Response"
        type: "object"
        required:
          - "Data"
          - "Risk"
          - "Links"
          - "Meta"
        properties:
          Data:
            type: "object"
            description: "Primary data for the resource"
            required:
              - "ConsentId"
              - "CreationDateTime"
              - "ConsentStatus"
              - "ConsentStatusUpdateDateTime"
              - "Permissions"
              - "ConsentPurpose"
              - "ExpirationDateTime"
            properties:
              ConsentId:
                description: "Unique identification as assigned to identify the account access consent resource."
                type: "string"
                minLength: 1
                maxLength: 128
              CreationDateTime:
                $ref: "#/components/schemas/CreationDateTime"
              ConsentStatus:
                $ref: "#/components/schemas/OBConsentStatus"
              ConsentFlags:
                $ref: "#/components/schemas/OBConsentFlags"
              ConsentStatusUpdateDateTime:
                $ref: "#/components/schemas/StatusUpdateDateTime"
              Permissions:
                $ref: "#/components/schemas/OBConsentPermissions"
              AuthorizationExpirationTimeWindow:
                $ref: "#/components/schemas/OBAuthorizationExpirationTimeWindow"
              ExpirationDateTime:
                description: "Specified date and time the permissions will expire.\nIf this is not populated, the permissions will be open ended.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
                type: "string"
                format: "date-time"
              TransactionFromDateTime:
                description: "Specified start date and time for the transaction query period.\nIf this is not populated, the start date will be open ended, and data will be returned from the earliest available transaction.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
                type: "string"
                format: "date-time"
              TransactionToDateTime:
                description: "Specified end date and time for the transaction query period.\nIf this is not populated, the end date will be open ended, and data will be returned to the latest available transaction.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
                type: "string"
                format: "date-time"
              AccountType:
                type: "array"
                items:
                  $ref: "#/components/schemas/OBExternalAccountTypeCode"
              AccountSubType:
                type: "array"
                items:
                  $ref: "#/components/schemas/OBExternalAccountSubTypeCode"
              FourthParty:
                 $ref: "#/components/schemas/OBFourthParty"
              SponsoredTPP:
                $ref: "#/components/schemas/OBSponsoredTPP"
              ConsentPurpose:
                type: "array"
                items:
                  $ref: "#/components/schemas/OBConsentPurpose"
              IsPSUReadAllAccounts:
                  $ref: "#/components/schemas/OBReadAllAccounts"
              RevokedBy:
                 $ref: "#/components/schemas/OBRevokedBy"
            additionalProperties: false
          Risk:
           description: |
             The Risk section is sent by the AISP to the PASP. It is used to specify additional details for risk/fraud scoring.
           type: "object"
           required:
              - "PSUIndicators"
              - "DeviceIndicators"
              - "RequestIndicators"
           properties:
            PSUIndicators:
             $ref: "#/components/schemas/CreateConsentOBPSUIndicators"
            DeviceIndicators:
             $ref: "#/components/schemas/OBDeviceIndicators"
            RequestIndicators:
             $ref: "#/components/schemas/CreateConsentOBRequestIndicators"
          Subscription:
            $ref: "#/components/schemas/EventNotification"
          Links:
            $ref: "#/components/schemas/LinksSelf"
          Meta:
            $ref: "#/components/schemas/OBMetaMultiAuthorization"
        additionalProperties: false



    OBReadBalance:
      title: "OBReadBalance"
      description: "List of Balances for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "AccountId"
            - "Balance"
          properties:
            AccountId:
              $ref: "#/components/schemas/AccountId"
            Balance:
              type: "array"
              items:
                $ref: "#/components/schemas/OBBalance"
              minItems: 1
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBBalance:
      title: "OBBalance"
      type: "object"
      description: "Set of elements used to define the balance details."
      required:
        - "CreditDebitIndicator"
        - "Type"
        - "CreditLineIncluded"
        - "DateTime"
        - "Amount"
      properties:
        CreditDebitIndicator:
          $ref: "#/components/schemas/OBCreditDebitCode"
        Type:
          $ref: "#/components/schemas/OBBalanceTypeCode"
        DateTime:
          description: "Indicates the date (and time) that the account balance was checked.All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is below: 2017-04-05T10:43:07+00:00"
          type: "string"
          format: "date-time"
        Amount:
          type: "object"
          required:
            - "Amount"
            - "Currency"
          description: "Amount of money of the cash balance."
          properties:
            Amount:
              $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
            Currency:
              $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
          additionalProperties: false
        CreditLineIncluded:
                description: "Boolean flag to Indicate whether or not a credit line is included in the balance of the account. Usage: If not present, credit line is not included in the balance amount of the account."
                type: "boolean"
        CreditLine:
          type: "array"
          items:
            type: "object"
            description: "If (CreditLineIncluded=true) CreditLine block MUST be returned to the TPP if the PSU has any credit line, For more details on specific OB AIS use cases requiring CreditLine,refer to the Detailed Implementation Requirements section in the Implementation Requirements page."
            required:
              - "Type"
              - "Amount"
            properties:

              Type:
                description: "Type of credit line provided to the account. Encoded with allowable values of: Available, Credit, Emergency, Pre-Agreed, Temporary. Note: PASPs support different types of credit lines on accounts, so this list is used to support different PASP systmes in KSA."
                type: "string"
                enum:
                  - "KSAOB.Available"
                  - "KSAOB.Credit"
                  - "KSAOB.Emergency"
                  - "KSAOB.Pre-Agreed"
                  - "KSAOB.Temporary"
              Amount:
                type: "object"
                required:
                  - "Amount"
                  - "Currency"
                description: "Amount of money of the credit line."
                properties:
                  Amount:
                    $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
                  Currency:
                    $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
                additionalProperties: false
            additionalProperties: false

    OBReadScheduledPayment:
      title: "OBReadScheduledPayment"
      description: "List of Scheduled Payments for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "AccountId"
            - "ScheduledPayment"
          properties:
            AccountId:
              $ref: "#/components/schemas/AccountId"
            ScheduledPayment:
              type: "array"
              items:
                $ref: "#/components/schemas/OBScheduledPayment"
        Links:
          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBScheduledPayment:
      title: "OBScheduledPayment"
      description: "Scheduled Payments for a specific AccountId"
      type: "object"
      required:
        - "ScheduledPaymentId"
        - "ScheduledPaymentDateTime"
        - "ScheduledType"
        - "InstructedAmount"
      properties:
        ScheduledPaymentId:
          $ref: "#/components/schemas/ScheduledPaymentId"
        AccountHolderName:
          $ref: "#/components/schemas/AccountHolderName"
        AccountHolderShortName:
          $ref: "#/components/schemas/AccountHolderShortName"
        ScheduledType:
          $ref: "#/components/schemas/OBExternalScheduleTypeCode"
        ScheduledPaymentDateTime:
          $ref: "#/components/schemas/ScheduledPaymentDateTime"
        CreditorReference:
          $ref: "#/components/schemas/Reference"
        DebtorReference:
          $ref: "#/components/schemas/DebtorReference"
        InstructedAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
        CreditorAgent:
          $ref: "#/components/schemas/OBBranchAndFinancialInstitutionIdentification"
        CreditorAccount:
          $ref: "#/components/schemas/OBCashAccount"

      additionalProperties: false
    TerminalId:
      title: "TerminalId"
      description: "ID of the Terminal if the transaction was initiated from a retail POS or ATM"
      type: "string"
      minLength: 8
      maxLength: 20
      example: "1234567812345678"
    BranchName:
      title: "BranchName"
      description: "This field is mandatory for Teller Type of Transactions (Withdraw/Deposit)"
      type: "string"
      minLength: 10
      maxLength: 80
    BranchNumber:
      title: "BranchNumber"
      description: "This field is mandatory for Teller Type of Transactions (Withdraw/Deposit)"
      type: "string"
      minLength: 10
      maxLength: 80
    BillDetails:
      title: "BillDetails"
      description : "Bill Details"
      type: "object"
      properties:
        BillerId:
          description: "This should be 'BillerCode' as per SP-SADAD specifications. It is a unique biller identifier within SADAD that could be used by the end-user to refer to a specific SADAD biller (e.g. STC biller code is 001, water services biller code is 015, etc.)"
          type: "string"
        BillNumber:
          description: "Unique bill identifier within the account."
          type: "string"
        BillPaymentType:
          description: |
            Indicates whether the bill could be a One-off payment, Recurring payment, Postpaid, Pre-paid, etc. Example values:
            - "KSAOB.Post-Paid"
            - "KSAOB.AdvancePaymentForRoaming"
            - "KSAOB.Recharge"
            - "KSAOB.Renewal"
            - "KSAOB.RoamingDeposit"
            - "KSAOB.One-Off"
            - "KSAOB.RecurringPayment"
          type: "string"
          x-namespaced-enum:
            - "KSAOB.Post-Paid"
            - "KSAOB.AdvancePaymentForRoaming"
            - "KSAOB.Recharge"
            - "KSAOB.Renewal"
            - "KSAOB.RoamingDeposit"
            - "KSAOB.One-Off"
            - "KSAOB.RecurringPayment"
      additionalProperties: false
    OBConsentStatus:
      title: "OBConsentStatus"
      description: |
        Specifies the authorization statuses of a consent.

        | Consent Status| State Type| Description|
        |---------------|-----------|------|
        | AwaitingAuthorization | Pending | The consent is awaiting authorization.|
        | Authorized | In Use | The consent has been successfully authorized.  |
        | Rejected | Terminal | The unauthorized consent has been canceled at the TPP/AISP or rejected at the PASP.|
        | Finished | Terminal | The consented action(s) have either been completed successfully, the consent has expired, or the authorized consent has been revoked.|
      type: "string"
      enum:
        - "AwaitingAuthorization"
        - "Authorized"
        - "Rejected"
        - "Finished"
    OBConsentFlags:
      title: "OBConsentFlags"
      description: |
        Flags that can be associated with a Consent Status.

        A Consent Status:
        * May not have any associated flags.
        * May have one or more associated flags.

        A Flag cannot be changed once it is created. Its state is Immutable.
        Each Flag value that is set must have a date time stamp associated with it.

        |Flag| Consent Status| Flag Description|
        |----|---------------|-----------------|
        | PartlyAuthorized | AwaitingAuthorization | The initiator has authorized the consent and is awaiting further authorizations.|
        | Activated |Authorized | The authorized long-lived consent is being utilized.|
        | Revoked | Finished | An authorized consent has been revoked |
        | Expired | Finished | The consent has expired |
        | Closed | Finished | The consent has finished with no further inquiries permitted.|
        | |Rejected| The unauthorized consent has been canceled at the TPP or rejected at the PASP.
      type: "object"
      properties:
        PartlyAuthorized:
          $ref: "#/components/schemas/OBFlagDateTime"
        Activated:
          $ref: "#/components/schemas/OBFlagDateTime"
        Revoked:
          $ref: "#/components/schemas/OBFlagDateTime"
        Expired:
          $ref: "#/components/schemas/OBFlagDateTime"
        Closed:
          $ref: "#/components/schemas/OBFlagDateTime"
      additionalProperties: false
    OBPatchConsentStatus:
      title: "OBConsentStatus"
      description: |
        Specifies the authorization statuses of a consent.

        | Consent Status| State Type| Description|
        |---------------|-----------|------|
        | Rejected | Terminal | The unauthorized consent has been canceled at the TPP/AISP or rejected at the PASP.|
        | Finished | Terminal | The consented action(s) have either been completed successfully, the consent has expired, or the authorized consent has been revoked.|
      type: "string"
      enum:
        - "Rejected"
        - "Finished"
    OBPatchConsentFlags:
      title: "OBPatchConsentFlags"
      description: |
        Flag that can be associated with a Consent Status.
        The Flag cannot be changed once it is created. Its state is Immutable.
        Each Flag value that is set must have a date time stamp associated with it.


        |Flag| Consent Status| Flag Description|
        |----|---------------|-----------------|
        | Revoked | Finished | An authorized consent has been revoked |
      type: "object"
      properties:
        Revoked:
          $ref: "#/components/schemas/OBFlagDateTime"
      additionalProperties: false
    OBRevokedBy:
      title: "OBRevokedBy"
      description: |
        Denotes the Identifier of the revocation.

        | Identifier| Description|
        |-----------|------------|
        | PASP | Revoked by PASP without PSU initiation|
        | TPP | Revoked by TPP without PSU initiation|
        | PASP.InitiatedByPSU | Initiated by PSU via the PASP|
        | TPP.InitiatedByPSU | Initiated by PSU via the TPP|
      type: "string"
      enum:
        - "KSAOB.PASP"
        - "KSAOB.TPP"
        - "KSAOB.PASP.InitiatedByPSU"
        - "KSAOB.TPP.InitiatedByPSU"
    OBRevokedByPatchConsent:
      title: "OBRevokedByPatchConsent"
      description: |
        Denotes the Identifier of the revocation.

        | Identifier| Description|
        |-----------|------------|
        | TPP | Revoked by TPP without PSU initiation|
        | TPP.InitiatedByPSU | Initiated by PSU via the TPP|
      type: "string"
      enum:
        - "KSAOB.TPP"
        - "KSAOB.TPP.InitiatedByPSU"
    OBFlagDateTime:
      title: "OBFlagDateTime"
      description: "Date and time at which a Flag has been set. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2023-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    OBMultiLanguageRequiredFields:
      title: "OBMultiLanguageRequiredFields"
      description: |
        Specifies a mandatory multi-language set of fields.
        * Claims.Name: The PSU name claim that has been verified by the PASP
        * Claims.GivenName: The PSU given name claim that has been verified by the PASP. Given name (also called forename) is used to differentiate from the surname or family name. Also called first name to distinguish it from the family name. Some people have two or more given names or acquired names that they use before the family name.
        * Claims.FamilyName: The PSU family name claim that has been verified by the PASP.
        * Claims.MiddleName: The PSU middle name claim that has been verified by the PASP.
        * Claims.GrandfatherName: The PSU grandfather name claim that has been verified by the PASP.
      type: "object"
      additionalProperties: false
      required:
        - "en"
        - "ar"
      properties:
        en:
          type: "string"
          description: "English value of the string"
        ar:
          type: "string"
          description: "Arabic value of the string"
    OBMultiLanguageOptionalFields:
          title: "OBMultiLanguageOptionalFields"
          description: |
            Specifies an optional multi-language set of fields.
            * Claims.Nickname: The PSU nickname claim that has been verified by the PASP
          type: "object"
          additionalProperties: false
          properties:
            en:
              type: "string"
              description: "English value of the string"
            ar:
              type: "string"
              description: "Arabic value of the string"
    OBAuthorizationExpirationTimeWindow:
      title: "OBAuthorizationExpirationTimeWindow"
      description: |
        A time window by which a Consent (in AwaitingAuthorization status) must be Authorized by the PSU.
        The time window starts from the actual CreationDateTime (when the Consent is staged with the PASP).
        If the current time window exceeds the Authorization Expiration Time Window (and the Consent status is AwaitingAuthorization) then the Consent Status must be set to Rejected.
        The time window is based on a custom time format hhh:mm:ss. e.g. 720:00:00 represents a time window of 720 hours, 00 minutes, 00 seconds (30 days) after the CreationDateTime to Authorize the Consent.
      type: "string"
      pattern: '^(00[0-9]|0[1-9][0-9]|[1-6][0-9]{2}|7[01][0-9]|720):[0-5][0-9]:[0-5][0-9]$'
      example: "720:00:00"
    OBAddress:
      title: "OBAddress"
      description: |
        (Array) Address information that locates and identifes a specific address, as defined by a national or international postal service.
        * NationalAddress: This address is specific for local (Saudi National) residents.
        * HomeCountryAddress: This address is specific for non-local (GCC/International) residents.
      type: "array"
      minItems: 1
      items:
        type: "object"
        required:
          - "AddressType"
          - "Country"
        properties:
          AddressType:
            $ref: "#/components/schemas/OBAddressTypeCode"
          ShortAddress:
            $ref: "#/components/schemas/OBShortAddress"
          UnitNumber:
            $ref: "#/components/schemas/OBUnitNumber"
          FloorNumber:
            $ref: "#/components/schemas/OBFloorNumber"
          BuildingNumber:
            $ref: "#/components/schemas/OBBuildingNumber"
          StreetName:
            $ref: "#/components/schemas/OBStreetName"
          SecondaryNumber:
            $ref: "#/components/schemas/OBSecondaryNumber"
          District:
            $ref: "#/components/schemas/OBDistrict"
          PostalCode:
            $ref: "#/components/schemas/OBPostalCode"
          POBox:
            $ref: "#/components/schemas/OBPOBox"
          ZipCode:
            $ref: "#/components/schemas/OBZipCode"
          City:
            $ref: "#/components/schemas/OBCity"
          Region:
            $ref: "#/components/schemas/OBRegion"
          Country:
            $ref: "#/components/schemas/OBCountryCode"
        additionalProperties: false
    OBAddressTypeCode:
      title: "OBAddressTypeCode"
      description: "Specifies the nature of the Address."
      type: "string"
      enum:
        - "KSAOB.Business"
        - "KSAOB.Correspondence"
        - "KSAOB.Residential"
      example: "KSAOB.Residential"
    OBShortAddress:
      title: "OBShortAddress"
      description: "A short address consists of four letters: region code, branch code, division code, unique code and a four-digit number for the building."
      type: "string"
      minLength: 1
      maxLength: 8
      example: "ABCD1234"
    OBUnitNumber:
      title: "OBUnitNumber"
      description: "Identifies the unit or apartment number."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "6"
    OBFloorNumber:
      title: "OBFloorNumber"
      description: "Identifies the building floor number."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "2"
    OBBuildingNumber:
      title: "OBBuildingNumber"
      description: "Identifies the building number."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "34"
    OBStreetName:
      title: "OBStreetName"
      description: "Identifies the street name or road."
      type: "string"
      minLength: 1
      maxLength: 70
      example: "Omar Bin Hassan Street"
    OBDistrict:
      title: "OBDistrict"
      description: "Identifies the district of a city."
      type: "string"
      minLength: 1
      maxLength: 35
      example: "Olaya Dist."
    OBCountryCode:
      title: "OBCountryCode"
      description: "Indicates the country code in which the address is located (References ISO 3166-1 alpha-2)."
      type: "string"
      pattern: "^[A-Z]{2,2}$"
      example: "SA"
    OBPostalCode:
      title: "OBPostalCode"
      description: " Identifies the postal code; a unique code assigned to a specific geographic area for efficient mail sorting and delivery purposes."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "12345"
    OBPOBox:
      title: "POBox"
      description: " Identifies the POBox."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "11562"
    OBZipCode:
      title: "ZipCode"
      description: "Identifies the ZIP code; a unique code assigned to a specific geographic area for efficient mail sorting and delivery purposes."
      type: "string"
      minLength: 1
      maxLength: 10
      example: "12366"
    OBSecondaryNumber:
      title: "OBSecondaryNumber"
      description: "4 numbers representing the accurate location coordinates of the address"
      type: "string"
      minLength: 4
      maxLength: 4
      example: "1233"
    OBCity:
      title: "OBCity"
      description: "Identifies the name of the city or town where the address is situated."
      type: "string"
      minLength: 1
      maxLength: 35
      example: "Riyadh"
    OBRegion:
      title: "OBRegion"
      description: "Identifies the region."
      type: "string"
      minLength: 1
      maxLength: 35
      example: "North"
  ############################################
  # PARAMETERS
  ############################################
  parameters:
    #################################################
    # HEADER PARAMETERS
    #################################################
    authorization:
      in: "header"
      name: "authorization"
      required: true
      description: "An authorization Token as per https://tools.ietf.org/html/rfc6750"
      schema:
        type: "string"
      example: Bearer 12773da5-81c5-45e7-893c-381ca3cecc30
    x-customer-user-agent:
      in: "header"
      name: "x-customer-user-agent"
      description: "Indicates the user-agent that the PSU is using."
      required: false
      schema:
        type: "string"
      example: Mozilla/5.0 (iPhone; CPU iPhone OS 10_3_1 like Mac OS X) AppleWebKit/603.1.30 (KHTML, like Gecko) Version/10.0 Mobile/14E304 Safari/602.1
    x-fapi-customer-ip-address:
      in: "header"
      name: "x-fapi-customer-ip-address"
      required: false
      description: "The PSU's IP address if the PSU is currently logged in with the TPP."
      schema:
        type: "string"
      example: 51.235.115.203
    x-fapi-auth-date:
      in: "header"
      name: "x-fapi-auth-date"
      required: false
      description: "The time when the PSU last logged in with the TPP. \nAll dates in the HTTP headers are represented as RFC 7231 Full Dates. An example is below: \nSun, 10 Sep 2017 19:43:31 UTC"
      schema:
        type: "string"
        pattern: "^(Mon|Tue|Wed|Thu|Fri|Sat|Sun), \\d{2} (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) \\d{4} \\d{2}:\\d{2}:\\d{2} (GMT|UTC)$"
      example: Thu, 26 Jan 2023 16:31:32 UTC
    x-fapi-interaction-id:
      in: "header"
      name: "x-fapi-interaction-id"
      required: false
      description: "An RFC4122 UID used as a correlation id."
      schema:
        type: "string"
      example: 49df2c2c-6b80-40ee-96a1-71910a248048
    #################################################
    # PATH PARAMETERS
    #################################################
    ConsentId:
      name: "ConsentId"
      in: "path"
      description: "ConsentId"
      required: true
      schema:
        type: "string"
      example: aac-69255d98-ab0e-4758-92a7-cacbf3073efa
    AccountId:
      name: "AccountId"
      in: "path"
      description: "AccountId"
      required: true
      schema:
        type: "string"
      example: f91d07d0-6d8f-4e0e-9fb4-0ac61f84d115
    #################################################
    # QUERY PARAMETERS
    #################################################
    FromBookingDateTimeParam:
      in: "query"
      name: "fromBookingDateTime"
      description: "The UTC ISO 8601 Date Time to filter transactions FROM\nNB Time component is optional - set to 00:00:00 for just Date.\nIf the Date Time contains a timezone, the PASP must ignore the timezone component."
      schema:
        type: "string"
        format: "date-time"
        example: 2023-01-25T12:19:24+0300
    ToBookingDateTimeParam:
      in: "query"
      name: "toBookingDateTime"
      description: "The UTC ISO 8601 Date Time to filter transactions TO\nNB Time component is optional - set to 00:00:00 for just Date.\nIf the Date Time contains a timezone, the PASP must ignore the timezone component."
      schema:
        type: "string"
        format: "date-time"
        example: 2023-01-27T12:19:24+0300
  ############################################
  # SECURITY SCHEMES
  ############################################
  securitySchemes:
    TPPOAuth2Security:
      type: oauth2
      description: "TPP confidential client authorization with the PASP to stage a consent. **Please refer to [OpenID FAPI Security Profile 1.0 -Part 2 Advanced](https://openid.net/specs/openid-financial-api-part-2-1_0.html#authorization-server) - 5.2.2 point 14 - shall authenticate the confidential client using one of the following methods private_key_jwt and [OpenID Connect Core 1.0](https://openid.net/specs/openid-connect-core-1_0.html#ClientAuthentication) 9. Client Authentication private_key_jwt**"
      flows:
        clientCredentials:
          tokenUrl: "https://authserver.example/token"
          scopes:
            openid: Activates OpenID Connect Support
            accounts: Ability to read Accounts Information
    PSUOAuth2Security:
      type: oauth2
      description: "[OAuth2 PAR flow](https://datatracker.ietf.org/doc/html/rfc9126), it is required when the PSU needs to perform SCA with the PASP when a TPP wants to access an PASP resource owned by the PSU. **Please refer to [OpenID FAPI Security Profile 1.0 -Part 2 Advanced](https://openid.net/specs/openid-financial-api-part-2-1_0.html#authorization-server) - 5.2.2 point 14 - shall authenticate the confidential client using one of the following methods private_key_jwt and [OpenID Connect Core 1.0](https://openid.net/specs/openid-connect-core-1_0.html#ClientAuthentication) 9. Client Authentication private_key_jwt**"
      flows:
        authorizationCode:
          authorizationUrl: "https://authserver.example/authorization"
          tokenUrl: "https://authserver.example/token"
          scopes:
            openid: Activates OpenID Connect Support
            "accounts:<consentId>": Ability to read Accounts Information. This is a parameterized scope with the ConsentId
    PASPWebhookSecurity:
      type: http
      description: "The PASP generates a Self Signed JWT Authorization Token for Client Authentication with the TPP. **Please refer to Self-Signed JWT Authorization Token Specification in the KSA Standard API User Guide**"
      scheme: bearer
      bearerFormat: JWT
