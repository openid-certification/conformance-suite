      maxLength: 35
    OBExternalFinancialInstitutionIdentificationCode:
      title: "OBExternalFinancialInstitutionIdentificationCode"
      description: |
        * /accounts resource
        The name of the identification scheme for the PASP as the account services provider. Encoded with allowable value as published in an external list.

        * /beneficiaries resource
        Refers to the Financial Institution that manages the account on behalf of the Beneficiary party, managing registration, booking of entries on the account, calculating balances on the account and providing information about the account. This is the servicing Financial Institution of the Beneficiary account.

        * /scheduled-payments resource
        Refers to the identification scheme for uniquely identifying the Creditor Agent.

        * /standing-orders resource
        Refers to the identification scheme for uniquely identifying the Creditor Agent.

        * /transactions resource
        Refers to the identification scheme for uniquely identifying the Creditor Agent.
      type: "string"
      enum:
        - "KSAOB.BICFI"
        - "KSAOB.OTHER"
    AccountIdentifiers:
      title: "AccountIdentifiers"
      type: "array"
      items:
        type: "object"
        description: "Provides the details to identify an account."
        required:
          - "IdentificationType"
          - "Identification"
        properties:
          IdentificationType:
            $ref: "#/components/schemas/OBExternalAccountIdentificationCode"
          Identification:
            $ref: "#/components/schemas/IdentificationAccountIdentifier"
          Name:
            $ref: "#/components/schemas/NameAccountIdentifier"
        additionalProperties: false
    OBBranchAndFinancialInstitutionIdentification:
      title: "OBBranchAndFinancialInstitutionIdentification"
      type: "object"
      required:
        - "IdentificationType"
        - "Identification"
      description: |
        * /accounts | /accounts/{AccountId} resource
        Party that manages the account on behalf of the account owner, that is manages the registration and booking of entries on the account, calculates balances on the account and provides information about the account.

        * /accounts/{AccountId}/standing-orders | /accounts/{AccountId}/scheduled-payments resource
        Creditor Agent refers to the Financial Institution that manages the account on behalf of the scheduled payment beneficiary party, managing registration, booking of entries on the account, calculating balances on the account and providing information about the account. This is the servicing Financial Institution of the Beneficiary account.
      properties:
        IdentificationType:
          $ref: "#/components/schemas/OBExternalFinancialInstitutionIdentificationCode"
        Identification:
          $ref: "#/components/schemas/IdentificationInstitutionIdentifier"
      additionalProperties: false
    OBTransactionBeneficiaryBranchAndFinancialInstitutionIdentification:
      title: "OBTransactionBeneficiaryBranchAndFinancialInstitutionIdentification"
      type: "object"
      description: |
        ###### /accounts/{AccountId}/beneficiaries resource:

        Party that manages the account on behalf of the account owner, that is manages the registration and booking of entries on the account, calculates balances on the account and provides information about the account.\nThis is the servicer of the beneficiary account.

        ###### /accounts/{AccountId}/transactions resource

        **CreditorAgent**: Financial institution servicing an account for the creditor in case the transaction is a Debit transaction.
        These are optional because there are situations where this cannot be populated for the following Debit transactions
        - Cash withdrawals (no creditor account/agent)
        - Cheques and DDs may not have this information at least during the process of clearing and sometimes (e.g. for agency banks) may not be reconciled ever
        - Some corner situations with international payments
        - For card payments (instead merchant information fields should be populated)

        **DebtorAgent**: Financial institution servicing an account for the Debtor in case the transaction is a Credit transaction.
        These are optional because there are situations where this cannot be populated for the following Credit transactions
        - Cash Deposits (no creditor account/agent)
        - Cheques and DDs may not have this information at least during the process of clearing and sometimes (e.g. for agency banks) may not be reconciled ever
        - Some corner situations with international payments
        - For refunds with card payments  (instead merchant information fields should be populated)
      required:
        - "IdentificationType"
        - "Identification"
      properties:
        IdentificationType:
          $ref: "#/components/schemas/OBExternalFinancialInstitutionIdentificationCode"
        Identification:
          $ref: "#/components/schemas/IdentificationInstitutionIdentifier"
        Name:
          $ref: "#/components/schemas/NameInstitutionIdentifier"
        PostalAddress:
          $ref: "#/components/schemas/OBAddress"
      additionalProperties: false
    CreationDateTime:
      title: "CreationDateTime"
      description: "Date and time at which the resource was created. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    OBDeviceIndicators:
      title: "OBDeviceIndicators"
      type: "object"
      description: |
        Device Indicators
      required:
          - "GeoLocation"
          - "DeviceId"
          - "VPNStatus"
          - "RemoteAccessTool"
          - "Screensharing"
          - "DeviceSoftwareRestricted"
          - "TrustedDeviceFlag"
          - "IPAddressVerison"
          - "DeviceType"
          - "DeviceName"
          - "ConnectionType"
          - "AppVersion"
          - "LocaleInformation"
          - "StorageCapacity"
          - "ScreenReaderActive"
          - "ISPName"
          - "NetworkType"
      properties:
         GeoLocation:
          type: "object"
          description: "An object containing the GPS coordinates (latitude and longitude) used to identify and track the real-time location of the connected electronic device."
          required:
            - "Latitude"
            - "Longitude"
          properties:
            Latitude:
              type: "string"
              description: "latitude"
            Longitude:
              type: "string"
              description: "longitude"
         DeviceId:
          type: "string"
          description: "A 16-digit IMEISV (International Mobile Equipment Identity and Software Version) number used to uniquely identify a mobile device and the version of the software currently installed on it."
          minLength: 16
          maxLength: 16
         VPNStatus:
          description: "Indicates whether a Virtual Private Network (VPN) is currently active on the PSU device."
          type: "boolean"
         RemoteAccessTool:
          description: "Indicates whether a Remote Access Tool is currently active on the PSU device."
          type: "boolean"
         Screensharing:
          description: "Indicates whether screen sharing is currently active on the PSU device."
          type: "boolean"
         DeviceSoftwareRestricted:
          description: "Indicates whether the PSU device is jailbroken or rooted."
          type: "boolean"
         TrustedDeviceFlag:
          description: "Indicates whether the PSU device is trusted. If TrustedDeviceFlag is true, the fields TrustedDeviceDateAndTime and MechanismOfTrustingDevice must be populated."
          type: "boolean"
         TrustedDeviceDateAndtime:
          type: "string"
          format: "date-time"
          description: "The date and time when the PSU device was marked as trusted."
         MechanismOfTrustingDevice:
          description: "Identifies the mechanism used to mark the PSU device as trusted."
          type: "string"
          enum:
            - "KSAOB.IVR"
            - "KSAOB.OTP"
            - "KSAOB.Nafath"
         IPAddressVerison:
          description: "Indicates the Internet Protocol version used by the PSU device."
          type: "string"
          enum:
            - "KSAOB.IPv4"
            - "KSAOB.IPv6"
         DeviceType:
          description: "The type of the PSU device, such as smartphone, tablet, or smartwatch."
          type: "string"
          enum:
            - "KSAOB.Smartphone"
            - "KSAOB.Tablet"
            - "KSAOB.Smartwatch"
         DeviceName:
          description: "The name given to the device by the PSU"
          type: "string"
         ConnectionType:
          description: "The internet connection type used by the PSU device."
          type: "string"
          enum:
            - "KSAOB.WiFi"
            - "KSAOB.MobileData"
         AppVersion:
          description: "The specific version of the TPP application installed on the PSU device."
          type: "string"
         LocaleInformation:
          description: "Regional settings of the PSU device, indicating how dates, times, and numbers are displayed. Format: (Country Code, ISO 3166-1 Alpha-2)"
          type: "string"
         StorageCapacity:
          description: "The total and available storage capacity of the PSU device, e.g. 128GB total, 30GB free."
          type: "string"
         ScreenReaderActive:
          description: "Indicates whether assistive technologies such as screen readers are active on the PSU device."
          type: "boolean"
         ISPName:
          description: "The name of the Internet Service Provider (ISP) used by the PSU device."
          type: "string"
         NetworkType:
          description: "The mobile network generation used by the PSU device."
          type: "string"
          enum:
            - "KSAOB.2G"
            - "KSAOB.3G"
            - "KSAOB.4G"
            - "KSAOB.5G"
          additionalProperties: false
    CreateConsentOBPSUIndicators:
      title: "CreateConsentOBPSUIndicators"
      type: "object"
      description: |
        PSU Indicators
      required:
          - "PSUName"
          - "PSUPhoneNumber"
          - "IsCustomerRegistered"
          - "IsCustomerVerified"
          - "FailedLoginAttempts"
          - "PasswordChangedDateTime"
          - "PSUOnboardingDateTime"
      properties:
        PSUName:
          type: "object"
          description: "The Name of the PSU initiating the Consent"
          properties:
            en:
              type: "string"
              description: "English value of the string First Name, MiddleName, GrandfatherName & FamilyName (First Name and Family Name are mandatory)"
              minLength: 1
              maxLength: 50
            ar:
              type: "string"
              description: "Arabic value of the string First Name, MiddleName, GrandfatherName & FamilyName (First Name and Family Name are mandatory)"
              minLength: 1
              maxLength: 50
        PSUPhoneNumber:
          type: "string"
          description: "The Phone number of the PSU initiating the Consent"
          minLength: 10
          maxLength: 12
        IsCustomerRegistered:
                description: "Indicates if the PSU has an account (profile) with the AISP"
                type: "boolean"
        IsCustomerVerified:
                description: "Indicates whether the PSU has been verified with a multifactor authentication by the AISP during the registration and login steps."
                type: "boolean"
        FailedLoginAttempts:
                description: "Number of PSU failed login attempts prior to current session, If the PSU has an account with a TPP, this field must be populated"
                type: "integer"
        PasswordChangedDateTime:
          type: "string"
          format: "date-time"
          description: "The date and time of the last password change by the PSU on their TPP account, If the PSU has an account with a TPP, this field must be populated. All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is :2024-04-05T10:43:07+00:00"
        PSUOnboardingDateTime:
          type: "string"
          format: "date-time"
          description: "The exact date and time when the PSU account was activated with the TPP, If the PSU has an account with a TPP, All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is :2024-04-05T10:43:07+00:00"

    CreateConsentOBRequestIndicators:
        title: "CreateConsentOBRequestIndicators"
        type: "object"
        description: |
         Request Indicators
        required:
          - "InitiationMode"
          - "AcceptanceChannel"
        properties:
          InitiationMode:
           description: "KSAOB.UserInitiated means that the PSU is connected to the device and KSAOB.SystemInitiated indicates that a request has been initiated by the AISP under a long-lived consent. (Meaning the PSU is not connected to the device and the request happens automatically where the AISP initiate the request to the PASP under the authorized long-lived consent)"
           type: "string"
           enum:
            - "KSAOB.UserInitiated"
            - "KSAOB.SystemInitiated"
          AcceptanceChannel:
           description: "Indicated the channel used as the source for the request,This field is required for single consent and the first request in a long-lived consent (InitiationMode=KSAOB.UserInitiated)"
           type: "string"
           enum:
            - "KSAOB.Web"
            - "KSAOB.Mobile"
    OBConsentPermissions:
      title: "OBConsentPermissions"
      type: "array"
      description: "Specifies the Open Banking account access data types. This is a list of the data groups being consented by the PSU, and requested for authorization with the PASP."
      items:
        type: "string"
        enum:
          - "ReadAccountsBasic"             # Ability to read basic account information
          - "ReadAccountsDetail"            # Ability to read account identification details
          - "ReadBalances"                  # Ability to read all balance information
          - "ReadParty"                     # Required to access GET /accounts/{AccountId}/parties. Ability to read party information on the account owner.
          - "ReadPartyPSU"                  # Required to access GET /parties. Ability to read party information on the account owner.
          - "ReadPartyPSUIdentity"          # Required to access GET /parties. Include the above and additional information to fulfil KYC information e.g. The account name, address, date of birth, national ID and residency number
          - "ReadBeneficiariesBasic"        # Ability to read basic beneficiary details
          - "ReadBeneficiariesDetail"       # Ability to read account identification details for the beneficiary
          - "ReadTransactionsBasic"         # Ability to read basic transaction information
          - "ReadTransactionsDetail"        # Ability to read transaction data elements which may hold silent party details
          - "ReadTransactionsCredits"       # Ability to read only credit transactions
          - "ReadTransactionsDebits"        # Ability to read only debit transactions
          - "ReadScheduledPaymentsBasic"    # Ability to read basic scheduled payment details
          - "ReadScheduledPaymentsDetail"   # Ability to read additional scheduled payment details
          - "ReadDirectDebits"              # Ability to read all direct debit information
          - "ReadStandingOrdersBasic"       # Ability to read basic standing order Information
          - "ReadStandingOrdersDetail"      # Ability to read additional Standing order Information
      minItems: 1
    OBReadBeneficiary:
      title: "OBReadBeneficiary"
      description: "List of Beneficiaries for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
