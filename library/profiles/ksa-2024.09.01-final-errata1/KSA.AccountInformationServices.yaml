            Account:
              type: "array"
              items:
                $ref: "#/components/schemas/OBAccountArrayId"
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBReadAccountId:
      title: "OBReadAccountId"
      description: "Individual Account"
      type: "object"
      required:
        - "Data"
        - "Links"
