    EventNotification:
      title: "EventNotification"
      type: "object"
      description: |
        A Webhook Subscription Schema
      required:
        - "Webhook"
      properties:
        Webhook:
          description: |
            A Webhook Schema
          type: "object"
          properties:
            Url:
              description: |
                The TPP Callback URL being registered with the PASP
              type: "string"
              example: "https://api.tpp.com/webhook/callbackUrl"
            IsActive:
              description: |
                The TPP specifying whether the PASP should send (IsActive true) or not send (IsActive false) Webhook Notifications to the TPP's Webhook URL
              type: "boolean"
              example: false
          additionalProperties: false
      additionalProperties: false
    WebhookEvent:
      title: "WebhookEvent"
      type: "object"
      description: "Webhook Event"
      required:
      - "Data"
      - "EventMeta"
      properties:
        Data:
          type: "object"
          description: "Event Data. This Data Object will contain the same API resource and Schema that has triggered the Event."
        Links:
          $ref: "#/components/schemas/LinksSelf"
        EventMeta:
          type: "object"
          description: "Event Metadata"
          required:
          - "EventDateTime"
          - "EventResource"
          - "EventType"
          - "ConsentId"
          properties:
            EventDateTime:
              type: "string"
              format: "date-time"
              description: "Date Time of the first Event in the Message"
            EventResource:
              type: "string"
              description: "The API resource to which the Event itself is associated"
              example: "/accounts/123"
            EventType:
              type: "string"
              enum: ["KSAOB.Resource.Created", "KSAOB.Resource.Updated", "KSAOB.Resource.Deleted"]
              description: "The Type of Event"
            ConsentId:
              description: "Unique identification as assigned to identify the consents resource."
              type: "string"
              minLength: 1
              maxLength: 128
          additionalProperties: false
      additionalProperties: false
    OBConsentPurpose:
      title: "OBConsentPurpose"
      description: "Purpose"
      type: "string"
      enum: [Account Aggregation, Personal Finance Manager, Electronic Verification,E-Statement, Credit Assessment, Tax Filing, Enterprise Financial Management, Other]
    OBReadAllAccounts:
      title: "OBReadAllAccounts"
      description: |
        Indicates to the PASP whether or not they allow the PSU to select their accounts or not.
        If True, the PASP must not allow the PSU to select their accounts.
        If False, the PASP must allow the PSU to select their accounts.
      type: "boolean"
      default: false
    OBFourthParty:
      title: "OBFourthParty"
      type: "object"
      description: |
        Fourth parties are the beneficiaries whose services depend on AIS via a single-use consent.
      properties:
        TradingName:
          type: "string"
          description: |
            A name used by a business to promote its products or services to customers. It can be different from the business's legal name, but customers associate it with the business.
        LegalName:
          type: "string"
          description: |
            The name under which the business is registered with government authorities (Ministry of Commerce).
          example: "Acme Accounting Legal Name"
        IdentifierType:
          type: "string"
          description: "Identifier Type"
          enum:
            - "KSAOB.UnifiedCommercialNumber"
            - "KSAOB.Other"
        Identifier:
          type: "string"
          description: "Identifier"
          example: "abcd1234"
      additionalProperties: false
    OBSponsoredTPP:
      title: "OBSponsoredTPP"
      type: "object"
      description: |
        The Sponsored TPP is:
        * A TPP that itself has no direct Open Banking API integrations.
        * A TPP that is using the integration of another TPP that does have direct Open Banking API integrations.
      properties:
        TradingName:
          type: "string"
          minLength: 1
          maxLength: 50
          description: |
            A name used by a business to promote its products or services to customers. It can be different from the business's legal name, but customers associate it with the business.
        Identification:
          type: "string"
          minLength: 1
          maxLength: 50
          description: |
            The Sponsored TPP Identification
      additionalProperties: false
    OBErrorResponse:
      title: "OBErrorResponse"
      description: "An array of detail error codes, and messages, and URLs to documentation to help remediation."
      type: "object"
      properties:
        Errors:
          items:
            $ref: "#/components/schemas/OBError"
          type: "array"
          minItems: 1
      required:
        - "Errors"
      additionalProperties: false
    OBError:
      title: "OBError"
      description: "Error"
      type: "object"
      properties:
        Code:
          description: "Low level textual error code"
          type: "string"
          enum:
            - "KSAOB.AccessToken.Unauthorized"
            - "KSAOB.AccessToken.InvalidScope"
            - "KSAOB.Consent.Revoked"
            - "KSAOB.Consent.Unauthorized"
            - "KSAOB.Consent.TransientAccountAccessFailure"
            - "KSAOB.Consent.AccountTemporarilyBlocked"
            - "KSAOB.Consent.PermanentAccountAccessFailure"
            - "KSAOB.Consent.Invalid"
            - "KSAOB.JWS.InvalidSignature"
            - "KSAOB.JWS.Malformed"
            - "KSAOB.JWS.InvalidClaim"
            - "KSAOB.JWS.InvalidHeader"
            - "KSAOB.GenericRecoverableError"
            - "KSAOB.GenericError"
            - "KSAOB.JWE.DecryptionError"
            - "KSAOB.JWE.InvalidHeader"
            - "KSAOB.Event.UnexpectedEvent"
            - "KSAOB.Body.InvalidFormat"
            - "KSAOB.Resource.InvalidResourceId"
            - "KSAOB.Resource.InvalidFormat"
            - "KSAOB.Consent.BusinessRuleViolation"
        Message:
          description: "A description of the error that occurred. e.g., 'A mandatory field isn't supplied' or 'RequestedExecutionDateTime must be in future'\nKSAOB doesn't standardise this field"
          type: "string"
          minLength: 1
          maxLength: 500
        Path:
          description: "Recommended but optional reference to the JSON Path of the field with error, e.g., Data.Initiation.InstructedAmount.Currency"
          type: "string"
          minLength: 1
          maxLength: 500
        Url:
          description: "URL to help remediate the problem, or provide more information, or to API Reference, or help etc"
          type: "string"
      required:
        - "Code"
        - "Message"
      additionalProperties: false
      minProperties: 1
    LinksSelf:
      title: "LinksSelf"
      type: "object"
      description: "Links relevant to the resource"
      required:
        - "Self"
      properties:
        Self:
          $ref: "#/components/schemas/Self"
      additionalProperties: false
    Links:
      title: "Links"
      description: "Links relevant to the resource"
      required:
        - "Self"
      properties:
        Self:
          $ref: "#/components/schemas/Self"
        First:
          $ref: "#/components/schemas/First"
        Prev:
          $ref: "#/components/schemas/Prev"
        Next:
          $ref: "#/components/schemas/Next"
        Last:
          $ref: "#/components/schemas/Last"
      additionalProperties: false
    Meta:
      title: "MetaData"
      type: "object"
      description: "Meta Data relevant to the resource"
      additionalProperties: false
    MetaTotalPages:
      title: "MetaTotalPages"
      description: "Meta Data relevant to the resource"
      type: "object"
      properties:
        TotalPages:
            $ref: "#/components/schemas/TotalPages"
      additionalProperties: false
    MetaTransactions:
      title: "MetaTransactions"
      description: "Meta Data relevant to the resource"
      type: "object"
      properties:
        TotalPages:
            $ref: "#/components/schemas/TotalPages"
        FirstAvailableDateTime:
          $ref: "#/components/schemas/ISODateTime"
        LastAvailableDateTime:
          $ref: "#/components/schemas/ISODateTime"
      additionalProperties: false
    OBMetaMultiAuthorization:
      title: "OBMetaMultiAuthorization"
      type: "object"
      description: |
        Meta Data with Multi-Authorization relevant to the payload.
        For a payment, it represents any Authorizers within the PASP domain that are involved in approving the payment request.
      properties:
        MultipleAuthorizers:
          type: "object"
          description: "Multiple Authorizers Schema"
          properties:
            TotalRequired:
              description: |
                The total number of Authorizers required to process the request
              type: "number"
            Authorizations:
              type: "array"
              items:
                description: |
                  Authorizer
                type: "object"
                properties:
                  AuthorizerId:
                    description: |
                      The Authorizer's Identifier
                    type: "string"
                  AuthorizerName:
                    description: |
                      The Authorizer's Name
                    type: "string"
                  AuthorizerType:
                    description: |
                      The Type of Authorizer. For example, Financial, Management, etc.
                    type: "string"
                  AuthorizationDate:
                    description: |
                      The DateTime of when the Authorization occurred. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2023-04-05T10:43:07+00:00
                    type: "string"
                    format: "date-time"
                  AuthorizationStatus:
                    description: |
                      The Status reflecting the Authorizer's final decision regarding the request
                    type: "string"
                    enum:
                      - "Pending"
                      - "Approved"
                      - "Rejected"
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false
    Self:
      title: "Self"
      description: "A link to the current resource"
      type: "string"
      format: "uri"
    First:
      title: "First"
      description: "A link to the first page in a paginated result set"
      type: "string"
      format: "uri"
    Prev:
      title: "Prev"
      description: "A link to the previous page in a paginated result set"
      type: "string"
      format: "uri"
    Next:
      title: "Next"
      description: "A link to the next page in a paginated result set"
      type: "string"
      format: "uri"
    Last:
      title: "Last"
      description: "A link to the last page in a paginated result set"
      type: "string"
      format: "uri"
    TotalPages:
      title: "TotalPages"
      description: "Total number of Pages where a result set is paginated"
      type: "integer"
      format: "int32"
      minimum: 0
    TransactionDateTime:
      title: "TransactionDateTime"
      description: |
        The Date Time of when the transaction occurred.
        All dates in the JSON payloads are represented in ISO 8601 date-time format.
        All date-time fields in responses must include the timezone.
        An example is below: 2017-04-05T10:43:07+00:00
      type: "string"
      format: "date-time"
    PaymentMode:
      title: "PaymentModes"
      description: "The mode of payment"
      type: "string"
      enum:
        - "KSAOB.Online"
        - "KSAOB.Offline"
        - "KSAOB.Batch"
    TransactionType:
      title: "TransactionType"
      description: "The type of transaction"
      type: "string"
      enum:
        - "KSAOB.POS"
        - "KSAOB.ECommerce"
        - "KSAOB.ATM"
        - "KSAOB.BillPayments"
        - "KSAOB.LocalBankTransfer"
        - "KSAOB.SameBankTransfer"
        - "KSAOB.InternationalTransfer"
        - "KSAOB.Teller"
        - "KSAOB.Cheque"
        - "KSAOB.Other"
    SubTransactionType:
      title: "SubTransactionType"
      description: "The sub-type of a transaction"
      type: "string"
      enum:
        - "KSAOB.Purchase"
        - "KSAOB.Reversal"
        - "KSAOB.Refund"
        - "KSAOB.Withdrawal"
        - "KSAOB.WithdrawalReversal"
        - "KSAOB.Deposit"
        - "KSAOB.DepositReversal"
        - "KSAOB.MoneyTransfer"
        - "KSAOB.NotApplicable"
    Flags:
      title: "Flags"
      description: "The flag of a transaction"
      type: "string"
      enum:
        - "KSAOB.Cashback"
        - "KSAOB.Payroll"
        - "KSAOB.DirectDebit"
        - "KSAOB.StandingOrder"
        - "KSAOB.Loan"
        - "KSAOB.Dividend"
    AccountHolderName:
      title: "AccountHolderName"
      type: "string"
      description: |
        * /accounts resource
        The Account Holder Name is the name or names of the Account owner(s) represented at the account level

        * /accounts/{AccountId} resource
        The Account Holder Name is the name or names of the Account owner(s) represented at the account level

        * /beneficiaries resource
        The Account Holder Name is the name or names of the Beneficiary account owner(s) represented at the account level, as displayed by the Creditor Agent's online channels and as provided by the Beneficiary to the PSU when adding the Beneficiary in the Beneficiary list.
        Note, the Account Holder Name is not the product name or the nickname of the account.

        * /scheduled-payments resource
        The Account Holder Name is the name or names of the Beneficiary account owner(s) represented at the account level, as displayed by the Creditor Agent's online channels and as provided by the Beneficiary to the PSU when adding the Beneficiary in the Beneficiary list.
        Note, the Account Holder Name is not the product name or the nickname of the account.

        * /standing-orders resource
        The Account Holder Name is the name or names of the Beneficiary account owner(s) represented at the account level, as displayed by the Creditor Agent's online channels and as provided by the Beneficiary to the PSU when adding the Beneficiary in the Beneficiary list.
        Note, the Account Holder Name is not the product name or the nickname of the account.
    AccountHolderShortName:
      title: "AccountHolderShortName"
      type: "string"
      description: |
        * /accounts resource
        The Account holder nick name

        * /accounts/{AccountId} resource
        The Account holder nick name

        * /beneficiaries resource
        The Beneficiary account holder nick name

        * /scheduled-payments resource
        The Beneficiary account holder nick name

        * /standing-orders resource
        The Beneficiary account holder nick name
    StatementReference:
      title: "StatementReference"
      description: "Unique reference for the statement. This reference may be optionally populated if available."
      type: "string"
      minLength: 1
      maxLength: 35
    LocalTimeZone:
      title: "LocalTimeZone"
      description: |
        The UTC offset of the local date and time of where the transaction occurred
        E.g. UTC+03:00
      type: "string"
      example: "UTC+03:00"
      pattern: "^UTC[+-]([01]\\d|2[0-4])(:?[0-5]\\d)?$"
    ISODateTime:
      title: "ISODateTime"
      description: |
        All dates in the JSON payloads are represented in ISO 8601 date-time format.
        All date-time fields in responses must include the timezone.
        An example is:2023-04-05T10:43:07+00:00
      type: "string"
      format: "date-time"
    StandingOrderId:
      title: "StandingOrderId"
      description: "A unique and immutable identifier produced by the PASP to identify the account resource. This identifier has no meaning to the account owner."
      type: "string"
      minLength: 1
      maxLength: 40
    StandingOrderType:
      title: "StandingOrderType"
      description: "The type of Standing Order."
      type: "string"
      enum:
        - "KSAOB.BetweenMyAccounts"
        - "KSAOB.SameBankTransfer"
        - "KSAOB.LocalBankTransfer"
        - "KSAOB.InternationalTransfer"
        - "KSAOB.Charity"
    Frequency:
      title: "Frequency"
      type: "string"
      minLength: 1
      maxLength: 35
      description: |
        * The frequency that the Standing Order payments are executed from the PSUs account. Encoded with allowable values as follows:

        * Individual Definitions:
        NotKnown - SO frequency is not known (i.e. not provided)
        EveryDay - SO frequency is Every day
        EveryWorkingDay - SO frequency is every working day
        IntervalDay - SO frequency is an interval specified in number of calendar days (2 to 31)
        IntervalWeekDay - SO frequency is an interval specified in weeks (1 to 51), and the day within the week (1 to 7)
        WeekInMonthDay - SO frequency is a monthly interval, specifying the week of the month (1 to 5) and day within the week (1 to 7)
        IntervalMonthDay - SO frequency is an interval specified in months (between 1 to 6, 12, 24), specifying the day within the month (-5 to -1, 1 to 31)
        QuarterDay - SO frequency is quarterly RECEIVED
        BiAnnual - SO frequency is every 6 months
        Annual - SO frequency is every year
        RECEIVED = Paid on the 20th March, 19th June, 24th September and 20th December.

        * Individual Patterns:
        NotKnown (ScheduleCode)
        EveryDay (ScheduleCode)
        EveryWorkingDay (ScheduleCode)
        IntervalDay:NoOfDay (ScheduleCode + NoOfDay)
        IntervalWeekDay:IntervalInWeeks:DayInWeek (ScheduleCode + IntervalInWeeks + DayInWeek)
        WeekInMonthDay:WeekInMonth:DayInWeek (ScheduleCode + WeekInMonth + DayInWeek)
        IntervalMonthDay:IntervalInMonths:DayInMonth (ScheduleCode + IntervalInMonths + DayInMonth)
        QuarterDay: + either (RECEIVED) ScheduleCode + QuarterDay

        * The regular expression for this element combines five smaller versions for each permitted pattern. To aid legibility - the components are presented individually here:
        NotKnown
        EveryDay
        EveryWorkingDay
        IntervalDay:(([2-9])|([1-2][0-9])|3[0-1])
        IntervalWeekDay:[1-51]:[1-7]
        WeekInMonthDay:[1-5]:[1-7]
        IntervalMonthDay:([1-6]|12|24):(-[1-5]|[1-9]|[12][0-9]|3[01])
        QuarterDay:(RECEIVED)

        * Full Regular Expression:
        ^(NotKnown)$|^(EveryDay)$|^(EveryWorkingDay)$|^(IntervalDay:(([2-9])|([1-2][0-9])|3[0-1]))$|^(IntervalWeekDay:[1-51]:[1-7])$|^(WeekInMonthDay:[1-5]:[1-7])$|^(IntervalMonthDay:([1-6]|12|24):(-[1-5]|[1-9]|[12][0-9]|3[01]))$|^(QuarterDay:(RECEIVED))$"
        type: "string"
        pattern: "^(NotKnown)$|^(EveryDay)$|^(EveryWorkingDay)$|^(IntervalDay:(([2-9])|([1-2][0-9])|3[0-1]))$|^(IntervalWeekDay:[1-51]:[1-7])$|^(WeekInMonthDay:[1-5]:[1-7])$|^(IntervalMonthDay:([1-6]|12|24):(-[1-5]|[1-9]|[12][0-9]|3[01]))$|^(QuarterDay:(RECEIVED))$"
    OBPaymentPurposeCode:
      title: "OBPaymentPurposeCode:"
      description: |
        A Category code, related to the type of services or goods that corresponds to the underlying purpose of the payment.
        The Purpose Codes can be based on either:
        * The SARIE IPS Message Implementation Guide - Section 21.4 - Category Purpose Codes
        * The ISO20022 External code sets
      type: "string"
      minLength: 1
      maxLength: 4
      pattern: "^[A-Z]{3,4}$"
    FirstPaymentDateTime:
      title: "FirstPaymentDateTime"
      description: "The date on which the first payment for a Standing Order schedule will be made.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    NextPaymentDateTime:
      title: "NextPaymentDateTime"
      description: "The date on which the next payment for a Standing Order schedule will be made.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    LastPaymentDateTime:
      title: "LastPaymentDateTime"
      description: "The date on which the last (most recent) payment for a Standing Order schedule was made.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    FinalPaymentDateTime:
      title: "FinalPaymentDateTime"
      description: "The date on which the final payment for a Standing Order schedule will be made.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    NumberOfPayments:
      title: "NumberOfPayments"
      description: "Number of the payments that will be made in completing this frequency sequence including any executed since the sequence start date."
      type: "string"
      minLength: 1
      maxLength: 35
    OBExternalStandingOrderStatusCode:
      title: "OBExternalStandingOrderStatusCode"
      description: "Specifies the status of the standing order in code form."
      type: "string"
      enum:
        - "KSAOB.Active"
        - "KSAOB.Inactive"
    DirectDebitId:
      title: "DirectDebitId"
      description: "A unique and immutable identifier used to identify the direct debit resource. This identifier has no meaning to the account owner."
      type: "string"
      minLength: 1
      maxLength: 256
    MandateIdentification:
      title: "MandateIdentification"
      description: "This is the unique and immutable reference to the PSU for the Direct Debit mandate."
      type: "string"
      minLength: 1
      maxLength: 35
    OBExternalDirectDebitStatusCode:
      title: "OBExternalDirectDebitStatusCode"
      description: "Specifies the status of the direct debit. Encoded with allowable values of: 'Active', 'Inactive'"
      type: "string"
      enum:
        - "Active"
        - "Inactive"
    FrequencyDD:
      title: "FrequencyDD"
      description: "Specifies the frequency of the Direct Debit collections to the PSU account."
      type: "string"
      enum:
        - "KSAOB.Annual"
        - "KSAOB.Daily"
        - "KSAOB.Fortnightly"
        - "KSAOB.HalfYearly"
        - "KSAOB.Monthly"
        - "KSAOB.NotKnown"
        - "KSAOB.Quarterly"
        - "KSAOB.Weekly"
    PreviousPaymentDateTime:
      title: "PreviousPaymentDateTime"
      description: "The date of most recent direct debit collection to the PSU account. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    OBActiveOrHistoricCurrencyAndAmount:
      title: "OBActiveOrHistoricCurrencyAndAmount"
      type: "object"
      required:
        - "Amount"
        - "Currency"
      description: |
        * /accounts/{AccountId}/direct-debits resource
        This is the value of the last direct debit collection from the PSU account.

        * /accounts/{AccountId}/scheduled-payments resource
        The amount of money that was moved between the PSU (Debtor) and the payment beneficiary (Creditor) by the PASP, before adding any charges from the sending PASP.
        It is expressed in the currency as ordered by the PSU (i.e. the initiating party of the payment). This amount is transported unchanged through the transaction chain.

        * /accounts/{AccountId}/standing-orders resource
        FirstPaymentAmount: The amount of the first Standing Order
        NextPaymentAmount: The amount of the next Standing Order.FinalPaymentAmount: The amount of the final Standing Order.
        LastPaymentAmount: The amount of the last (most recent) Standing Order instruction.
      properties:
        Amount:
          $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
        Currency:
          $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
      additionalProperties: false
    ChargeAmount:
      title: "ChargeAmount"
      type: "object"
      required:
        - "Amount"
        - "Currency"
      description: |
          Transaction charges to be paid by the charge bearer.
      properties:
        Amount:
          $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
        Currency:
          $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
        ChargeIncluded:
          description: |
            If true then the value in the Amount has the ChargeAmount deducted from it
          type: "boolean"
      additionalProperties: false
    OBReadDirectDebit:
      title: "OBReadDirectDebit"
      description: "List of Direct Debits for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "AccountId"
            - "DirectDebit"
          properties:
            AccountId:
              $ref: "#/components/schemas/AccountId"
            DirectDebit:
              type: "array"
              items:
                $ref: "#/components/schemas/OBDirectDebit"
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBDirectDebit:
      title: "OBDirectDebit"
      type: "object"
      description: "Account to or from which a cash entry is made."
      required:
        - "DirectDebitId"
        - "MandateIdentification"
        - "DirectDebitStatusCode"
        - "Name"
        - "Frequency"
      properties:
        DirectDebitId:
          $ref: "#/components/schemas/DirectDebitId"
        MandateIdentification:
          $ref: "#/components/schemas/MandateIdentification"
        DirectDebitStatusCode:
          $ref: "#/components/schemas/OBExternalDirectDebitStatusCode"
        Name:
          $ref: "#/components/schemas/NameDirectDebit"
        Frequency:
          $ref: "#/components/schemas/FrequencyDD"
        PreviousPaymentDateTime:
          $ref: "#/components/schemas/PreviousPaymentDateTime"
        PreviousPaymentAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
      additionalProperties: false
    OBReadStandingOrder:
      title: "OBReadStandingOrder"
      description: "List of Standing Orders for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "AccountId"
            - "StandingOrder"
          properties:
            AccountId:
              $ref: "#/components/schemas/AccountId"
            StandingOrder:
              type: "array"
              items:
                $ref: "#/components/schemas/OBStandingOrder"
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBStandingOrder:
      title: "OBStandingOrder"
      description: "Standing Orders for a specific AccountId"
      type: "object"
      required:
        - "Frequency"
        - "StandingOrderId"
        - "FirstPaymentDateTime"
        - "FinalPaymentDateTime"
        - "NumberOfPayments"
        - "StandingOrderStatusCode"
        - "FirstPaymentAmount"
        - "FinalPaymentAmount"
      properties:
        StandingOrderId:
          $ref: "#/components/schemas/StandingOrderId"
        AccountHolderName:
          $ref: "#/components/schemas/AccountHolderName"
        AccountHolderShortName:
          $ref: "#/components/schemas/AccountHolderShortName"
        StandingOrderType:
          $ref: "#/components/schemas/StandingOrderType"
        Frequency:
          $ref: "#/components/schemas/Frequency"
        CreditorReference:
          $ref: "#/components/schemas/Reference"
        PaymentPurposeCode:
          $ref: "#/components/schemas/OBPaymentPurposeCode"
        FirstPaymentDateTime:
          $ref: "#/components/schemas/FirstPaymentDateTime"
        NextPaymentDateTime:
          $ref: "#/components/schemas/NextPaymentDateTime"
        LastPaymentDateTime:
          $ref: "#/components/schemas/LastPaymentDateTime"
        FinalPaymentDateTime:
          $ref: "#/components/schemas/FinalPaymentDateTime"
        NumberOfPayments:
          $ref: "#/components/schemas/NumberOfPayments"
        StandingOrderStatusCode:
          $ref: "#/components/schemas/OBExternalStandingOrderStatusCode"
        FirstPaymentAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
        NextPaymentAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
        LastPaymentAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
        FinalPaymentAmount:
          $ref: "#/components/schemas/OBActiveOrHistoricCurrencyAndAmount"
        CreditorAgent:
          $ref: "#/components/schemas/OBBranchAndFinancialInstitutionIdentification"
        CreditorAccount:
          $ref: "#/components/schemas/OBCashAccount"
        SupplementaryData:
          $ref: "#/components/schemas/OBSupplementaryData"
      additionalProperties: false
    DebtorReference:
      title: "DebtorReference"
      description: |
        Reference in the context of the PSU (i.e. the Debtor) to refer to the payment transaction.
        Usage: If available, the initiating party (i.e. Debtor) generates this reference for internal purposes (e.g. to enable reconciliation, refer to a PO, invoice etc). This field is captured by the PASP and is not transmitted via the payment rails to the Creditor of the payment.
      type: "string"
      minLength: 1
      maxLength: 35
    OBExternalScheduleTypeCode:
      title: "OBExternalScheduleTypeCode"
      description: |
        Specifies the type of scheduled payment date provided under ScheduledPaymentDateTime.
          Encoded with allowable values of:
          "Arrival" - PSU specifies the date for the arrival of funds in the beneficiary (Creditor) account
          "Execution" - PSU specifies the date which the payment needs to be executed from the PSU (Debtor) account.
      type: "string"
      enum:
        - "KSAOB.Arrival"
        - "KSAOB.Execution"
    ScheduledPaymentDateTime:
      title: "ScheduledPaymentDateTime"
      description: "Date (and time) information related to the scheduled payment (Arrival or Execution) based on the ScheduleType field. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    ScheduledPaymentId:
      title: "ScheduledPaymentId"
      description: "A unique and immutable identifier produced by the PASP to identify the scheduled payment resource. This identifier has no meaning to the account owner."
      type: "string"
      minLength: 1
      maxLength: 40
    BeneficiaryId:
      title: "BeneficiaryId"
      description: "A unique and immutable identifier used to identify the beneficiary resource. This identifier has no meaning to the account owner."
      type: "string"
      minLength: 1
      maxLength: 40
    OBBeneficiaryTypeCode:
      title: "OBBeneficiaryTypeCode"
      description: "Specifies the Beneficiary Type. Encoded with allowable values of: 'Activated' - Beneficiary has been added to the beneficiary list using SCA. 'NotActivated' - Beneficiary has been added to the beneficiary list without SCA"
      type: "string"
      enum:
        - "KSAOB.Activated"
        - "KSAOB.NotActivated"
    OBCashAccount:
      title: "OBCashAccount"
      type: "object"
      required:
        - "IdentificationType"
        - "Identification"
      description: "Provides the details to identify the beneficiary account."
      properties:
        IdentificationType:
          $ref: "#/components/schemas/OBExternalAccountIdentificationCode"
        Identification:
          $ref: "#/components/schemas/IdentificationAccountIdentifier"
      additionalProperties: false
    OBTransactionCashAccount:
      title: "OBTransactionCashAccount"
      type: "object"
      description: |
        * /accounts/{AccountId}/transactions resource
        CreditorAccount: Creditor account details available in case the transaction is a Debit transaction.
        These are optional because there are situations where this cannot be populated for the following Debit transactions:
        - cash withdrawals (no creditor account/agent)
        - cheques and DDs may not have this information at least during the process of clearing and sometimes (e.g. for agency banks) may not be reconciled ever
        - some corner situations with international payments
        - for card payments (instead merchant information fields should be populated)

        DebtorAccount: Account details of the Debtor in case the transaction is a Credit transaction.
        These are optional because there are situations where this cannot be populated for the following Credit transactions
        - cash deposits (no creditor account/agent)
        - cheques and DDs may not have this information at least during the process of clearing and sometimes (e.g. for agency banks) may not be reconciled ever
        - some corner situations with international payments
        - for refunds with card payments  (instead merchant information fields should be populated)
      properties:
        IdentificationType:
          $ref: "#/components/schemas/OBExternalAccountIdentificationCode"
        Identification:
          $ref: "#/components/schemas/IdentificationAccountIdentifier"
        Name:
          $ref: "#/components/schemas/NameAccountIdentifier"
      additionalProperties: false
    Reference:
      title: "Reference"
      description: "Unique reference in the context of the creditor, provided by the creditor to the PSU (Debtor), to unambiguously refer to the payment transaction. Usage: If available, the initiating party (i.e. Debtor) provides this reference in the structured remittance information, to enable reconciliation by the Creditor upon receipt of the amount of money. This field is populated by the PSU (who is the initiating party of the payment e.g. the Debtor). Field is free format text"
      type: "string"
      minLength: 1
      maxLength: 35
    TransactionId:
      title: "TransactionId"
      description: "Unique identifier for the transaction within an servicing institution. This identifier is both unique and immutable."
      type: "string"
      minLength: 1
      maxLength: 210
    TransactionReference:
      title: "TransactionReference"
      description: |
        Unique reference for the transaction.
        When processed through a national payment system, it is mandatory to be populated by the PASP.
        As an example, it may be a reference code for the local payment scheme e.g. mada, SARIE."
      type: "string"
      minLength: 1
      maxLength: 210
    OBCreditDebitCode:
      title: "OBCreditDebitCode"
      description: |
        * /accounts/{AccountId}/transactions[0].CreditDebitIndicator
        Indicates whether the transaction is a credit or a debit entry.

        * /accounts/{AccountId}/balances | /accounts/{AccountId}/transactions[0].Balance.CreditDebitIndicator
        Indicates whether the balance of the account is a credit or a debit balance. Encoded with allowable values: 'Credit', 'Debit' Usage: A zero balance is considered to be a credit balance.
      type: "string"
      enum:
        - "KSAOB.Credit"
        - "KSAOB.Debit"
    OBEntryStatusCode:
      title: "OBEntryStatusCode"
      description: "Status of a transaction entry on the books of the account servicer."
      type: "string"
      enum:
        - "KSAOB.Booked"
        - "KSAOB.Pending"
        - "KSAOB.Rejected"
    OBTransactionMutabilityCode:
      title: "OBTransactionMutabilityCode"
      description: "Specifies the Mutability of the Transaction record."
      type: "string"
      enum:
        - "KSAOB.Mutable"
        - "KSAOB.Immutable"
    BookingDateTime:
      title: "BookingDateTime"
      description: |
        Date and time when a transaction entry is posted to an account on the account servicer's books.
        Usage: Booking date is the expected booking date, unless the status is booked, in which case it is the actual booking date.
        All dates in the JSON payloads are represented in ISO 8601 date-time format.
        All date-time fields in responses must include the timezone. An example is below: 2017-04-05T10:43:07+00:00
      type: "string"
      format: "date-time"
    ValueDateTime:
      title: "ValueDateTime"
      description: |
        Date and time at which assets become available to the account owner in case of a credit entry, or cease to be available to the account owner in case of a debit transaction entry.
        Usage: If transaction entry status is pending and value date is present, then the value date refers to an expected/requested value date.
        For transaction entries subject to availability/float and for which availability information is provided, the value date must not be used. In this case the availability component identifies the number of availability days.
        Availability float refers to the time period between fund deposits and clearing.
        The float is essentially double-counted money: a paid sum which, due to delays in processing, appears simultaneously in the accounts of the payer and the payee.
        All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is below: 2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    TransactionInformation:
      title: "TransactionInformation"
      description: "Further details of the transaction. This is the transaction narrative, which is unstructured text."
      type: "string"
      minLength: 1
      maxLength: 500
    PartyId:
      title: "PartyId"
      description: "A unique and immutable identifier used to identify the customer resource. This identifier has no meaning to the account owner."
      type: "string"
      minLength: 1
      maxLength: 40
    OBExternalPartyTypeCode:
      title: "OBExternalPartyTypeCode"
      description: |
        Specifies the party type.
        Encoded with allowable values:
        "Delegate" - Used for business accounts when user has delegated authority to access the account ,
        "Joint" - Party is a joint owner of the account
        "Sole" - Party is the sole owner of the account
      type: "string"
      enum:
        - "KSAOB.Delegate"
        - "KSAOB.Joint"
        - "KSAOB.Sole"
    OBExternalAccountRoleCode:
      title: "OBExternalAccountRoleCode"
      description: "Specifies the Party's role with respect to the related account."
      type: "string"
      enum:
        - "KSAOB.Administrator"
        - "KSAOB.Beneficiary"
        - "KSAOB.CustodianForMinor"
        - "KSAOB.Granter"
        - "KSAOB.LegalGuardian"
        - "KSAOB.OtherParty"
        - "KSAOB.PowerOfAttorney"
        - "KSAOB.Principal"
        - "KSAOB.Protector"
        - "KSAOB.RegisteredShareholderName"
        - "KSAOB.SecondaryOwner"
        - "KSAOB.SeniorManagingOfficial"
        - "KSAOB.Settlor"
        - "KSAOB.SuccessorOnDeath"
        - "KSAOB.Owner"
    AccountId:
      title: "AccountId"
      description: "A unique and immutable identifier produced by the PASP to identify the account resource.This identifier has no meaning to the account owner (PSU)."
      type: "string"
      minLength: 1
      maxLength: 40
    StatusUpdateDateTime:
      title: "StatusUpdateDateTime"
      description: "Date and time at which the account resource status was updated. All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    OBAccountStatusCode:
      title: "OBAccountStatusCode"
      description: "Specifies the status of account resource in code form. [Active]: It means that the account is exist and active. [NotActive]: It means that the account has been not active for 6 to 12 months. [Dormant]: It means that the accounts has been Inactive for 1 to 5 years.[Unclaimed]: It means that the accounts has been Inactive for more than 5 years.[Deceased]: Indicates that the account holder has passed away.[Suspended]: If the account is suspended do to any reason. E.g: SAMA requested the bank to suspend the account for security reason. [Closed]: If the account is closed"
      type: "string"
      enum:
        - "Active"
        - "NotActive"
        - "Dormant"
        - "Unclaimed"
        - "Deceased"
        - "Suspended"
        - "Closed"
    ActiveOrHistoricCurrencyCode:
      title: "ActiveOrHistoricCurrencyCode"
      description: |
        * /accounts/{AccountId} | /accounts resource
        Identification of the currency in which the account is held. A code allocated to a currency under an international currency identification scheme, as described in the latest edition of the international standard ISO 4217 'Codes for the representation of currencies and funds'.

        * /accounts/{AccountId}/balances | /accounts/{AccountId}/transactions resource
        A 3 character alphabetic code allocated to a currency under an international currency identification scheme, as described in the latest edition of the international standard ISO 4217 'Codes for the representation of currencies and funds'.
      type: "string"
      pattern: "^[A-Z]{3,3}$"
      example: "SAR"
    OBExternalAccountTypeCode:
      title: "OBExternalAccountTypeCode"
      description: "Specifies the type of account (Retail or Corporate)."
      type: "string"
      enum:
        - "KSAOB.Retail"
        - "KSAOB.Corporate"
    OBExternalAccountSubTypeCode:
      title: "OBExternalAccountSubTypeCode"
      description: "Specifies the sub type of account (product family group). Examples values include: CurrentAccount, Savings, CreditCard, PrePaidCard, EMoney, ChargeCard, Other"
      type: "string"
      x-namespaced-enum:
        - "CurrentAccount"
        - "Savings"
        - "CreditCard"
        - "PrePaidCard"
        - "EMoney"
        - "ChargeCard"
        - "Other"
    AccountDescription:
      title: "AccountDescription"
      description: "Specifies the description of the account sub-type."
      type: "string"
      minLength: 1
      maxLength: 35
    Nickname:
      title: "Nickname"
      description: "The nickname of the account, assigned by PSU to provide an additional and easier means of identification of the account at the PASP."
      type: "string"
      minLength: 1
      maxLength: 70
    OpeningDate:
      title: "OpeningDate"
      description: "Date on which the account and its related basic services by PASP started to be operational for PSU. All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is below: 2017-04-05T10:43:07+00:00"
      type: "string"
      format: "date-time"
    MaturityDate:
      title : "MaturityDate"
      description: |
        * Fixed Term Loan Account
          MaturityDate is the date on which the debt of an account must be paid in full. On this date, the principal amount of the debt is fully paid, so no further interest expense accrues.

        * Fixed Term Savings Account
          MaturityDate is the date on which the savings mature and the balance can be withdrawn by the PSU without penalty

        * All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is: 2017-04-05T10:43:07+00:00
      type: "string"
      format: "date-time"
    OBExternalAccountIdentificationCode:
      title: "OBExternalAccountIdentificationCode"
      description: "Name of the identification scheme for the account. Encoded with allowable values published in an external list."
      type: "string"
      enum:
        - "KSAOB.IBAN"
        - "KSAOB.MaskedPAN"
        - "KSAOB.AccountNumber"
        - "KSAOB.UnifiedCommercialNumber"
        - "KSAOB.Email"
        - "KSAOB.MobileNumber"
        - "KSAOB.NationalID"
        - "KSAOB.IqamaNumber"
        - "KSAOB.PassportNumber"
    IdentificationAccountIdentifier:
      title: "IdentificationAccountIdentifier"
      description: |
        Identification for the account assigned by the PASP based on the Account Scheme Name. This identification is known by the PSU account owner. For IBAN, refer to the ISO Standard 13616. For MASKEDPAN, masked details as follows:  - First 4 numbers are exposed, last 4 numbers are exposed, everything else is masked with an asterix
      type: "string"
      minLength: 1
      maxLength: 400
    IdentificationInstitutionIdentifier:
      title: "IdentificationInstitutionIdentifier"
      description: |
        * /accounts resource
        Unique and unambiguous identification of the PASP as the account servicing institution for the Open Banking Services.

        * /beneficiaries resource
        Unique and unambiguous identification of the Creditor Agency as the servicing institution of the Beneficiary.

        * /scheduled-payments resource
        Unique and unambiguous identification of the PASP as the account servicing institution for the Open Banking Services.

        * /standing-orders resource
        Unique and unambiguous identification of the PASP as the account servicing institution for the Open Banking Services.

        * /transactions resource
         Unique and unambiguous identification of the PASP as the account servicing institution for the Open Banking Services.

        *  Notes:
        Based on the value of the field **IdentificationType**, this entry may be :
        * KSAOB.BICFI: The BIC/SWIFT Code
        * KSAOB.OTHER: The ID; A Country Code followed by a Bank Code (KSAOB 4 character code). The full list of PASP names and 6 digits IDs are as follows:

        | PASP NAME|ID|
