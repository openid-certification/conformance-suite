          $ref: "#/components/schemas/Links"
        Meta:
          $ref: "#/components/schemas/MetaTotalPages"
      additionalProperties: false
    OBActiveCurrencyAndAmountSimpleType:
      title: "OBActiveCurrencyAndAmountSimpleType"
      description: "A number of monetary units specified in an active currency where the unit of currency is explicit and compliant with ISO 4217."
      type: "string"
      pattern: "^\\d{1,13}$|^\\d{1,13}\\.\\d{1,5}$"
    OBBalanceTypeCode:
      title: "OBBalanceTypeCode"
      description: |
        The type of balance for the account.
        Encoded with allowable values of:
        * 'ClosingAvailable' - end of day balance specifying the amount available to PSU to withdraw or use.
        * 'ClosingBooked' - end of day balance including value of payments for cheques or payments which have not been cleared yet.
        * 'ClosingCleared' - end of day balance including value of payments for cheques or payments which have been cleared.
        * 'Expected' - intra day balance including value of payments for cheques or payments which have been cleared.
        * 'ForwardAvailable' - intraday balance specifying the amount available to PSU to withdraw or use considering forward dated payments or other intraday payments or cheques that will be clearing to the account.
        * 'Information' - TBC.
        * 'InterimAvailable' - intraday balance specifying the amount available to PSU to withdraw or use (most probably real-time.'InterimBooked' - intraday balance including value of payments for cheques or payments which have not been cleared yet.
        * 'InterimCleared' - intraday balance including value of payments for cheques or payments which have been cleared (probably real-time).
        * 'OpeningAvailable' - start of day balance specifying the amount available to PSU to withdraw or use.
        * 'OpeningBooked' - start of day balance including value of payments for cheques or payments which have not been cleared yet.
        * 'OpeningCleared' - start of day balance including value of payments for cheques or payments which have been cleared.
        * 'PreviouslyClosedBooked' -TBC.

        Note: PASPs support different types for presenting account balance, so this list is used to support different PASP systems in KSA.
      type: "string"
      enum:
        - "KSAOB.ClosingAvailable"
        - "KSAOB.ClosingBooked"
        - "KSAOB.ClosingCleared"
        - "KSAOB.Expected"
        - "KSAOB.ForwardAvailable"
        - "KSAOB.Information"
        - "KSAOB.InterimAvailable"
        - "KSAOB.InterimBooked"
        - "KSAOB.InterimCleared"
        - "KSAOB.OpeningAvailable"
        - "KSAOB.OpeningBooked"
        - "KSAOB.OpeningCleared"
        - "KSAOB.PreviouslyClosedBooked"
    ProprietaryBankTransactionCodeStructure:
      title: "ProprietaryBankTransactionCodeStructure"
      type: "object"
      required:
        - "Code"
      description: |
        ProprietaryBankTransactionCode is mandatory when the BankTransactionCode (with code specifying the Domain, Family and SubFamily as per External Codes ISO20022) is absent.
        Set of elements to fully identify a proprietary bank transaction code
      properties:
        Code:
          description: "Proprietary bank transaction code to identify the underlying transaction."
          type: "string"
          minLength: 1
          maxLength: 35
        Issuer:
          description: "Identification of the issuer of the proprietary bank transaction code."
          type: "string"
          minLength: 1
          maxLength: 35
      additionalProperties: false
    NameAccountIdentifier:
      title: "NameAccountIdentifier"
      description: "The account name is the name or names of the PSU account owner(s) represented at an account level, as displayed by the PASP's online channels. Note: The account name is not the product name or the nickname of the account."
      type: "string"
      minLength: 1
      maxLength: 350
    NameInstitutionIdentifier:
      title: "NameInstitutionIdentifier"
      description: |
        * Beneficiary
        Name by which an agent is known and which is usually used to identify that agent

        * Creditor agent
        Name by which the Financial institution(FI) which is the creditor is known and which is usually used to identify that FI.

        * DebtorAgent
        Name by which an financial institution of the debtor is known and which is usually used to identify that financial institution.

      type: "string"
      minLength: 1
      maxLength: 140
    NameDirectDebit:
      title: "NameDirectDebit"
      description: "This is the name of the regulated beneficiary entity that initiates the Direct Debit collection."
      type: "string"
      minLength: 1
      maxLength: 70
    OBMerchantDetails:
      title: "OBMerchantDetails"
      type: "object"
      description: |
        Details of the Merchant involved in the transaction.
        Merchant Details are specified only for those merchant categories that are generally expected to originate retail financial transactions
      properties:
        MerchantId:
          description: "MerchantId"
          type: "string"
          minLength: 8
          maxLength: 20
        MerchantName:
          description: "Name by which the merchant is known."
          type: "string"
          minLength: 1
          maxLength: 350
        MerchantCategoryCode:
          description: |
            Category code values are used to enable the classification of merchants into specific categories based on the type of business, trade or services supplied.
            Category code conforms to ISO 18245, related to the type of services or goods the merchant provides for the transaction."
          type: "string"
          minLength: 3
          maxLength: 4
      additionalProperties: false
    OBTransactionCashBalance:
      title: "OBTransactionCashBalance"
      type: "object"
      required:
        - "CreditDebitIndicator"
        - "Type"
        - "Amount"
      description: "Set of elements used to define the balance as a numerical representation of the net increases and decreases in an account after a transaction entry is applied to the account."
      properties:
        CreditDebitIndicator:
          $ref: "#/components/schemas/OBCreditDebitCode"
        Type:
          $ref: "#/components/schemas/OBBalanceTypeCode"
        Amount:
          type: "object"
          required:
            - "Amount"
            - "Currency"
          description: "Amount of money of the cash balance after a transaction entry is applied to the account.."
          properties:
            Amount:
              $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
            Currency:
              $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
          additionalProperties: false
      additionalProperties: false
    OBBankTransactionCodeStructure:
      title: "OBBankTransactionCodeStructure"
      type: "object"
      description: |
        BankTransactionCode is mandatory (with code specifying the Domain, Family and SubFamily as per External Codes ISO20022) when the ProprietaryBankTransactionCode is absent.
        Specifies the domain, the family and the sub-family of the bank transaction code, in a structured and hierarchical format.
        Usage: If a specific family or sub-family code cannot be provided, the generic family code defined for the domain or the generic sub-family code defined for the family should be provided.
        [https://www.iso20022.org/sites/default/files/2022-05/BTC_Codification_31May2022.xls](https://www.iso20022.org/sites/default/files/2022-05/BTC_Codification_31May2022.xls)
      properties:
        Domain:
          description: "Specifies the Domain"
          type: "string"
        DomainCode:
          description: "Specifies the Domain Code."
          type: "string"
        Family:
          description: "Specifies the Family"
          type: "string"
        FamilyCode:
          description: "Specifies the Family Code"
          type: "string"
        SubFamily:
          description: "Specifies the Sub-Family"
          type: "string"
        SubFamilyCode:
          description: "Specifies the Sub-family Code"
          type: "string"
      additionalProperties: false
    OBCurrencyExchange:
      title: "OBCurrencyExchange"
      type: "object"
      required:
        - "SourceCurrency"
        - "TargetCurrency"
        - "UnitCurrency"
        - "ExchangeRate"
        - "InstructedAmount"
      description: "Set of elements used to provide details on the currency exchange."
      properties:
        SourceCurrency:
          description: "Currency from which an amount is to be converted in a currency conversion. A code allocated to a currency by a Maintenance Agency under an international identification scheme, as described in the latest edition of the international standard ISO 4217 \"Codes for the representation of currencies and funds\"."
          type: "string"
          pattern: "^[A-Z]{3,3}$"
        TargetCurrency:
          description: "Currency into which an amount is to be converted in a currency conversion.A code allocated to a currency by a Maintenance Agency under an international identification scheme, as described in the latest edition of the international standard ISO 4217 \"Codes for the representation of currencies and funds\"."
          type: "string"
          pattern: "^[A-Z]{3,3}$"
        UnitCurrency:
          description: "Currency in which the rate of exchange is expressed in a currency exchange. In the example 1SAR = xxxCUR, the unit currency is SAR.A code allocated to a currency by a Maintenance Agency under an international identification scheme, as described in the latest edition of the international standard ISO 4217 \"Codes for the representation of currencies and funds\"."
          type: "string"
          pattern: "^[A-Z]{3,3}$"
        ExchangeRate:
          description: "Factor used to convert an amount from one currency into another. This reflects the price at which one currency was bought with another currency.\nUsage: ExchangeRate expresses the ratio between UnitCurrency and QuotedCurrency (ExchangeRate = UnitCurrency/QuotedCurrency)."
          type: "string"
        ContractIdentification:
          description: "Unique identification to unambiguously identify the foreign exchange contract."
          type: "string"
          minLength: 1
          maxLength: 35
        QuotationDate:
          description: "Date and time at which an exchange rate is quoted.All dates in the JSON payloads are represented in ISO 8601 date-time format. \nAll date-time fields in responses must include the timezone. An example is below:\n2017-04-05T10:43:07+00:00"
          type: "string"
          format: "date-time"
        InstructedAmount:
          type: "object"
          required:
            - "Amount"
            - "Currency"
          description: "Amount of money to be moved between the debtor and creditor, before deduction of charges, expressed in the currency as ordered by the initiating party."
          properties:
            Amount:
              $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
            Currency:
              $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
          additionalProperties: false
      additionalProperties: false
    ReadParty:
      title: "ReadParty"
      description: "List of Parties for an Account"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "AccountId"
            - "Party"
          properties:
            AccountId:
              $ref: "#/components/schemas/AccountId"
            Party:
              type: "array"
              items:
                $ref: "#/components/schemas/OBPartyIdentityAssurance"
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/LinksSelf"
        Meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    ReadAssociatedParty:
      title: "ReadAssociatedParty"
      description: "Current PSU Information"
      type: "object"
      required:
        - "Data"
        - "Links"
        - "Meta"
      properties:
        Data:
          type: "object"
          description: "Primary data for the resource"
          required:
            - "Party"
          properties:
            Party:
              $ref: "#/components/schemas/OBPartyIdentityAssurance"
          additionalProperties: false
        Links:
          $ref: "#/components/schemas/LinksSelf"
        Meta:
          $ref: "#/components/schemas/Meta"
      additionalProperties: false
    OBPartyIdentityAssurance:
      title: "OBPartyIdentityAssurance"
      description: |
        Party Identity Assurance (Response) Schema
        Based on the [OpenID Connect for Identity Assurance 1.0 Specification](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html)
      type: "object"
      required:
        - "PartyId"
        - "PartyType"
        - "AccountRole"
        - "VerifiedClaims"
      properties:
        PartyId:
          $ref: "#/components/schemas/PartyId"
        PartyType:
          $ref: "#/components/schemas/OBExternalPartyTypeCode"
        AccountRole:
          $ref: "#/components/schemas/OBExternalAccountRoleCode"
        VerifiedClaims:
          type: "array"
          description: "(Array) Container object containing entries for the trust framework and the evidence used to verify the PSU claims"
          items:
            $ref: "#/components/schemas/VerifiedClaim"
      additionalProperties: false
    VerifiedClaim:
      title: "VerifiedClaim"
      description: |
        Verified Claims
        Container object containing entries for the trust framework and the evidence used to verify the PSU claims
        [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-representing-verified-claim](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-representing-verified-claim)
      type: "object"
      required:
        - "Verification"
        - "Claims"
      properties:
        Verification:
          description: |
            Verification
            [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element)
          type: "object"
          required:
            - "TrustFramework"
          properties:
            TrustFramework:
              type: "string"
              enum: [SA_AML]
              description: |
                Identifies the trust framework used for PSU verification. This consists of a set of rules and standards and sets out requirements so that organisations know what ‘good’ identity verification looks like.
                Trust Frameworks: [https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)
                SA_AML - Based on the SAMA Standard form of an Account Opening Agreement. KYC is a component within the AML Law that requires organizations to validate the identit of their customers.
            AssuranceLevel:
              type: "string"
              description: |
                Determines the assurance level associated with the PSU in the respective VerifiedClaims. The value range depends on the respective TrustFramework value.
                Assurance Level: [https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)
              enum:
              - high
              - very_high
            AssuranceProcess:
              type: "object"
              description: |
                Determines the assurance process that was followed. This reflects how the evidence meets the requirements of the TrustFramework and AssuranceLevel. The factual record of the evidence and the procedures followed are recorded in the evidence element, this element is used to cross reference the evidence to the AssuranceLevel followed
                OpenID Connect for Identity Assurance 1.0: [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-verification-element)
              properties:
                Policy:
                  type: "string"
                  description: "Representing the standard or policy that was followed."
                  enum:
                    - KSAOB.AccountOpeningRegulations
                Procedure:
                  type: "string"
                  description: "Representing a specific procedure from the policy that was followed."
                  enum:
                    - KSAOB.KYC
                AssuranceDetails:
                  type: "array"
                  description: "(Array) Denoting the details about how the evidence complies with the policy"
                  items:
                    type: "object"
                    properties:
                      AssuranceType:
                        description: "String denoting which part of the assurance_process the evidence fulfils"
                        type: "string"
                      AssuranceClassification:
                        description: "String reflecting how the evidence has been classified or measured as required by the TrustFramework"
                        type: "string"
                      EvidenceRef:
                        description: "Evidence being referred to"
                        type: "array"
                        items:
                          type: "object"
                          required:
                            - "Txn"
                          properties:
                            Txn:
                              description: "Identifier referring to the txn used in the CheckDetails."
                              type: "string"
                            EvidenceMetadata:
                              description: "Object indicating any meta data about the evidence that is required by the AssuranceProcess in order to demonstrate compliance with the TrustFramework. It has the following sub-elements"
                              type: "object"
                              properties:
                                EvidenceClassification:
                                  type: "string"
                                  description: "String indicating how the process demonstrated by the check_details for the evidence is classified by the AssuranceProcess in order to demonstrate compliance with the TrustFramework."
                          additionalProperties: false
                    additionalProperties: false
            Time:
              type: "string"
              format: "date-time"
              description: |
                Representing the date and time when the identity verification process took place. All dates in the JSON payloads are represented in ISO 8601 date-time format. All date-time fields in responses must include the timezone. An example is below: 2017-04-05T10:43:07+00:00
            VerificationProcess:
              type: "string"
              description: |
                Unique reference to the identity verification process as performed by the OP. Used for identifying and retrieving details in case of disputes or audits. Presence of this element might be required for certain trust frameworks.
            Evidence:
              description: |
                (Array) The type of evidence allowed for providing PSU verification.
                OpenID Connect for Identity Assurance 1.0: [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element)
              type: "array"
              items:
                anyOf:
                  - $ref: "#/components/schemas/OBPartyIdentityEvidenceTypeDocument"
                  - $ref: "#/components/schemas/OBPartyIdentityEvidenceTypeElectronicRecord"
          additionalProperties: false
        Claims:
          description: |
            Standard Claims:
            [https://openid.net/specs/openid-connect-core-1_0.html#StandardClaims](https://openid.net/specs/openid-connect-core-1_0.html#StandardClaims)
            IdentityAssurance Claims:
            [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-claims](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-claims)
          type: "object"
          properties:
            Sub:
              description: |
                Subject - Identifier for the PSU at the Issuer.
              type: "string"
            Name:
              $ref: "#/components/schemas/OBMultiLanguageRequiredFields"
            GivenName:
              $ref: "#/components/schemas/OBMultiLanguageRequiredFields"
            MiddleName:
              $ref: "#/components/schemas/OBMultiLanguageRequiredFields"
            GrandfatherName:
              $ref: "#/components/schemas/OBMultiLanguageRequiredFields"
            FamilyName:
              $ref: "#/components/schemas/OBMultiLanguageRequiredFields"
            Nickname:
              $ref: "#/components/schemas/OBMultiLanguageOptionalFields"
            PreferredUsername:
              description: |
                The PSU preferred username claim that has been verified by the PASP.
              type: "string"
            Email:
              description: |
                The PSU Email claim that has been verified by the PASP.
              type: "string"
            EmailVerified:
              description: |
                The PSU Email Verified claim that has been verified by the PASP.
              type: "boolean"
            Gender:
              description: |
                The PSU Gender claim that has been verified by the PASP.
                Male or Female.
              type: "string"
              enum:
                - "Male"
                - "Female"
            BirthDate:
              description: |
                The PSU date of birth claim that has been verified by the PASP.
              type: "string"
              format: "date"
            ZoneInfo:
              description: |
                The PSU timezone claim that has been verified by the PASP.
              type: "string"
            Locale:
              description: |
                The PSU locale claim that has been verified by the PASP.
              type: "string"
            PhoneNumber:
              description: |
                The PSU phone number claim that has been verified by the PASP.
              type: "string"
            PhoneNumberVerified:
              description: |
                The PSU verified phone number claim that has been verified by the PASP.
              type: "boolean"
            Salutation:
              description: |
                The PSU Salutation claim that has been verified by the PASP.
              type: "string"
            BirthFamilyName:
              description: |
                The PSU birth family name claim that has been verified by the PASP.
              type: "string"
            BirthGivenName:
              description: |
                The PSU birth given name claim that has been verified by the PASP.
              type: "string"
            BirthMiddleName:
              description: |
                The PSU birth middle name claim that has been verified by the PASP.
              type: "string"
            PlaceOfBirth:
              description: |
                Place of Birth Claim
              type: "object"
              properties:
                Country:
                  # The PSU country of birth claim that has been verified by the PASP.
                  $ref: "#/components/schemas/OBCountryCode"
                Region:
                  description: |
                    The PSU region of birth claim that has been verified by the PASP.
                  type: "string"
                Locality:
                  description: |
                    The PSU locality (village, town, city etc) of birth claim that has been verified by the PASP.
                  type: "string"
              additionalProperties: false
            Nationalities:
              type: "array"
              description: |
                The PSU nationality claim that has been verified by the PASP.
                This is an array which may contain multiple entries
              items:
                type: string
            NationalAddress:
              $ref: "#/components/schemas/OBAddress"
            HomeCountryAddress:
              $ref: "#/components/schemas/OBAddress"
            UpdatedAt:
              $ref: "#/components/schemas/ISODateTime"
            EducationLevel:
              description: |
                The PSU education level that has been verified by the PASP.
              type: "string"
              enum:
                - KSAOB.Elementary
                - KSAOB.Intermediate
                - KSAOB.Secondary
                - KSAOB.University
                - KSAOB.Other
            PartyIdentity:
              description: |
                The PSU Party Data that has been verified by the PASP.
              type: "object"
              additionalProperties: false
              properties:
                Type:
                  type: "string"
                  enum:
                  - "KSAOB.NationalID"
                  - "KSAOB.IqamaID"
                  - "KSAOB.GCCNationalID"
                Number:
                  description: |
                    The PSU ID number that has been verified by the PASP
                  type: "string"
                PlaceOfIssuance:
                  description: |
                    The PSU ID place of issuance that has been verified by the PASP
                  type: "string"
                ExpirationDate:
                  description: |
                    The PSU ID Expiration Date that has been verified by the PASP
                  type: "string"
                  format: "date"
                CalendarType:
                  $ref: "#/components/schemas/OBPartyCalendarType"
            AdditionalContactInformation:
              description: |
                The PSU additional contact information.
              type: "array"
              items:
                additionalProperties: false
                properties:
                  FullName:
                    description: "Full name in arabic (1st, 2nd, 3rd and family)"
                    type: "string"
                  Relation:
                    description: "The relationship of the contact with the PSU"
                    type: "string"
                  MobilePhoneNumber:
                    description: "The mobile phone number of the contact"
                    type: "string"
                  HomePhoneNumber:
                    description: "The home phone number of the contact"
                    type: "string"
            JobInformation:
              description: |
                The PSU job information.
              type: "object"
              additionalProperties: false
              properties:
                EmployerName:
                  description: "The PSU employer name"
                  type: "string"
                JobTitle:
                  description: "The PSU job title "
                  type: "string"
                EmploymentSector:
                  description: "The PSU employment sector"
                  type: "string"
                  enum:
                    - KSAOB.Governmental
                    - KSAOB.Private
                    - KSAOB.Semi-Governmental
                    - KSAOB.Other
                ProfessionalActivity:
                  description: "The PSU profession"
                  type: "string"
                DateOfEmployment:
                  description: "The PSU date of employment"
                  type: "string"
                  format: "date"
                CalendarType:
                  $ref: "#/components/schemas/OBPartyCalendarType"
            FinancialInformation:
              description: |
                The PSU financial information.
              type: "array"
              additionalProperties: false
              items:
                properties:
                  Income:
                    description: "Basic / Additional income amount by source"
                    type: "object"
                    additionalProperties: false
                    properties:
                      Type:
                        description: |
                          The type of income.

                          Where Type is BasicMonthlyIncome, then Source can only be one of the following:
                          * Salary
                          * FreelanceWork
                          * Subvention
                          * Reward
                          * Other

                          Where Type is AdditionalMonthlyIncome, then Source can only be one of:
                          * Rental
                          * EquityInvestment
                          * Other
                        type: "string"
                        enum:
                          - KSAOB.BasicMonthlyIncome
                          - KSAOB.AdditionalMonthlyIncome
                      Amount:
                        $ref: "#/components/schemas/OBActiveCurrencyAndAmountSimpleType"
                      Currency:
                        $ref: "#/components/schemas/ActiveOrHistoricCurrencyCode"
                      Source:
                        description: |
                          Source of Income.

                          * Salary, FreelanceWork, Subvention, Reward, Other apply only where Type is: BasicMonthlyIncome
                          * Rental, EquityInvestment, Other apply only where Type is: AdditionalMonthlyIncome
                        type: "string"
                        enum:
                          - KSAOB.Salary
                          - KSAOB.FreelanceWork
                          - KSAOB.Subvention
                          - KSAOB.Reward
                          - KSAOB.Other
                          - KSAOB.Rental
                          - KSAOB.EquityInvestment
            TransactionFrequency:
              description: "Anticipated transaction frequency"
              type: "object"
              additionalProperties: false
              properties:
                ExpectedIncomingTransactionFrequency:
                  description: "Anticipated incoming transaction frequency"
                  type: "string"
                ExpectedOutgoingTransactionFrequency:
                  description: "Anticipated outgoing transaction frequency"
                  type: "string"
            AdditionalInformation:
              description: "Additional information about the PSU"
              type: "object"
              additionalProperties: false
              properties:
                PoliticalAcquaintance:
                  type: "object"
                  description: "Capture PSU Political Acquaintance information"
                  additionalProperties: false
                  properties:
                    IsPoliticallyAcquainted:
                      description: "Are you politically acquianted?"
                      type: "boolean"
                    HasFirstOrSecondDegreeRelationship:
                      description: "Do you have a first or second degree relationship with a political acquiantaince ?"
                      type: "boolean"
                Disability:
                  type: "object"
                  description: "Capture PSU disabled information"
                  additionalProperties: false
                  properties:
                    IsDisabled:
                      description: "Are you a person with a disability ?"
                      type: "boolean"
                    DisabilityType:
                      description: "The type of disability"
                      type: "string"
                      enum:
                        - "KSAOB.Hearing"
                        - "KSAOB.Visual"
                        - "KSAOB.Physical"
                        - "KSAOB.Other"
                IsRealBeneficiary:
                  description: "Confirms if the PSU is the real beneficiary of the account"
                  type: "boolean"
            GuardianInformation:
              description: "PSU Guardian Information"
              type: "object"
              additionalProperties: false
              properties:
                RelationshipType:
                  type: "string"
                  enum:
                    - "KSAOB.Father"
                    - "KSAOB.Mother"
                    - "KSAOB.Guardian"
                    - "KSAOB.Other"
                FirstName:
                  description: "PSU Guardian First Name"
                  type: "object"
                  additionalProperties: false
                  properties:
                    en:
                      type: "string"
                      description: "English"
                    ar:
                      type: "string"
                      description: "Arabic"
                FatherName:
                  description: "PSU Guardian Father Name"
                  type: "object"
                  additionalProperties: false
                  properties:
                    en:
                      type: "string"
                      description: "English"
                    ar:
                      type: "string"
                      description: "Arabic"
                GrandFatherName:
                  description: "PSU Guardian GrandFather Name"
                  type: "object"
                  additionalProperties: false
                  properties:
                    en:
                      type: "string"
                      description: "English"
                    ar:
                      type: "string"
                      description: "Arabic"
                FamilyName:
                  description: "PSU Guardian Family Name"
                  type: "object"
                  additionalProperties: false
                  properties:
                    en:
                      type: "string"
                      description: "English"
                    ar:
                      type: "string"
                      description: "Arabic"
                Gender:
                  description: |
                    PSU Guardian Gender.
                    Male or Female.
                  type: "string"
                  enum:
                    - "Male"
                    - "Female"
                Nationality:
                  description: |
                    PSU Guardian Nationality .
                  type: "string"
                BirthDate:
                  description: |
                    PSU Guardian date of birth.
                  type: "string"
                  format: "date"
                BirthDateCalendarType:
                  $ref: "#/components/schemas/OBPartyCalendarType"
                PlaceOfBirth:
                  description: |
                    PSU Guardian Birth Claim
                  type: "object"
                  properties:
                    Country:
                      # The PSU country of birth claim that has been verified by the PASP.
                      $ref: "#/components/schemas/OBCountryCode"
                    Region:
                      description: |
                        PSU Guardian region of birth claim that has been verified by the PASP.
                      type: "string"
                    Locality:
                      description: |
                        The PSU locality (village, town, city etc) of birth claim that has been verified by the PASP.
                      type: "string"
                  additionalProperties: false
                EducationLevel:
                  description: |
                    PSU Guardian education level that has been verified by the PASP.
                  type: "string"
                  enum:
                    - KSAOB.Elementary
                    - KSAOB.Intermediate
                    - KSAOB.Secondary
                    - KSAOB.University
                    - KSAOB.Other
                NationalId:
                  description: |
                    PSU Guardian NationalId Data that has been verified by the PASP.
                  type: "object"
                  additionalProperties: false
                  properties:
                    Type:
                      description: |
                        The PSU Guardian ID Type that has been verified by the PASP
                      type: "string"
                    Number:
                      description: |
                        The PSU Guardian ID number that has been verified by the PASP
                      type: "string"
                    PlaceOfIssuance:
                      description: |
                        The PSU Guardian ID place of issuance number that has been verified by the PASP
                      type: "string"
                    ExpirationDate:
                      description: |
                        The PSU Guardian ID Expiration Date that has been verified by the PASP
                      type: "string"
                      format: "date"
                    CalendarType:
                      $ref: "#/components/schemas/OBPartyCalendarType"
                NationalAddress:
                  $ref: "#/components/schemas/OBAddress"
                MobilePhoneNumber:
                  description: "PSU Guardian mobile phone number"
                  type: "string"
                HomePhoneNumber:
                  description: "PSU Guardian home phone number"
                  type: "string"
                Email:
                  description: "PSU Guardian Email"
                  type: "string"
                JobInformation:
                  description: |
                    PSU Guardian job information.
                  type: "object"
                  additionalProperties: false
                  properties:
                    EmployerName:
                      description: "PSU Guardian employer name"
                      type: "string"
                    JobTitle:
                      description: "PSU Guardian job title "
                      type: "string"
                    EmploymentSector:
                      description: "PSU Guardian employment sector"
                      type: "string"
                      enum:
                        - KSAOB.Governmental
                        - KSAOB.Private
                        - KSAOB.Semi-Governmental
                        - KSAOB.Other
          additionalProperties: false
    OBPartyIdentityEvidenceAttachments:
      title: "OBPartyIdentityEvidenceAttachments"
      description: |
        Attachments
        [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-attachments](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-attachments)
      type: "array"
      items:
        type: "object"
        properties:
          Desc:
            description: |
              Description of the document. This can be the filename or just an explanation of the content.
            type: "string"
          ContentType:
            description: |
              Content (MIME) type of the document
            type: "string"
          Content:
            description: |
              Base64 encoded representation of the document content
            type: "string"
          Txn:
            description: |
              Identifier referring to the transaction
            type: "string"
        additionalProperties: false
    OBPartyIdentityEvidenceTypeElectronicRecord:
      title: "OBPartyIdentityEvidenceTypeElectronicRecord"
      description: |
        Electronic Record Evidence
        [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-type-electronic_re](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-type-electronic_re)
      type: "object"
      properties:
        Type:
          description: "The type of evidence allowed for providing PSU verification."
          type: "string"
          enum: [electronic_record]
        CheckDetails:
          $ref: "#/components/schemas/OBPartyIdentityCheckDetails"
        Time:
          title: "Time"
          description: |
            Date and time at which the electronic_record was verified by the PASP.
            All dates in the JSON payloads are represented in ISO 8601 date-time format.
            All date-time fields in responses must include the timezone.
            An example is:2017-04-05T10:43:07+00:00
          type: "string"
          format: "date-time"
        Record:
          description: |
            Representing the record used to perform the identity verification.
          type: "object"
          properties:
            Type:
              description: |
                String denoting the type of electronic record
                "[https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)"
              type: "string"
              enum: [bank_account, mortgage_account, loan_account]
            PersonalNumber:
              description: |
                String representing an identifier that is assigned to the PSU and is not limited to being used in one record, for example a national identification number, personal identity number, citizen number, social security number, driver number, account number, customer number, licensee number, etc.
              type: "string"
            CalendarType:
              $ref: "#/components/schemas/OBPartyCalendarType"
            CreatedAt:
              # The time the record was created
              $ref: "#/components/schemas/ISODateTime"
            DateOfExpiry:
              # The date the evidence will expire
              $ref: "#/components/schemas/ISODateTime"
            Source:
              type: "object"
              description: |
                 Information about the source of this record
              properties:
                Name:
                  description: |
                    Designation of the source of the electronic_record
                  type: "string"
                Address:
                  # All elements of the OpenID Connect address Claim
                  $ref: "#/components/schemas/OBAddress"
                CountryCode:
                  description: |
                    String denoting the country or supranational organization that issued the evidence as ISO 3166
                  type: "string"
                Jurisdiction:
                  description: |
                     String containing the name of the region(s) / state(s) / province(s) / municipality(ies) that source has jurisdiction over (if it's not common knowledge or derivable from the address)
                  type: "string"
              additionalProperties: false
          additionalProperties: false
        Attachments:
          $ref: "#/components/schemas/OBPartyIdentityEvidenceAttachments"
      additionalProperties: false
    OBPartyCalendarType:
      title: "OBPartyCalendarType"
      description: |
        The type of calendar used for the date of issuance and date of expiry in the document evidence
        Allowable values:
        "Islamic Calendar"
        "Gregorian Calendar"
        Both calendars must follow YYYY-MM-DD
      type: "string"
      enum: [KSAOB.IslamicCalendar, KSAOB.GregorianCalendar]
    OBPartyIdentityEvidenceTypeDocument:
      title: "OBPartyIdentityEvidenceTypeDocument"
      description: |
        Document Evidence
        [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-type-document](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-type-document)
      type: "object"
      properties:
        Type:
          description: "The type of evidence allowed for providing PSU verification."
          type: "string"
          enum: [document]
        CheckDetails:
          $ref: "#/components/schemas/OBPartyIdentityCheckDetails"
        Verifier:
          description: "Denoting the legal entity that performed the identity verification. This object SHOULD be included if the OP did not perform the identity verification itself. This object is retained for backward compatibility, implementers are recommended to use CheckDetails & Organization instead"
          type: "object"
          required:
            - "Organization"
          properties:
            Organization:
              description: "String denoting the organization which performed the verification on behalf of the OP."
              type: "string"
            Txn:
              description: "Identifier referring to the identity verification transaction. The OP MUST ensure that the transaction identifier can be resolved into transaction details during an audit."
              type: "string"
          additionalProperties: false
        Time:
          title: "Time"
          description: |
            Date and time at which the document evidence was verified by the PASP.
            All dates in the JSON payloads are represented in ISO 8601 date-time format.
            All date-time fields in responses must include the timezone.
            An example is:2017-04-05T10:43:07+00:00
          type: "string"
          format: "date-time"
        DocumentDetails:
          type: "object"
          description: "Representing the document used to perform the identity verification. "
          properties:
            Type:
              description: |
                The type of document used for evidence checking by the PASP
                [https://bitbucket.org/openid/ekyc-ida/wiki/identifiers](https://bitbucket.org/openid/ekyc-ida/wiki/identifiers)"
              type: "string"
              enum: [passport, driving_permit, idcard, residence_permit]
            DocumentNumber:
              description: "The unique id number in the evidence used for verification checking"
              type: "string"
            PersonalNumber:
              description: |
                An identifier that is assigned to the End-User and is not limited to being used in one document, for example a national identification number, personal identity number, citizen number, social security number, driver number, account number, customer number, licensee number, etc
              type: "string"
            SerialNumber:
              description: |
                An identifier/number that identifies the document irrespective of any personalization information (this usually only applies to physical artifacts and is present before personalization).
              type: "string"
            CalendarType:
              $ref: "#/components/schemas/OBPartyCalendarType"
            DateOfIssuance:
              # The issuing date of the document used for verification checking.
              $ref: "#/components/schemas/ISODateTime"
            DateOfExpiry:
              # The expiry date of the document used for verification checking
              $ref: "#/components/schemas/ISODateTime"
            Issuer:
              type: "object"
              description: "Containing information about the issuer of this document."
              properties:
                Name:
                  description: |
                    Designation of the issuer of the document.
                  type: "string"
                Address:
                  # All elements of the OpenID Connect address Claim
                  $ref: "#/components/schemas/OBAddress"
                CountryCode:
                  description: |
                    String denoting the country or supranational organization that issued the document as ISO 3166
                  type: "string"
                Jurisdiction:
                  description: |
                    String containing the name of the region(s)/state(s)/province(s)/municipality(ies) that issuer has jurisdiction over (if this information is not common knowledge or derivable from the address)
                  type: "string"
              additionalProperties: false
          additionalProperties: false
        Attachments:
          $ref: "#/components/schemas/OBPartyIdentityEvidenceAttachments"
      additionalProperties: false
    OBPartyIdentityCheckDetails:
      title: "OBPartyIdentityCheckDetails"
      description: |
        Identifes the method used by PASP for checking the PSU evidence for verification.
        Representing the checks done in relation to the evidence
        OpenID Connect for Identity Assurance 1.0: [https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element](https://openid.net/specs/openid-connect-4-identity-assurance-1_0.html#name-evidence-element)
      type: "array"
      items:
        type: "object"
        required:
          - "CheckMethod"
          - "Txn"
        properties:
          CheckMethod:
            description: |
              Identifes the method used by PASP for checking the PSU evidence for verification
              String representing the check done, this includes processes such as checking the authenticity of the document, or verifying the user's biometric against an identity document.
              * IAMCheck - IAM-NIC
              * CustomerNationalAddressCheck - Fetching the customer address from Saudi Post (As per SAMA Rules and Regulations, any customer not registered in saudi post will not be allowed to register in any new service, e.g. bank account opening).
              * CustomerEligibilityCheck - Saudi or resident, Life status (flag), Not expired (flag), Valid Legal Status, Has no stop service order.
              * MobileNumberCheck - To check if the mobile number is linked to the customer NID/Iqama (in Absher).
              * CustomerNameMatchingCheck - The Customer Name matching via AML
              * TaxDeclarationCheck - Foreign Account Tax Compliance Act (FATCA). This is done simply asking the customer to declare if he/she is a tax resident in USA or any country other than KSA.
              * VPIPCheck - Validation that Physical evidence is genuine through inspection of its physical properties in person.
            type: "string"
            enum:
            - KSAOB.IAMCheck
            - KSAOB.CustomerNationalAddressCheck
            - KSAOB.CustomerEligibilityCheck
            - KSAOB.MobileNumberCheck
            - KSAOB.CustomerNameMatchingCheck
            - KSAOB.PolicitalExposedPersonCheck
            - KSAOB.TaxDeclarationCheck
            - KSAOB.VPIPCheck
          Organization:
            description: |
              String denoting the legal entity that performed the check. This SHOULD be included if the OP did not perform the check itself
              * NIC - National Information Center
              * SaudiPost - Saudi Postal Service
              * GOSI - General Organization for Social Insurance.
              * PASP - The PASP itself.
            type: "string"
            enum:
            - KSAOB.NIC
            - KSAOB.SaudiPost
            - KSAOB.GOSI
            - KSAOB.PASP
          Txn:
            description: |
              Identifier referring to the identity verification transaction. The OP MUST ensure that this is present when EvidenceRef element is used. The OP MUST ensure that the transaction identifier can be resolved into transaction details during an audit
            type: "string"
          Time:
            $ref: "#/components/schemas/ISODateTime"
        additionalProperties: false
